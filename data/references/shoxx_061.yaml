notes: 'MIsaO Lab (1998/03 vol.061): joint La''cryma Christi cover; カラー38p; パート別対談、Q&A（衣装：au
  revoir）. "au revoir" names the costume theme for the 38pp 聖邪の共宴 session — not magazine
  pages 12–13. TOC (gallery file 02) lists feature pp. 16–53: five SESSION pairings
  (018/024/030/036/042) plus Q&A.

  Scan status (July 2026): 40 MM pages on The Malice Archive / file.garden (Anna scan;
  cover by Morgianasama). Gallery file index ≠ printed page numbers (e.g. gallery
  12–13 are solo portraits, not mag. pp. 12–13). Page mapping and Reddit crop matches:
  scripts/research/shoxx_061_scan_hunt.yaml#page_mapping.

  Full issue RAR (Eternal Silence 2009, 84 JPEGs) re-upload not found. Cantavanda
  has May 1998 vol.63 only.

