id: streaming-platforms-malace-mizer
title: Streaming Platforms — Malace Mizer (unauthorized) vs MALICE MIZER (official)
type: other
url: https://natalie.mu/music/news/638907
notes: >
  Checked Spotify and Tidal July 2026. There is NO official MALICE MIZER artist page on either
  platform. Mana/Moi dix Mois staff confirmed (Natalie, 2025) that current streaming uploads are
  not authorized; official digital release will be announced via official channels. Unauthorized
  uploads appear under the misspelled name "Malace Mizer" (also "MALICE MIZER" on some releases),
  distributed via indie labels such as 9559586 Records DK and 3761571 Records DK. Streams do not
  benefit the band. Cantavanda documents the impersonator monetizing uploads and copyright claims.
  See also cantavanda.com/malice-mizer/links/listen-to-malice-mizer/
