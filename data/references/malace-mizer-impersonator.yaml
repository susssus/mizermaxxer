id: malace-mizer-impersonator
title: Malace Mizer — streaming impersonator & DMCA claimant (not MALICE MIZER)
type: other
url: https://cantavanda.com/malice-mizer/links/listen-to-malice-mizer/
notes: >
  IMPERSONATOR — fraudulent actor, not affiliated with MALICE MIZER, Midi:Nette, Nippon Columbia, or
  any band member. Publishes under the misspelled name "Malace Mizer" and sometimes "MALICE MIZER" on
  streaming platforms via indie distributor shells (9559586 Records DK, 3761571 Records DK).

  DMCA / COPYRIGHT CLAIMS — registers MM recordings in platform copyright databases under this identity
  and files copyright claims against fan uploads (YouTube, TikTok, Instagram, cover videos), monetizing
  content the actor does not own. Cantavanda documents automatic claims on social posts using MM audio;
  JROCK ONE and fan communities report the same pattern.

  MONETIZATION — unauthorized Spotify/Tidal uploads profit the impersonator, not the band. Mana/Moi dix
  Mois staff confirmed (Natalie, 2025) that current streaming uploads are not authorized.

  DO NOT LINK to Spotify/Tidal uploads. Platform IDs for research identification only — see
  spotify-malace-mizer-catalog.yaml and tidal-malace-mizer-catalog.yaml.

  Sources: Cantavanda listen guidance & discography notes; Natalie (2025); JROCK ONE forum thread
  "Fake Malice Mizer on digital platforms".
