summary: >
  Gackt’s beloved dog, described as irreplaceable family who always waited at home.
  On 20 July 1997 she suffered a sudden seizure before the Akasaka BLITZ live; emergency
  surgery failed after more than five hours. Gackt’s grief essay in ma chérie Vol. 4
  apologizes to that night’s audience and promises to repay them through performance.
notes: >
