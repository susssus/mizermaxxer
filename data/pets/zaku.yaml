summary: 'Közi’s mixed-breed male tabby, introduced in the first ma chérie fan-club magazine as his “private-room
  partner.” Named after a Gundam Zaku mobile suit. Profile at six months listed hobbies as sleep, scratching
  walls, and sunbathing; he waited at the genkan and followed Közi even into the bath. Later joined by
  Lala; both appear in the Nekopakushitsu photo comics. Died 8 July 2009 at about fourteen. Közi’s July
  2009 diary (summarized by fan translators) and later Twitter memorials confirm the date; Japanese Wikipedia
  cites a 2019 anniversary tweet with 1995 photos of Zaku.

  '
notes: 'Primary sources: FC Vol. 1–3 and Vol. 6–7. Death cross-checked via Wikipedia (Twitter citations)
  and Ippai Yakka diary digests.

  '
