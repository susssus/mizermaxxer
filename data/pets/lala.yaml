summary: >
  Közi’s female kitten, added at two months old from a pet shop (“take it, thief”).
  Zaku hissed for the first few days, then they became friends — after which Közi
  joked that the house was collapsing. Both cats star in the autumn 1998 Nekopakushitsu
  photo-comic strips. Still mentioned with Közi years later in fan accounts of his household.
notes: >
  Primary introduction: FC Vol. 2–3 Ginza Cozy Corner. Later diary pets (e.g. hamster
  Kikka as companion for Lala after Zaku’s death) are secondary and not yet catalogued
  as separate entries.
