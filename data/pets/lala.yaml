summary: >
  Közi’s female kitten, added at two months old from a pet shop (“take it, thief”).
  Zaku hissed for the first few days, then they became friends. Both cats star in the
  autumn 1998 Nekopakushitsu photo comics. After Zaku’s 2009 death she was joined by
  hamster Kikka (Tom & Jerry household). Lived with Közi about 19 years 7 months;
  died 15 December 2015 (his Twitter memorial). Japanese sources often write ララァ (Lalah).
notes: >
  Primary introduction: FC Vol. 2–3. Death confirmed via Japanese Wikipedia citing
  Közi’s 2015-12-15 Twitter post.
