pages:
  - page: 1
    section: Magazine p. 31 — feature opener
    ja: 表現者の使命
    romaji: Hyōgensha no shimei
    en: >
      The mission of an artist. Gackt seated at a pool table, red-lit bar with pop-art
      backdrop. Credits: text Yoshiko Funami, photo William Hames.

  - page: 2
    section: Magazine p. 32 — interview (1/2)
    ja: もう僕の生き様は、そのまま曲になってると思う
    romaji: Mō boku no ikizama wa, sono mama kyoku ni natteru to omou
    en: >
      "I think my way of life itself has already become my songs." LA recording session
      for debut solo album Mizérable (released May 12, 1999): Gackt working through the
      night in a candlelit booth on four album tracks. Interview on his new first step
      as a solo artist — creative process, leaving the band, harmony, and what it means
      to be a musician. Three small portraits along the right margin.

  - page: 3
    section: Magazine p. 33 — photo spread
    ja: 表現者の使命
    romaji: Hyōgensha no shimei
    en: >
      Full-page photograph: Gackt with pool cue at a pool table, Bud Light sign and
      pop-art woman poster behind him. Feature title repeated.

  - page: 4
    section: Magazine p. 34 — interview (2/2)
    ja: やれることはすべて、やりたいと思うことは全部やる
    romaji: Yareru koto wa subete, yaritai to omou koto wa zenbu yaru
    en: >
      "Do everything I can; do everything I want to do." Continued LA interview around
      the pool-table shoot. Discusses Mizérable, dry recording sound, returning to activity
      after Malice Mizer, and pursuing all he can and wants as a solo artist.
