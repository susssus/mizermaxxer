  - page: 16
    section: Kami's Soliloquy
    ja: >
      Kamiの独り言。
      〜空白の瞬間〜
      半年前くらいに10代半ばの女の子が亡くなりました。彼女はRevivalからずっと応援してくれていて、
      手紙もたくさん書いてくれて、Liveにも何度も来てくれていて、顔も覚えていました。
      去年の10月くらいから体調を崩して、サイン会の時に「あの子病気なのに来てる」などと
      ひどいことを言う人もいて…。会いに行こうと思っていたのですが、Major契約後とても忙しくなり、
      会えた時にはもう亡くなっていました。
      彼女の死後すぐ大阪のLiveがあり、それからShibuyaでのリハーサルとLive（素晴らしいLive videoになりました）。
      Debut single「ヴェル・エール」——歌は歌えませんが、ドラムには魂を込めました。
      「Pays de merveilles」Tour中、彼女のお墓に行き、今は笑顔で話せるようになりました。
      Video上映も終わり、現在2nd Major singleのRecording中です。
      9月下旬筆
      〜新たな俺の一面〜
      学校では歴史が一番嫌いでした。名前が全部同じで、過去のことなんてどうでもよかった。
      去年たまたまNHK大河ドラマ「秀吉」を見て、ハマりました。全部録画して何度も見返しています。
      戦国時代と自分の人生——上京、メンバーとの出会い、Indiesの頂点、Majorデビュー——重なります。
      「毛利元就」も見て、歴史本をたくさん買い、川中島の古戦場にも行きました。今は武田信玄に興味。
      ☆「秀吉」の1〜6話のビデオを持っている人がいたら貸してくれーい、ベイベー。
    romaji: >
      Kami no hitorigoto — fan death memorial; Bel Air drums; Hideyoshi Taiga drama obsession; Takeda Shingen interest.
    en: >
      Kami's Soliloquy.
      ~Moment of Void~
      About half a year ago a fan in her mid-teens passed away. She'd supported us since the revival,
      wrote many letters, came to many lives—I recognized her face.
      She fell ill around last October; at a signing some people said cruel things like
      “She's sick but still came.” I meant to visit, but after the major-label contract I became extremely busy;
      by the time I saw her, she was gone.
      Osaka live came right after; then Shibuya rehearsal and live (became a wonderful live video).
      Debut single “Bel Air”—I can't sing, but I put my soul into the drums.
      During the Pays de merveilles tour I visited her grave; now I can talk to her with a smile.
      Video screenings are over; currently recording our 2nd major single.
      Written late September.
      ~A New Side of Me~
      History was my least favorite subject—names all sounded the same; the past didn't matter.
      Last year I happened to watch the NHK Taiga drama “Hideyoshi” and got hooked; I record and rewatch every episode.
      The Warring States era parallels my life—moving to Tokyo alone, meeting members, indie peak, major debut.
      Also watched “Mori Motonari,” bought history books, visited Kawanakajima battlefield. Currently into Takeda Shingen.
      ☆If anyone has videos of Hideyoshi episodes 1–6, lend them to me, baby.

