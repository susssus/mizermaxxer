      ◇ 編 ◇ 集 ◇ 後 ◇ 記 ◇
      さて、VOL.5です。遅くなってしまってすみませんでした。また次回の会報に向けて着々とネタ集めをしています。
      似顔絵その他、色々と募集中ですので、ぜひみなさん送ってくださいね。
      それでは前回のプリクラプレゼントの当選者発表！
      NO-840221 新保三重子さん、NO-812973 菅井沙織さん、NO-9031526 笠松文子さん、NO-9092967 中倉泉さん。
      以上の4名です。おめでとうございます！後程お送りしますので、楽しみに待っていてくださいね！
      皆さんからのたくさんの「熱い思い」は全てメンバーに目を通してもらいました。またこういう企画をやりたいなと思っています。お楽しみに。
      もうだいぶ寒くなりました。皆さん風邪など引かないように気を付けてくださいね。ではまたお会いしましょう。au revoir!
    romaji: >
      Q10–Q14 cosplay, costumes, food, sports, older fans; hensū kōki — purikura winners, submissions welcome, au revoir.
    en: >
      Q10 Cosplay you'd like to try? Gackt: none. Mana: Madame Butterfly. Közi: Quattro Bajeena. Yu~ki: ant.
      Kami: doesn't really like cosplay.
      Cosplay for other members? Gackt: let them do as they like. Közi: Gackt→Gihren, Mana→M'Quve, Yu~ki→Degwin, Kami→Dozle (Gundam).
      Yu~ki: turtle, mortar, grasshopper, jellyfish or seaweed.
      Q11 What happens to used costumes? Gackt: may wear again by theme; no new/old divide for Malice.
      Mana: at home; wears sometimes. Közi: frozen; uses as ice pack. Yu~ki: under tatami. Kami: throw away, give away, or keep.
      Q12 Japanese or Western food? Gackt: Western. Mana: mostly Japanese but likes Western too. Közi: loved both… long ago.
      Yu~ki: both; school lunches. Kami: both.
      Q13 Favorite sport? Gackt: martial arts. Mana: former handball player. Közi: fruit basket (game). Yu~ki: low crawl.
      Kami: tennis.
      Q14 Fans 30+ or housewives? Gackt: have a meal with me. Mana: happy. Közi: cool!! Yu~ki: age doesn't matter. Kami: very good thing.
      Editor's Afterword — Vol. 5 at last; sorry for the delay. Gathering material for the next issue—send portraits and more.
      Purikura gift winners: Mieko Shinbo, Saori Sugai, Fumiko Kasamatsu, Izumi Nakakura—congratulations!
      All your passionate messages were read by the members; we'd like to do this project again.
      It's gotten quite cold—don't catch colds. See you again. au revoir!

