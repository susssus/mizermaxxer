  - page: 12
    section: Ginza Cozy Corner — Közi (France travelogue)
    ja: >
      銀座 コージーコーナー。
      サリュ！コマンサヴァ？今回はフランスでのオフ写真をちょこっとコメントとともにお見せしましょう。
      （右ページの写真、左上から時計回りに）
      ＋サンメリ教会＋ 教会はたくさん見たけどステンドグラスの美しさとパイプオルガンの音色に心を洗濯されました。
      ＋カタコンブ＋ ローマ時代の採石場の洞窟を利用して、無縁仏などで作られた納骨堂。
      以前、雑誌で見てからすごく気になって行ってみたかった所の一つ。壁には何百体ものガイコツがびっしりで異様なんだけど、美しかったな。雰囲気がすごく良かった。まさにオレ好み。
      ＋ポンピドゥーセンター前＋ オフショットの撮影の時。パリっ子達と。
      ＋ゲンスブール家の外壁＋ YU~KIちゃんと行った。ファンからのメッセージや絵でびっしり。お墓も行ってきました。
      ＋リュクサンブール公園＋ ひなたぼっこ中のおばあちゃんと。
      ＋マクドナルドパリ支部＋ メニューが若干違ってた。なぜスマイルがないんだぁ～。
      ＋ヴェルサイユ宮殿の天井画＋ その壮大で高貴な美しさに金縛り状態。
      ＋俺の絵＋ テルトル広場にひしめいている似顔絵描きが描いた俺。けっこー笑った。
      ＋ダリ美術館のチケット＋ 俺この人の作品大好きなんだけど、ここは音楽、照明、ディスプレイの仕方などすべてにおいて一風変わっていて、美術館全体がダリ独自の幻想的でシュールな世界に包まれてました。見に来た人達が感想やダリへのメッセージを書くノートに俺も一言書いてきたし、フランスに行く機会があったらぜひ足を運んでもらいたいですね。
      ＋ヴェルサイユ宮殿の鏡の間＋ 窓から差し込む自然光が鏡やシャンデリアに反射して、もう声にならないほどの美しさ。とにかくここの宮殿どこ見てもすごすぎた。口あきっぱなし。
      ＋ルーヴル美術館＋ 時間が無くて中に入れなかったのが非常に残念。ここもむちゃくちゃでかい。
      ＋ジム・モリソンの墓＋ ファンに墓石を盗まれた跡が痛々しく残ってたけど、俺はやっとトカゲの王に逢えたよ。"Break on through to the other side"
      という感じでメトロ（地下鉄）も一人で乗ったし、いろんな所歩いたけど、人も建造物も自然もすべてが刺激的な国でした。今度は滞在半年位したいね。（絶対無理だろうなー）
    romaji: >
      Ginza Kōjī Kōnā — Közi Paris travelogue: St-Merry, Catacombs, Pompidou, Gainsbourg house, Luxembourg,
      McDonald's, Versailles, Dalí museum, Louvre, Jim Morrison's grave.
    en: >
      Ginza Cozy Corner — Közi.
      Salut! Comment ça va? This time I'll show off-shots from France with brief comments
      (photos on the right page, clockwise from top left).
      +St-Merry Church+ — Saw many churches; stained glass and pipe organ cleansed my soul.
      +Catacombs+ — Ossuary in Roman quarry caves lined with anonymous bones. I'd wanted to go since seeing it in a magazine.
      Hundreds of skulls packed into the walls—eerie yet beautiful. Great atmosphere. Totally my taste.
      +Centre Pompidou+ — Off-shot shoot with Parisian kids.
      +Gainsbourg house wall+ — Went with Yu~ki; covered in fan messages and art. Visited his grave too.
      +Luxembourg Gardens+ — With a sunbathing grandmother.
      +McDonald's Paris+ — Menu slightly different. Why no smiles~?
      +Versailles ceiling paintings+ — Grand, noble beauty left me paralyzed.
      +My caricature+ — Street artist at Place du Tertre drew me. Laughed a lot.
      +Dalí Museum ticket+ — I love his work; music, lighting, display—all uniquely surreal.
      Wrote a note in the visitor book; visit if you get to France.
      +Hall of Mirrors+ — Natural light reflecting off mirrors and chandeliers—beyond words.
      Every corner of the palace was incredible; mouth agape.
      +Louvre+ — No time to enter—very regrettable. Enormous.
      +Jim Morrison's grave+ — Painful scars where fans stole the headstone, but I finally met the Lizard King.
      “Break on through to the other side.”
      Rode the Metro alone, walked everywhere—people, buildings, nature all stimulating.
      Next time I'd like to stay half a year. (Probably impossible—)

