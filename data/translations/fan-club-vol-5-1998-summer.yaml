  - page: 8
    section: After Hibiya Yaon — Camui Gackt (part 1)
    ja: >
      日比谷野音を終えて by Gackt。
      現在Recordingの合間にこのレポートを書いています。正直なとこ五日目の徹夜に突入しました。
      人って面白いものでここまで寝ないとちょっとしたことで笑いが止まらなくなるんですね。
      昨目も押さないと開かない扉を必死になって引いてて、普段だとすぐ気が付いて押して開けるのに、
      どうやっても引いて開かない扉の前で「開かないー」と、扉にしがみついてたあげくに疲れてその場に座っていると
      「何、やってんの。」と、扉を開けて通り過ぎるスタッフを見て
      「知恵は使うためにあるんだな、ウン」と、独り言を言っている自分に対してうけてました。
      ・・・・・・どうでもいいことですね。ま、寝て無いということで勘弁してください。
      えーっと、野音ですね、野音。まず、一番最初に言いたいのは「本当にありがとう」。
      これはいろんな意味で待っててくれた人へ、見に来てくれた人達へ、応援してくれた人達へ、
      かかわってくれた人達へ、色々心配してくれた人達へ伝えたいです。
    romaji: >
      Hibiya Yaon o Oete — Gackt writing during recording all-nighter; push-door sleep-deprivation gag;
      thanks to fans after Hibiya Open-Air Concert Hall performance.
    en: >
      After Hibiya Yaon — by Gackt.
      I'm writing this report during breaks in recording. Honestly, I've hit my fifth straight all-nighter.
      Sleep deprivation is funny—you laugh at the smallest things.
      Yesterday I desperately pulled a push door that wouldn't open; normally I'd notice and push,
      but I clung to it crying “It won't open—” until I collapsed, then watched a staff member walk through
      saying “What are you doing?” and laughed at myself muttering “Wisdom exists to be used, yep.”
      …Trivial, I know—forgive me for not sleeping.
      Hibiya Yaon—first and foremost, “Thank you so much.”
      To everyone who waited in every sense, who came, who cheered, who was involved, who worried—I want to say it.

  - page: 9
    section: After Hibiya Yaon — Camui Gackt (part 2)
    ja: >
      二日目が終わった後、もう次のことを考えてる自分がいました。それはきっといろんなことを一つ一つ整理できたからだと思います。
      夏のツアーからいろんなことが起きてしまって、自分なりに色々考えました。
      そのことでたくさんの手紙をもらい、励まされたこともあります。本当にありがとう。
      こうやって寝る時間の無い中で苦しいと思わずにRecordingができるのも手紙を送ってくれる人
      （笑顔で写真やプリクラを一緒に貼ったりしてくれる人）がいたり、待ってる人達がいると実感できることも理由の一つです。
      最近は忙しくてなかなか返事を出せないけれど、また時間をつくりたいと思います。
      近いうちに「神威 楽斗の学校潜入日記」みたいなものをやろうかなと思っています。
      自分の学校に来てほしいと思う人は、学校の詳細、写真、自己PRを添えて送ってください。お楽しみに。
    romaji: >
      Gackt (part 2) — summer tour reflections, fan letters sustaining recording; school infiltration diary planned.
    en: >
      After Hibiya Yaon — Gackt (part 2).
      After the second day I was already thinking ahead—probably because I'd sorted things one by one.
      Many things happened since the summer tour; I thought hard in my own way.
      I received many letters of encouragement—thank you truly.
      Being able to record without feeling the pain of no sleep is partly because people send letters
      (some paste photos and purikura with smiles) and because I feel people waiting for us.
      I'm too busy to reply lately but want to make time again.
      I'm thinking of doing something like “Kamui Gackt's School Infiltration Diary” soon.
      If you want me to visit your school, send details, photos, and a self-introduction. Look forward to it.

