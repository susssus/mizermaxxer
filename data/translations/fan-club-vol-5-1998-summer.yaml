  - page: 2
    section: Schedule Corner
    ja: >
      スケジュールコーナー。
      “Ville de merveilles 透明の螺旋” 12/22 愛知勤労会館、12/24 大阪厚生年金会館（大）、
      12/28・29 渋谷公会堂。
      New single “au revoir” 12/3 Release。
      住所変更の手続き：住所や電話番号が変わった場合は、ハガキでお知らせ下さい。
      記入事項は、①会員番号 ②旧住所 ③お名前 ④新住所（郵便番号、電話番号も）⑤変更日。
      宛名シールや会員証に誤字脱字があった場合も同様にお願いします。
      似顔絵などの投稿やファンレターなどは以下の住所へ。ファンレターの場合は必ず誰宛かを明記。
      届いてすぐにメンバーに渡せるとは限らないので、なまものは絶対に送らないでくださいね。
      〒142 東京都品川区荏原郵便局私書箱11号 ミディネット内　マシェリ
      TEL 03-3796-2028 / FAX 03-3796-2027
    romaji: >
      Sukejūru Kōnā — Ville de merveilles tour Dec 1998; au revoir single Dec 3;
      address-change postcard procedure; fan mail and perishable warning.
    en: >
      Schedule Corner.
      “Ville de merveilles ~Toumei no Rasen~” (Transparent Spiral): Dec 22 Aichi Kinrou Kaikan;
      Dec 24 Osaka Kosei Nenkin Kaikan (Large Hall); Dec 28–29 Shibuya Kokaido.
      New single “au revoir” releases Dec 3.
      Address changes: notify us by postcard if your address or phone number changes.
      Include membership number, old address, name, new address (postal code and phone), and change date.
      Report typos on mailing labels or membership cards the same way.
      Send portraits, submissions, and fan letters to the address below; clearly mark who each letter is for.
      We may not be able to pass mail to members immediately—never send perishables.
      P.O. Box 11, Ebara Post Office, Shinagawa-ku, Tokyo 142; c/o Midi:Nette ma chérie.
      Tel 03-3796-2028 / Fax 03-3796-2027.

  - page: 3
    section: C.E.D.P. at Club Asia
    ja: >
      1997.6.30 ma chérie限定イベント
      クローン・エキセントリック・ダンス・パーティー 略して C.E.D.P at CLUB ASIA。
      mana&köziのバースデー記念イベントということで開かれたこのC.E.D.P.。
      イベント参加者(スタッフ含め)は全員コスプレをしなければいけないという厳しくも楽しい掟のもと、
      およそ300人のコスプレイヤー(笑)が渋谷の街に集結しました。
      リポーターの東海林のり子さんにも参加していただいて、とっても盛り上がったのでした。
      我がしもべたちよ、私の周りに集まりなさい（Gackt）。
      自毛でメーテルだぞー。このつや、んーすばらしー（kami）。
      コロムビアの方です。いつもお世話になってます…
      はたして俺がコスしたピートバーンズを知ってる人はいたのだろうか？（közi）
      ネオ妖怪人間3匹襲来（mana）。
      いつもてつろうと一緒よ（kami）。
    romaji: >
      C.E.D.P. at Club Asia — Jun 30 1997 ma chérie limited event for Mana & Közi birthdays;
      mandatory cosplay for ~300 attendees; reporter Noriko Tokairin participated.
    en: >
      Jun 30, 1997 — ma chérie Limited Event.
      Clone Eccentric Dance Party (C.E.D.P.) at Club Asia.
      Held as a birthday event for Mana and Közi. Under the strict but fun rule that all participants
      (staff included) must cosplay, roughly 300 cosplayers gathered in Shibuya.
      Reporter Noriko Tokairin joined in—the event was a huge success.
      Captions: “My servants, gather around me.” — Gackt.
      “It's Maetel with my own hair. This shine—mm, wonderful.” — Kami (Galaxy Express 999 cosplay).
      “These are people from Columbia Records. Thank you for your continued support…”
      “I wonder if anyone recognized the Pete Burns I cosplayed?” — Közi.
      “Attack of the 3 Neo-Humanoid Monsters.” — Mana.
      “I'm always with Tetsuro.” — Kami.

  - page: 4
    section: Malice Mizer's French Days (part 1)
    ja: >
      MALICE MIZERのおフランスな日々。
      さて、もう皆さん「ヴェル・エール〜空白の瞬間の中で〜de l'image」はご覧になっていることと思いますが、
      いかがだったでしょうか？プレミア上映会などのアンケートではたくさんのおほめの言葉をいただいて、
      メンバー一同喜んでおります。
      でもって、この撮影のため2週間ほどフランスへ行ってきた訳なんですが、……あら、写真がいっぱいあるじゃないですか。
      しかも笑えるのが（笑）。これはみんなに見せなきゃもったいない！
      ビデオでは見ることの出来ないフランスでのオフショット、たっぷりご紹介しましょう！
      みんな大好きおかし部隊隊長のマニューと（közi）。
      トランプを広げる所のチェック。トランプの騎士はこだわるぜ（kami）。
      最近いろいろあってさ・・・・（Gackt）「・・・・」（mana）。
    romaji: >
      MALICE MIZER no o Furansu na hibi — Bel Air video premiere praise; two-week France shoot off-shots.
    en: >
      MALICE MIZER's French Days.
      By now you've probably seen “Bel Air ~Kuuhaku no Shunkan no Naka de~ de l'image”—how was it?
      Premiere screenings brought many compliments; the members are delighted.
      We spent about two weeks in France for the shoot—and look, piles of photos!
      And they're funny (laughs). Too good not to share.
      Off-shots from France you won't see in the video—plenty of them!
      “With everyone's favorite snack-squad leader Manu.” — Közi.
      “Checking the spot to spread out the playing cards. The Knight of Cards is particular.” — Kami.
      “Lately all sorts of things have happened…” — Gackt. “….” — Mana.

