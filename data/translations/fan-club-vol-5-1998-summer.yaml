    romaji: >
      Naisu Midoru na oretachi e no shitsumon kōnā Q1–Q9 — cooking, first record, makeup brands, movies,
      stiff shoulders, post-major debut, change vs. constancy, all-male audience, shaved ice.
    en: >
      Question Corner for us Nice Middles — Q1–Q9 with answers from Gackt, Mana, Közi, Yu~ki, and Kami.
      Q1 Cooking specialty? Gackt: Italian when he has time. Mana: anything OK. Közi: cat food (eats together).
      Yu~ki: grilled anaconda. Kami: subuta (sweet-and-sour pork).
      Q2 First Japanese record bought? Gackt: never bought records. Mana: Shibugaki-tai. Közi: Inu no Omawarisan.
      Yu~ki: Harada Kiyoshi's Ponkikki. Kami: Arabesque donut record.
      Q3 Favorite makeup brand? Gackt: KOSE. Mana: Clé de Peau foundation, Shu Uemura lashes, 28°C liner.
      Közi: Panasonic. Yu~ki: Beautimatic Adedas. Kami: whatever he likes.
      Q4 Recent movie? Paradise Lost seen? Gackt: sees films often; recent “Devil.” Mana: secret; hasn't seen it.
      Közi: “ZOO,” “Naked Lunch”; hasn't seen it. Yu~ki: A Day of Chimpanzees; wants to go to the zoo.
      Kami: “Heaven and Earth”—moved; Paradise Lost looks interesting.
      Q5 Bad stiff shoulders? Gackt: not really. Mana: none. Közi: never experienced it. Yu~ki: can't skip eye drops.
      Kami: very stiff; massage mandatory before lives.
      Q6 Feelings after major debut? Gackt: unchanged. Mana: busy. Közi: Diana was definitely assassinated.
      Yu~ki: unchanged, won't change, don't want to change. Kami: wrote about it last time.
      Q7 Importance of changing vs. not changing? Gackt: growth not change; don't forget what you learned.
      Közi: change = regular life; don't change = spend money immediately. Yu~ki: change = spirit/concentration;
      don't change = walk 100 steps daily. Kami: change what's plus for you; don't change = stay yourself.
      Q8 All-male live audience? Gackt: could be fun; wants to try. Mana: that's fine too. Közi: bark endlessly—“Aniki~!”
      Yu~ki: tomorrow morning it's Weider in jelly (energy in). Kami: would stage-dive.
      Q9 Shaved ice—chew or swallow? Gackt: doesn't eat it. Mana: lick. Közi: chew relentlessly—molars crunch!
      Yu~ki: warm it first then chew. Kami: both.

