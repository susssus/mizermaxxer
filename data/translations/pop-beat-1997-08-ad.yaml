content:
  - type: release
    ja: >
      7.19 Debut Single Release
      ヴェル・エール ～空白の瞬間の中で～
      COZA-31～32  ¥2,039 (TAX IN)
      初回完全限定発売
      † 特別BOX仕様 † 16ページ・ブックレット封入 † スペシャルビデオ付
    romaji: >
      7.19 Debut Single Release
      Veru Ēru ~Kūhaku no Shunkan no Naka de~
      COZA-31~32 ¥2,039 (TAX IN)
      Shokai kanzen gentei hatsubai
      † Tokubetsu BOX shiyō † 16-pēji bukuretto fūnyū † Supesharu bideo tsuki
    en: >
      July 19 — debut single release: Bel Air ~In the Moment of Emptiness~
      (COZA-31~32, ¥2,039 tax included). First-press complete limited edition.
      Special box set with 16-page booklet and special video.

  - type: tour
    ja: >
      STANDING TOUR '97 Pays de merveilles ～空白の瞬間の中で～
    romaji: >
      STANDING TOUR '97 Pays de merveilles ~Kūhaku no Shunkan no Naka de~
