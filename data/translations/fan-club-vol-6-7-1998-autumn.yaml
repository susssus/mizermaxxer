  - page: 9
    section: Premier Screening
    ja: >
      プレミア上映会 — 今や懐かしの(!?)プレミア上映会の「ナゾ」のスナップ写真をお見せします。
      あの時のさまざまな想い出の中に加えて下さい。
      おーきくなれよ / プレミア上映会セットのようす /
      …………△…×…(Gackt) / カミです。(Kami — green monster mask)
    romaji: >
      Puremia joueikai — nostalgic mysterious snapshots from the Merveilles premier screening event;
      Mana in red robe; stage set; Gackt; Kami in frog/monster mask.
    en: >
      Premier Screening — mysterious snapshots from the now-nostalgic Merveilles premier screening.
      "Grow big" (Mana in voluminous red costume); premiere set with chairs and candelabras;
      Gackt (indecipherable caption); Kami identified in green cartoon monster mask — "It's Kami."

  - page: 10
    section: Gackt's Favorites (part 1)
    ja: >
      Gackt's Favorites — 最近昔の映画をもう一度見直してみたりすることがよくある。
      俺のお気に入りの作品を紹介しよう。
      『レオン』LUC BESSON、ERIC SERRA。GARY OLDMANの麻薬取締官は最高。
      JEAN RENOのシャワーシーン、ハンカチの四つ折り、左耳上の十円はげ。
      『THE FUGITIVE』逃亡者 — HARRISON FORD。Dr.KIMBLEの台詞：
      How dare you!! / He's finally flipped his lid. / You're obsessed.
      マンガ：『monster』浦沢直樹 — 登場人物の設定の細かさ、イギリス・ドイツ舞台。
      『monster』が一体誰を指すのか推理してほしい。
    romaji: >
      Gackt's Favorites (part 1) — Léon, The Fugitive English line notes; Naoki Urasawa's Monster manga.
    en: >
      Gackt's Favorites (part 1) — film and manga recommendations.
      Léon (Luc Besson / Eric Serra): Gary Oldman's DEA agent; Jean Reno's shower scene;
      character detail of ironed handkerchief and "ten-yen bald spot" above left ear.
      The Fugitive: Harrison Ford; favorite English lines — "How dare you!!" (ironic rudeness),
      "He's finally flipped his lid" (gone crazy), "You're obsessed" (money-grubbing ghost).
      Manga: Monster (Naoki Urasawa) — meticulous character settings, UK/Germany setting;
      asks readers to deduce who the title "monster" refers to. Illustrated by Gackt. C.

  - page: 11
    section: Gackt's Favorites (part 2)
    ja: >
      『BANANA FISH』吉田秋生 — 舞台はLITTLE ITALYや田舎。最終巻最後の物語に心を奪われた。
      1〜3巻は絵が不安定なので見逃してほしい。
      『PINEAPPLE ARMY』作・工藤かずや、画・浦沢直樹 — 殺し屋になったきっかけの本。
      主人公ジェド・豪士は国籍不明だが顔が日本人。リビアで戦死するキースの笑顔が心が痛い。
      お勧めがあったら送って下さい。スタジオで小説・マンガ・絵・Macをイジって時間をつぶす。
      『カムイ ガクトの学校潜入日記』— 必ず学校または責任者の許可を。メール fwix5412@mb.infoweb.ne.jp
      （一人二週間に一回、本人写真付、PRも）。スタジオ集合写真：SHOXX鈴木、増淵、コロムビア由美、衣装由香里。
    romaji: >
      Gackt's Favorites (part 2) — Banana Fish, Pineapple Army; School Infiltration Diary notice;
      experimental fan email; studio staff photo.
    en: >
      Gackt's Favorites (part 2).
      Banana Fish (Akimi Yoshida) — owns all her works; NYC Little Italy and countryside settings;
      final volume's closing story moved him; forgive unstable art in vols 1–3.
      Pineapple Army (Kazuya Kudo / Naoki Urasawa) — what got him into hitman stories;
      protagonist Jed Goushi: nationality unknown but Japanese face; Keith's smiling death in Libya hurts.
      Send recommendations; kills studio time with novels, manga, drawing, Mac tinkering.
      Notice: "Kamui Gackt's School Infiltration Diary" — must get school/authority permission before submitting.
      Experimental email fwix5412@mb.infoweb.ne.jp (max once per two weeks per person, photo required, include PR).
      Studio photo: SHOXX Suzuki, writer Masubuchi, Columbia promo Yumi, stylist Yukari.

  - page: 12
    section: mana — Invitation to Fantasy (Dracula edition)
    ja: >
      mana様 ～幻想への誘い～ — ハアーイ！ごきげんよう。今回は私のコレクションの一部を紹介しようかな…。
      ～ドラキュラ編～
      〈ボードゲーム〉Horror World — 1年前フェスで買いそびれ後悔、最近譲ってもらった。ありがとう！
      〈ドラキュラ大事典〉1980年物 — 古本屋で見つけて凄く嬉しかった！
    romaji: >
      mana Invitation to Fantasy — Dracula edition: Horror World board game, 1980 Dracula encyclopedia.
    en: >
      mana-sama ~Invitation to Fantasy~ — "Hi! Greetings. I'll introduce part of my collection…"
      Dracula Edition.
      Board game "Horror World" — missed it at a festival a year ago, recently received from someone. Thank you!
      Dracula Encyclopedia (1980 edition) — long sought; found at used bookstore, very happy!

  - page: 13
    section: mana — Invitation to Fantasy (figures & plastic model)
    ja: >
      〈ベラ・ルゴシ〉〈クリストファー・リー〉 — 最近もっとも気に入っているフィギュア。
      階段の雰囲気、ゴシックな台、棺桶と壁の蝋燭。この立体感がサイコー!!
      ～プラモデル編～ 〈農家〉 — 3年前の誕生日にメンバーからプレゼント。忙しくてまだ作っていない。
      でも、そのうち作るよ！待っててちょーだい!!
      コスプレ写真、あなたのお部屋の写真などいろいろ送ってね。マニアな情報お待ちしてます！
    romaji: >
      Bela Lugosi & Christopher Lee figures; farmhouse plastic model gift from members; fan submission call.
    en: >
      Bela Lugosi & Christopher Lee figures — current favorites; Gothic stair base, coffin, wall candles.
      Plastic Model Edition — "Farmhouse" kit, birthday gift from members three years ago; too busy to build yet.
      "I'll make it eventually—wait for me!!"
      Send cosplay photos, room photos, enthusiast info to mana's column.

  - page: 14
    section: mana — Invitation to Fantasy (games)
    ja: >
      ～ゲーム編～
      〈PCエンジンGT〉COLOR液晶 — PCエンジンのカードゲームがそのまま使える、携帯用にイイ。
      〈セガ ジェネシス NOMAD〉COLOR液晶 — 海外物。変換キーで日本のメガドラカセットが使えるスグレ物。
      〈LSIゲーム〉 — なつかし～です！
      〈PCエンジンLT〉 — GTより画面が大きく見やすい！これは凄く高かった…。
      ここに紹介しているゲームはかなり昔の物で今は売っていません。
      レトロゲームを売っている所を知っている人は連絡下さい！
    romaji: >
      Game edition — PC Engine GT, Sega Nomad, LSI games (Dracula Joe etc.), PC Engine LT; retro game shop request.
    en: >
      Game Edition.
      PC Engine GT (color LCD) — uses HuCard games as-is, great portable.
      Sega Genesis Nomad (overseas) — plays Japanese Mega Drive carts with converter.
      LSI games — so nostalgic! (Dracula Joe, Dracula House visible.)
      PC Engine LT — bigger screen than GT, very expensive.
      Note: games shown are vintage and no longer sold; contact if you know retro game shops.

