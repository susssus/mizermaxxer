  - page: 4
    section: MALICE MIZER Photo Gallery (part 1)
    ja: >
      MALICE MIZER 写真館 — 今回はページも写真も増えて充実の写真館です。
      ファンクラブでしか公開しない、メンバーのいろんなポーズを十分にお楽しみ下さい。
      かかってこいよ、オイ(Gackt) / プライベートは勘弁してくれ(közi)・おでんはウマイ(mana) /
      オイ、オイ、冗談だってば おこるなよ(Gackt) / それじゃ2時間後におこしてくれ /
      SHOXX'98カレンダー編 — しっかりしろ～ だいじょうぶだよ 僕がいるから(Gackt)
    romaji: >
      MALICE MIZER shashinkan (part 1) — candid captions: Gackt's challenge and apology;
      Közi/Mana at yatai; bathroom nap; SHOXX calendar ocean shot.
    en: >
      MALICE MIZER Photo Gallery (part 1) — expanded FC-exclusive candid spread.
      Captions: "Come at me!" — Gackt; "Stay out of my private life" (Közi) / "Oden is delicious" (Mana);
      "Hey, hey, just kidding—don't get mad" — Gackt; "Wake me in two hours";
      SHOXX '98 calendar outtake — "Pull yourself together—it's okay, I'm here" — Gackt.

