  - page: 1
    section: Cover
    ja: null
    romaji: null
    en: >
      Cover — MALICE MIZER / ma chérie official fan club magazine. Combined issue
      (合併号) Vol. 6/7. Group portrait in Merveilles-era gothic costumes
      (Közi, Mana, Gackt, Yu~ki, Kami) in an ornate purple frame.

  - page: 2
    section: Contents
    ja: >
      CONTENTS — ツアースケジュール 1 / MALICE MIZER写真館 2 / プレミア上映会 7 /
      Gackt's Favorites 8 / mana様〜幻想への誘い〜 10 / 伯爵はカタレプシー 14 /
      kamiの独り言 16 / mana & kami 20 / コージーコーナー 22 /
      写真集発売のお知らせ 27 / 街で見つけた変なもの 28 / 似顔絵コーナー 30 /
      MALICE MIZER DISCOGRAPHY 34 / ma chérieからのお知らせ＆編集後記 36 /
      TOUR GOODS INFORMATION
    romaji: >
      CONTENTS — Tour Schedule; Photo Gallery; Premier Screening; Gackt's Favorites;
      mana Invitation to Fantasy; Count Is Catalepsy; Kami's Monologue; Mana & Kami;
      Közi Corner; Photobook Announcement; Strange Finds in Town; Portrait Corner;
      Discography; Notices & Afterword; Tour Goods.
    en: >
      Table of contents for the combined Vol. 6–7 issue. Major sections: Merveilles tour
      schedule, expanded photo gallery, premier screening snapshots, Gackt's movie/manga
      column, Mana collection pages, Yu~ki's Count Catalepsy collage, Kami's grandmother
      essay and Shibuya outing with Mana, Közi's cat-comic corner, photobook pre-order,
      fan-submitted street signs and portraits, discography through Merveilles, FC notices,
      and tour merchandise catalog.

