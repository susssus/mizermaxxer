  - page: 18
    section: Kami's Monologue
    ja: >
      Kamiの独り言 — 武道館リハ中、兄から97歳の祖母が亡くなったと連絡。
      17日の夜実家へ。小さくなった祖母の姿。通夜、葬儀、焼香、火葬場での両親の顔、軽い遺灰。
      翌日東京へ。色々な事情で落ち込んでいたが、家族・大切な人・親友・メンバー・音楽の支えで
      「1人じゃない」と実感。3月18日はアルバム発売日と葬儀日が重なった忘れられない日。
      明日は武道館。頑張ります。3月31日 筆
    romaji: >
      Kami no Hitorigoto — grandmother's death at 97 during Budokan rehearsals; funeral Mar 18
      coinciding with album release; gratitude to family, friends, members, music.
    en: >
      Kami's Monologue — written Mar 31.
      During Budokan rehearsal prep, his brother called: grandmother (97) had passed.
      Returned home the 17th; she looked so small. Wake, funeral, incense offering, cremation—
      parents' faces at the crematorium; ashes lighter than expected.
      Back to Tokyo next night. Depressed by various circumstances, but family, loved ones,
      close friends, members, and music showed him he wasn't alone.
      Mar 18—the album release day—was also the funeral; a day he'll never forget.
      "Tomorrow is Budokan. I'll do my best. Grandmother, please watch over me."

