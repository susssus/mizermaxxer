pages:
  - page: 1
    section: "Magazine p. 99 — feature opener"
    ja: >
      3月18日にメジャーデビューアルバムとなる「merveilles」を発表。4月1日には待望の日本武道館公演を行う
      MALICE MIZER。そんな現在絶好調の彼等を前号（SHOXX VOL.62）と連動して、大特集！。前号はあっと驚く
      サイバーチックフォトでしたが、今回は麗しきゴシック・ワールドに皆様を誘います。あわせて特集末の
      A to Z インタビューもお楽しみください。
    romaji: >
      3-gatsu 18-nichi ni mējā debyū arubamu to naru "merveilles" o happyō. 4-gatsu 1-nichi ni wa
      taibō no Nippon Budōkan kōen o okonau MALICE MIZER. Sonna genzai zekkōchō no karera o zengō
      (SHOXX VOL.62) to rendō shite, dai tokushū! Zengō wa atto odoroku saibā chikku foto deshita ga,
      konkai wa uruwashiki goshikku wārudo ni mina-sama o izonimasu. Awasete tokushū-matsu no
      A to Z intabyū mo o-tanoshimi kudasai.
    en: >
      Malice Mizer released major debut album merveilles on March 18 and will perform at long-awaited
      Nippon Budokan on April 1. This major feature links to the previous issue (SHOXX Vol. 62):
      where last time's startling cyber-chic photos left off, this time we invite you into a beautiful
      gothic world. Enjoy the A to Z interview at the end of the feature as well.

  - page: 2
    section: "Magazine p. 100"
    ja: null
    romaji: null
    en: >
      Mana in a blue Rococo gown with white lace ruffles and matching bonnet, holding a doll in
      similar dress. Antique room with upholstered chair, easel, and carved chest of drawers.
      Costumes: Yukari Ohba (Midi Nette). Photo: Sin Watanabe.

  - page: 3
    section: "Magazine p. 101"
    ja: null
    romaji: null
    en: >
      Member in red jester costume with gold trim and large tulle ruff, on a white spiral staircase
      (high-angle shot). Gothic makeup with pale skin and red lips.

  - page: 4
    section: "Magazine p. 102"
    ja: null
    romaji: null
    en: >
      Member in gold aristocratic/pirate-inspired outfit with tricorn hat, lace cuffs, yellow breeches,
      and platform boots, seated on an ornate carved wooden throne holding a cane.

  - page: 5
    section: "Magazine p. 103"
    ja: null
    romaji: null
    en: >
      Member in purple military-style jacket with silver embroidery, pink-feathered bicorne hat,
      and thigh-high black boots, seated with violin and bow. Grand interior with wooden staircase.

  - page: 6
    section: "Magazine p. 104"
    ja: null
    romaji: null
    en: >
      Two members: one in red jester outfit with platform boots standing; one in purple/silver
      costume with bicorne hat seated on staircase. Gothic arched window in background.

  - page: 7
    section: "Magazine p. 105"
    ja: null
    romaji: null
    en: >
      Three-member tableau: blue Rococo gown (left), gold aristocratic costume on throne (center),
      member with scythe on upper staircase landing (background right).

  - page: 8
    section: "Magazine p. 106"
    ja: null
    romaji: null
    en: >
      Close portrait: member in black floral-patterned coat with heavy gold embroidery and braided trim,
      long pointed black nails, holding an ornate golden staff with wing motif.

  - page: 9
    section: "Magazine p. 107 — spread finale"
    ja: null
    romaji: null
    en: >
      Wide ensemble shot from high angle in grand hall with chandelier: five members in full
