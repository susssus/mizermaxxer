  romaji: >
    p. 61 (scan 05): Yon-wari no menbā shashin nomi. Tekisuto wa bando-mei "MALICE MIZER" nomi.
  en: >
    p. 61 (scan 05): Four-panel member photos only. Text is limited to the band name "MALICE MIZER."
