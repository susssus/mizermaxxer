    MALICE MIZER — Gackt.C (Vo), MANA (G), Közi (G), YU~KI (B), Kami (Ds)
    1st ALBUM『merveilles』30万枚突破。4th SINGLE「ILLUMINATI」5.20 Release。
    お便り：Midi:Nette 〒150 渋谷区神南1-11-4 セントラルアパートments 701
  romaji: >
    MALICE MIZER — Gackt.C (Vo), Mana (G), Közi (G), Yu~ki (B), Kami (Ds)
    1st ALBUM "merveilles" 30-man mai tōpa. 4th SINGLE "ILLUMINATI" 5.20 Release.
    Ofanri: Midi:Nette 〒150 Shibuya-ku Jinnan 1-11-4 Central Apartments 701
  en: >
    MALICE MIZER — Gackt.C (Vo), Mana (G), Közi (G), Yu~ki (B), Kami (Ds).
    1st album Merveilles surpassed 300,000 copies. 4th single "ILLUMINATI" released May 20.
    Fan mail: Midi:Nette, Central Apartments 701, 1-11-4 Jinnan, Shibuya-ku, Tokyo 150.

