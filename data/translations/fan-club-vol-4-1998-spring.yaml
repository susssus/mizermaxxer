      必要事項は、①会員番号 ②旧住所 ③お名前 ④新住所（郵便番号、電話番号も） ⑤変更日。
      宛名シールに誤字脱字があった場合も同様にお願いします。
      〒142 東京都品川区荏原郵便局私書箱11号 ミディネット内 マシェリ TEL&FAX 03-3796-2028
    romaji: >
