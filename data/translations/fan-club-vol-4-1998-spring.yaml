  - page: 5
    section: FC Limited Event — Strawberry Picking Hato Bus Tour (Part 1)
    ja: >
      1997.2.23 晴れ。FC限定イベント HAPPY BIRTHDAY KAMI滅亡まであと17432日記念 いちご狩りはとバスツアー。
      行ってまいりました、はとバスツアー。だいぶ遅くなっちゃいましたけど、このイベントの模様をレポートします。
      AM8:00新宿集合→8:40出発→埼玉県長瀞町・宝登山で観梅（ロープウエー）→西武長瀞ホテルにて昼食→
      埼玉県秩父市のいちご園にていちご狩り→PM6:00新宿着。kamiはもちろん、メンバー全員とても楽しそうでした。
      この日乗ったロープウエー (közi加工済) もんきー号です。とっても快適でしたよ (kami)
      はーい皆さんこちらが梅百花園でーす。遅れないようについてきて下さいねー (mana)
      マセリの前にて。愛しい君たちへ… マセリ
      ツアー名の「マシェリ」が何と「マセリ」になっていて大笑い。昼食をとったホテルでのこと。（バスの名前は合ってたのに…）
    romaji: >
      FC gentei ibento — Feb 23 1997 Hato Bus tour to Nagatoro/Chichibu for plum blossoms and strawberry picking;
      ropeway Monkey No. 1; hotel misspelled ma chérie as "Maseri."
    en: >
      Feb 23, 1997 — sunny. FC Limited Event: HAPPY BIRTHDAY KAMI — 17,432 Days Until Destruction
      Commemoration Strawberry Picking Hato Bus Tour.
      We went on the Hato Bus tour—late report, but here it is.
      Schedule: 8:00 AM Shinjuku meet → 8:40 depart → plum viewing at Mt. Hodo, Nagatoro (ropeway) →
      lunch at Seibu Nagatoro Hotel → strawberry picking in Chichibu → 6:00 PM Shinjuku return.
      Kami and all members looked like they had a great time.
      The ropeway we rode today (processed by Közi)—Monkey No. 1. Very comfortable. (kami)
      Hello everyone, this is the Plum Blossom Garden. Don't get left behind. (mana)
      In front of "Maseri." To my beloved ones… Maseri.
      The tour name "ma chérie" was hilariously misspelled "Maseri" at the lunch hotel (the bus name was correct…).

  - page: 6
    section: FC Limited Event — Strawberry Picking Hato Bus Tour (Part 2)
    ja: >
      この日Kami君はGackt君にハッピーバースデーを歌わせました。あっぱれ！！ (kami)
      ここに集まってくれた皆にありがとうの言葉と今年の抱負を言いました。ちょっと涙目になってますグラサンの中は
      じゃかじゃかじゃかじゃかじゃんけんぽん！ (közi) ケーキ入刀。んー結婚式みたい、でも相手が……
      ケーキなんてとっても久しぶりとってもおいしかった (kami)
      西武長瀞ホテルでの昼食の様子。ここでご飯を食べた後みんなでKAMIの誕生日をお祝いしました。ケーキもおいしかった。
      おみやげにパンジーの鉢植えをもらって、いよいよメインイベントのいちご狩りに出発！
      バスで30分ほどの所にある秩父市のいちご園に移動しまーす。
      ちなみにバスの中ではメンバーへの質問大会で盛り上がったのでした。みんなで記念撮影
    romaji: >
      Hato basu tsuaa Part 2 — Kami birthday at Seibu Nagatoro Hotel; Gackt sings Happy Birthday;
      cake cutting; pansy gift; heading to strawberry farm; Q&A on the bus.
    en: >
      FC Limited Event — Hato Bus Tour (Part 2).
      This day Kami had Gackt sing Happy Birthday to them. Well done!! (kami)
      They thanked everyone who gathered and shared their resolutions for the year—teary-eyed behind their sunglasses.
      Jankenpon! (közi) Cutting the cake. Hmm, like a wedding, but the partner is……
      Cake—I haven't had it in so long, and it was delicious. (kami)
      Lunch at Seibu Nagatoro Hotel. After eating, everyone celebrated Kami's birthday—the cake was tasty too.
      Received potted pansies as souvenirs, then departed for the main event: strawberry picking!
      A 30-minute bus ride to the Chichibu strawberry farm.
      The bus ride featured a lively Q&A session with the members. Commemorative group photo.

  - page: 7
    section: FC Limited Event — Strawberry Picking Hato Bus Tour (Part 3)
    ja: >
      俺、ルパ〜ンしゃんせ〜！不二子ちゃ〜ん、イチゴうめ〜！ (közi) もぎたての果実のいーところ♪ (mana)
      イチゴ畑につまづいてズボンが赤く…
      フォフォフォ、これで999個目だー
      んーイチゴはウマイ 俺もイチゴに変身
      ここにもイチゴヘッドが！！ハリガネ痛いと言いながらも最後までつけてくれたバスガイドさん
      kami君はファン一人一人にちゃんと質問に答えてたよ。エライエライ (kami)
      はとバスツアーレポート、いかがだったでしょうか。こんな感じで楽しい一日はあっという間に過ぎていったのでした。
      またぜひ機会があればこんなイベントをやりたいですね。
    romaji: >
      Hato basu tsuaa Part 3 — strawberry picking antics; bus guide in strawberry headpiece;
      Kami answering every fan's questions; closing remarks.
    en: >
      FC Limited Event — Hato Bus Tour (Part 3).
      I'm Lupin the Third~! Fujiko-chan, these strawberries are delicious~! (közi)
      The best part of freshly picked fruit♪ (mana)
      Tripped in the strawberry field and my pants turned red…
      Fofofo, this makes 999 of them!
      Mmm, strawberries are tasty. I've transformed into a strawberry too.
      Another strawberry head here!! The bus guide wore it until the end even though the wires hurt.
      Kami-kun properly answered questions for every single fan. Good boy, good boy. (kami)
      How did you like the Hato Bus tour report? The fun day passed in the blink of an eye.
      If there's another opportunity, we'd definitely like to do an event like this again.

  - page: 8
    section: Looking Back on July 20th — Camui Gackt (Part 1)
    ja: >
      7月20日を振り返って Camui Gackt。
      7月20日。この日は俺にとって決して忘れることの出来無い日になった。
      前日からこの日のためにイメージトレーニングを続けていた。朝、目が覚めても"今日はいける"という気持ちはずっと続いていた。
      昼前に準備をして出かける用意も済み、後は迎えが来るのを待つだけだった。けれど、この日はいつも通りではなかった。
      俺には、いつも家で帰りを待ってくれている一匹の犬がいた。ベティーという名の彼女は俺にとってかけがえのない大事な家族だった。
      俺が出掛ける直前に突然痙攣を起こした彼女は、苦しそうな泣き声で何度も"助けて"と言っているようだった。
      すぐ病院に運んで診てもらうと、医者が言うには手術をしないとまず助からないだろうと、それに手術をしても体が耐えられないだろうと、
      助かる見込みはほとんど無いと。それでも助けて欲しいという願いで手術が始まった。俺はLiveのため側にいることも出来ずただ祈っていた。
      リハーサルが終わり本番を迎えるまで気分は最悪だった。そのまま本番に入った俺は正直、もう俺ではなかった。
      プロとしてステージに上がった以上、それ以外のことを今までステージに持って上がったことはないし、そうするつもりも全く無かった。
      でもこの日の俺は最低だった。ステージにも集中できず、ステージに立っている俺は何もかもが不安で一杯だった。
      まるで自分の声が自分のものでないみ
    romaji: >
      Shichigatsu nijūnichi o furikaette — Gackt on July 20 Akasaka BLITZ live; dog Betty's sudden seizure and surgery;
      unable to focus on stage. (Continued on next page.)
    en: >
      Looking Back on July 20th — Camui Gackt (Part 1).
      July 20th became a day I can never forget.
      I'd been doing image training since the day before; even waking that morning I felt "today I can do this."
      Ready to leave, waiting only for the car—but this day was not normal.
      Betty, my irreplaceable family, always waited at home. Just before I left she suddenly convulsed,
      crying as if begging "help me" again and again.
      At the hospital the vet said surgery was necessary but survival unlikely even then.
      Still, at my plea, surgery began while I could only pray, unable to stay by her side because of the live.
      From rehearsal through the show I felt awful. On stage I honestly wasn't myself.
      As a pro I've never brought private matters on stage—and never intended to—but this day I was at my worst.
      I couldn't concentrate; everything felt uncertain—as if my voice weren't even my own…

  - page: 9
    section: Looking Back on July 20th — Camui Gackt (Part 2)
    ja: >
      たいに、自分の耳が自分のものではないみたいに…
      Liveの中盤、俺の耳には全く音が聞こえなくなってしまった。なぜ、音が聞こえなくなったかは今でもわからない。
      でもLiveの最中は何度も耳や頭を叩いて音が聞こえるように必死だった。でも耳に入ってくるのはまるで水中にいるようにゴーッと響いてくるものだけだった。
      こんなに醜態をさらしたのは初めてだった。Liveがどうしようもない屈辱に抱かれていた。涙が止まらなかった。
      私情を挟んだ状態でステージに上がった俺は最低だった。
      Liveが終わりすぐ病院に向かった。手術は5時間以上かかったらしい。内臓の出血がひどく、縫合すれば終わるところまでいったが心停止し、
      マッサージをしたが無理だったそうだ。ここまで手術に耐えたのは奇跡に等しいと彼は言っていた。もう少しだったのに、と。
      横たわる体はまだ温かくて、生きているようだった。名前を呼ぶと起きてきそうだった。家に帰っても、どこかにいそうで探した。
      そのまま朝が来て病院に迎えに行った。火葬するために。すべてのことを終え21日のLiveが俺を待っていた。
      この日、俺は自分の出来るだけの力でステージに立ち、歌い、演じた。無我夢中だった。メンバーにも助けられた。
      所詮、どんな言い訳をしたところで過ぎた時間は戻らないし、20日にしかBLITZでLiveを見てない人にはどれだけ謝っても遅いのかもしれない。
      それでも今の俺は一言謝りたかった。だから今回、これを書こうと思った。
      7月20日、赤坂BLITZへ来た人達へ、本当にごめんなさい。俺はまた21日から自分自身を見直していこうと思っています。
      今回の出来事は俺にとってはとても大きな出来事でした。周りにとってはたかが犬だったかもしれない。でも俺にとっては最愛の家族だったから。
      21日、この日から俺自身、スタートしています。その俺を見て下さい。必ず感動という形で借りを返します。
    romaji: >
      Gackt essay Part 2 — mid-show hearing loss; Betty's death after surgery; cremation; Jul 21 performance;
      apology to Jul 20 BLITZ audience; promise to repay through emotion.
    en: >
      Looking Back on July 20th — Camui Gackt (Part 2).
      …as if my ears weren't my own. Mid-show I lost all hearing—I still don't know why.
      I desperately tapped my ears and head trying to hear, but sound came like muffled underwater roar.
      I'd never shown such a disgraceful state; the live felt like unbearable humiliation. Tears wouldn't stop.
      Going on stage with private feelings mixed in—I was at my worst.
      After the show I rushed to the hospital. Surgery lasted over five hours; severe internal bleeding;
      cardiac arrest at the final sutures despite massage. The vet said surviving that long was miraculous—"just a little more."
      Her body still felt warm, as if alive; calling her name I felt she'd wake. At home I searched everywhere though I knew she wasn't there.
      Morning came; I went to collect her for cremation. Then July 21's live awaited.
      That day I stood, sang, and performed with all I had—desperate, helped by the members.
      No excuse brings back lost time; to those who only saw July 20 at BLITZ, my apology may come too late—I understand that.
      Still I wanted to say I'm sorry, so I wrote this.
      To everyone who came to Akasaka BLITZ on July 20—I'm truly sorry. From July 21 I'll rebuild myself.
      This was enormous for me. To others "just a dog"—but to me, beloved family.
      From July 21 I start anew. Watch me. I'll repay the debt through moving you.

  - page: 10
    section: MANA-sama's Page (Part 1)
    ja: >
      ここから2P MANA様のページさっ！
      マナの怒りプンプンコーナー ～Mガゼットの時のショット～
      Mガゼットを見た人は分かると思うけどすごくヘンに写真合成されていてムチャクチャヘンな顔になっていたので（怒）ほんとーはこんな顔でした。
      今日はオレンジにしよっと。ちょっとふとって見える シクシク...
      オリコンでメイク講座というのをやった。こういうのは初めてだったのですごく面白かった。
      スタート→完成！ モデル小谷昌嗣くん 彼はデザイナーをやっているらしい。なかなかカッコイイので要チェックかも？！
    romaji: >
      MANA-sama no pēji Part 1 — angry corner over M-Gazette photo composite; blue-hair shots;
      Oricon makeup lecture with model Masatsugu Kotani.
    en: >
      From here—2 pages of Mana-sama's page!
      Mana's Angry Punpun Corner ~Shot from M-Gazette~
      Those who saw M-Gazette know my face was weirdly composited into something bizarre (angry)—really I looked like this.
      Today I'll go with orange. I look a bit fat. *Sob sob…*
      I did a makeup lecture at Oricon—first time, very interesting.
      Start → Complete! Model Masatsugu Kotani-kun—apparently a designer; quite cool, maybe check him out?!

