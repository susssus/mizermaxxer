  - page: 19
    section: Invitation to Mana's Fantasy World (TIME LIMIT! column)
    ja: >
      休刊となった雑誌「TIME LIMIT!」12号掲載予定のMANAのコラムを特別掲載。
      ～毒舌魔名様の幻想世界への誘い～
      朝、目が覚めると、爺やが万年筆と原稿用紙を持って立っていた。「どうしてもと頼まれまして」と泣いてまとわりついてきたからたいへん。
      そういう訳で今日は趣味の一部を見せてあげよう。
      ゲーム業界の人間が城にソフトを置いていく。ゲームとはアートであり、人を感動へと導くものでないといけない。
      3年前「夢見館の物語」を見た瞬間、ソフトクリームを落とした。その名前の響きが心の扉を開いた。
      幻想的な立体映像、洋館、花園、死の舞踏を感じさせるサウンド。地下への階段ではメイドを全員集め見させた。
      物語の終わりとゲームとの別れの寂しさの狭間で溺れていた。エンディング後、日常の世界に戻る溜息。
      気に入るゲームがあれば進呈したまえ。ゲーム業界の諸君、日々精進したまえ。次号は暗黒の貴公子、神威楽斗がノルウェーから来日。乞う、御期待。
      ＊SEGA MEGA-CD「夢見館の物語」
      ～アーティスト写真撮影の一コマ～
      今日はちょっとヒゲがはねてるなー (yu~ki)
      「人類コスプレ化計画」とは… 痛くなったらすぐC・E・D・P
    romaji: >
      Dokuzetsu Mana-sama no Gensō Sekai e no Izanai — unpublished TIME LIMIT! column on Mansion of Hidden Souls (SEGA MEGA-CD);
      artist shoot outtakes with Yu~ki and Mana/Közi.
    en: >
      Special publication of Mana's column intended for defunct magazine TIME LIMIT! issue 12.
      ~Invitation to the Fantasy World of the Sharp-tongued Lord Mana~
      My butler appeared with pen and manuscript paper, crying "I was asked no matter what"—quite an ordeal.
      So today I'll show part of my hobbies.
      Game industry people leave software at my castle. Games must be art that moves people.
      Three years ago seeing "Mansion of Hidden Souls" I dropped my soft-serve—the name opened my heart.
      Fantastic 3D images, mansion, garden, sound evoking a dance of death. At the basement stairs I gathered all maids to watch.
      Drowning between joy at the ending and loneliness at parting with the game. A sigh returning to everyday life.
      Present games you think I'd like. Game industry—keep refining yourselves. Next issue: Dark Prince Gackt Camui arrives from Norway.
      *SEGA MEGA-CD "Mansion of Hidden Souls"
      ~A scene from an artist photo shoot~
      My mustache is sticking out a bit today. (yu~ki)
      The "Humanity Cosplay-ification Plan" is… If it hurts, immediately C·E·D·P (Sedes parody).

