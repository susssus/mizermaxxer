  - page: 14
    section: The Count is Catalepsy — Yu~ki (Part 1)
    ja: >
      伯爵はカタレプシー。今回、私がカタレプシーになった素晴らしい音楽を紹介します。皆さんも一度聞いてみて下さい。(☆は私のお気に入り)
      this mortal coil／blood — 4ADのアーティストが集まって作られたアルバム。一曲目から最後まで部屋の明かりを消してヘッドホンで大音量で聞きましょう。(☆M8)
      PRAY／The Music From Heaven — オムニバス。MICHAEL NYMANからいきなり鳥肌もん。ジャケットphotoを撮ったAoi Tsutsumiさんが
      今回ヴェル・エールのジャケット、ブックレットなどを手がけてくれました。(☆M1,M5,M7,M12)
      LOREENA McKENNITT／the mask and mirror — 私のおススメはロリーナ・マケニット。民族打楽器などが彼女の声と共に心地よく心に響く。(☆すべて良い)
      ADIEMUS／SONGS OF SANCTUARY — ワールドミュージック、民族、クラシックなどが融合。スケールの大きな楽曲にきっと引き込まれる。(☆M5,M6)
