  - page: 12
    section: Ginza Cozy Corner — Közi
    ja: >
      銀座 コージーコーナー
      なに見てんだよぉー！ 飯のジャマするんじゃーにゃい！ Part.2
      最近ねむくてねむくて仕方がない。忙しいことはいいことだと言うけれど、今までの俺の生活スタイルになかったスピードで進んでいってるので結構しんどい。
      でもこれからのマリスミゼルが確実に音楽シーン（他、あらゆる分野）で革命を起こせるという確信をつかんでいるので、眠い目こすって日々精進しています。
      すっげーことが起きていくので覚悟しておくように。
      って、今回は締切まで何をしようか全く考えていなかったので、俺の大昔から最近までのいろんな写真をお見せしましょう。（これはまだほんの一部だ）
    romaji: >
      Ginza Kōjī Kōnā — Közi on exhaustion, Malice Mizer revolution, cat meal Part 2, photo collage intro.
    en: >
      Ginza Cozy Corner.
      What are you looking at! Don't get in the way of my meal-nya! Part 2
      Lately I'm so sleepy I can't help it. Being busy is good, but the pace exceeds anything my lifestyle has known—quite tough.
      Yet I'm certain Malice Mizer will revolutionize the music scene (and every field), so I rub my sleepy eyes and work hard daily.
      Incredible things are coming—be prepared.
      Since I hadn't thought at all about this deadline, I'll show various photos from long ago until recently. (Still just a fraction.)

