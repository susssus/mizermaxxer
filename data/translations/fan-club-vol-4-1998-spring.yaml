  - page: 16
    section: Kami's Soliloquy
    ja: >
      Kamiの独り言。
      -怒り編Part.1- ラルク・アン・シェルのSAKURAさん逮捕に関するデマ（一緒にやっていた、勧めた、目撃した等）への怒り。
      こんなバカなファンがいるなんて…。メンバーを信用出来ないファンなんていらない。もう二度と来るな!!
      けど俺の事マジで心配してくれたとっても良いファンもいました。ありがとう。うれしかったよ。
      -怒り編Part.2- 4月2日メジャー発表。表参道を衣装で歩くはずが、押し合いでケガした人も。警備の人が押さないでと言ってるのに後ろから押していた。
      そいつらのせいでやりたかった事が出来なくなった。4月2日は一生に一度の晴れ舞台だったのに…。これからはマナーを守って下さい。
      -メジャーデビューについて- かねてからの夢。今は心から音楽とドラムが好き。メジャーデビューは些細な出来事。
      死ぬまでドラマーでいたい。マリスは変化し続けるバンド。何も心配しないでついてきて下さい。
    romaji: >
      Kami no hitorigoto — anger at Sakura arrest rumors; Apr 2 Omotesando crowd crush cancelling parade;
      major debut reflection; keep following Malice Mizer.
    en: >
      Kami's Soliloquy.
      Anger Part 1 — Rumors about L'Arc-en-Ciel drummer Sakura's arrest (that I was involved, witnessed, etc.) were pathetic.
      Fans who can't trust the members aren't needed. Don't come again!! But fans who truly worried about me—I was grateful. Thank you.
      Anger Part 2 — Apr 2 major-debut announcement. We were supposed to walk Omotesando in costume, but pushing injured people;
      security asked people not to push yet some pushed from behind. Because of them we couldn't do what we wanted—that once-in-a-lifetime day…
      Please observe manners; good fans suffer because of the bad ones.
      About Major Debut — A long-held dream; now I truly love music and drums. Major debut is a small event.
      I want to be a drummer until I die. Malice keeps changing—don't worry, keep following us. We'll keep making music that moves you.

