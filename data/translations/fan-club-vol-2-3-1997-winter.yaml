pages:
  - page: 1
    section: Cover
    ja: Vol.2&3合併号
    romaji: Vol.2&3 gappei-gō
    en: >
      Cover — MALICE MIZER / ma chérie. Vol. 2 & 3 combined issue.
      Group portrait in Voyage-era costumes (Mana, Yu~ki, Gackt, Kami, Közi).

  - page: 2
    section: Schedule Corner
    ja: >
      スケジュールコーナー。3/24 新大阪メルパルクホール、4/1 渋谷公会堂（日本青年館追加公演）、
      3/29 クラブチッタ川崎（SHOCK WAVE）。全公演SOLD OUT。
      その他はDMとマシェリ直通留守番電話（月–金 11:00–19:00、時間外は留守電）。
      住所変更：ハガキで会員番号・旧住所・名前・新住所・変更日。☎&FAX 03-3796-2028（電話番号変更）。
    romaji: >
      Sukejūru Kōnā — Mar/Apr 1997 sold-out dates; DM/voicemail updates; address change; new phone 03-3796-2028.
    en: >
      Schedule Corner. Mar 24 Shin-Osaka Mielparque Hall; Apr 1 Shibuya Kokaido (Nippon Seinenkan add-on);
      Mar 29 Club Citta Kawasaki (SHOCK WAVE). All sold out.
      Further dates via DM and ma chérie voicemail (Mon–Fri 11:00–19:00; answering machine after hours).
      Address changes by postcard with membership number, old/new address, change date.
      Tel & fax 03-3796-2028 (number changed).

  - page: 3
    section: Kigeki no Bansan — ART MARJU DUCHAIN (Mana)
    ja: >
      96/11/8 ON AIR WEST 喜劇の晩餐 — MANA。
      ART MARJU DUCHAIN（文巳=Bottom Metal Noise、怪=Junk Noisy Voice、魔名=Art Performance/Guitar Noise）。
      セッションではなくちゃんとしたバンド。怪とは昔からの友人。大阪在住、毒々しいサウンドに興味。
      東京LIVEでは密かにサポート出演（みんな知らないだろう、ヘッヘッヘッ）。
      狂気・破壊の世界、マリスとは全然違う刺激。
      目玉はSMショー（※普段こんなことやってないよ）。人形作家でバンドもやる女性——人形好き必見。
    romaji: >
      Kigeki no Bansan — Mana on noise band ART MARJU DUCHAIN; secret Tokyo support gigs; SM show highlight;
      doll-maker Amamiya Karin (Hime Karin band).
    en: >
      Nov 8, 1996 — ON AIR WEST, Supper of Comedy. Mana reports on ART MARJU DUCHAIN.
      Members: Fumi (bottom metal noise), Kai (junk noisy voice), Mana (art performance/guitar noise).
      A real band, not a one-off session. Kai is an old friend from Osaka—I loved their poisonous sound and secretly
      supported when they played Tokyo (you probably didn't know, heh heh heh). Madness and destruction—totally unlike Malice; stimulating.
      Highlight was probably the SM show (*I don't usually do this*). The woman is a doll maker also in a band—doll fans must see.
      [Amamiya Karin / band Hime Karin.]

  - page: 4
    section: Kigeki no Bansan — 3P Mayonnaise (Kami)
    ja: >
      96/11/8 喜劇の晩餐 — KAMI。3Pマヨネーズ。
      Vo.かっちん、Dr.Kami、G.しんご、B.灰二で決定、マリススタジオでリハ。
      前日Voが出られず、しんごと朝まで飲んでがっかり。急遽Vo.Kami、G.しんご、B.たけし、Dr.しげちゃんで
      イエモン2曲のみ。リハほぼなし。テクニカルドラムが聴かせられなくてごめんなさい。
    romaji: >
      3P Mayonnaise — planned lineup fell through; Kami sang two The Yellow Monkey songs with substitute members; almost no rehearsal.
    en: >
      Nov 8, 1996 — Supper of Comedy. Kami — 3P Mayonnaise.
      Planned: Katchin (vo), Kami (dr), Shingo (g), Haiji (b)—rehearsed hard at Malice's studio.
      Vocalist cancelled day before; Kami and Shingo drank till morning in despair.
      Emergency lineup: Kami (vo), Shingo (g), Takeshi (b), Shige-chan (dr)—only two Yellow Monkey songs.
      Almost no rehearsal. Sorry I couldn't show the technical drumming unlike Malice.

  - page: 5
    section: Kigeki no Bansan — BRAND NEW LOVER (Közi)
    ja: >
      96/11/8 喜劇の晩餐 — KÖZI。BRAND NEW LOVER。
      福山敦司(Pride of Mind)、KÖZI、キドタロー(A+B No.Ø 9P)。
      一番リハに時間をかけた。打ち込みで福ちゃんと早くから作業。マリスのリハとぶつかってしんどかった。
      LIVEはすごく楽しかった。ファッショナブルでロマンティックなモダンポップ——音楽的ルーツかも。
      SET LIST: JACKY, NAKED, LA ISLA BONITA, HANDS ACROSS THE OCEAN, TAKE ON ME,
      IN TO THE NIGHT (Pride of Mind), MY HEART GOES BANG.
      誰の曲？が多かったが『ベストヒットUSA!! 小林克也です！』も——ナイスメニュー。
    romaji: >
      BRAND NEW LOVER — Közi cover session with Fukuyama Atsushi & Kido Taro; extensive rehearsal; set list of 80s/modern pop covers.
    en: >
      Nov 8, 1996 — Supper of Comedy. Közi — BRAND NEW LOVER.
      Fukuyama Atsushi (Pride of Mind), Közi, Kido Taro (A+B No.Ø 9P).
      Rehearsed the most of any Bansan band; programmed parts with Fukuyama early; clashed with Malice rehearsals—brutal.
      Live was great—fashionable romantic danceable modern pop, maybe my musical roots.
      Set: JACKY (Mark Almond), NAKED (Louise), LA ISLA BONITA (Madonna), HANDS ACROSS THE OCEAN (The Mission),
      TAKE ON ME (a-ha), IN TO THE NIGHT (Pride of Mind), MY HEART GOES BANG (Dead or Alive).
      Many asked "whose song?"—including one that makes you say "Best Hit USA!! This is Katsuya Kobayashi!" Nice menu.

  - page: 6
    section: Kigeki no Bansan — BOØWY & MARACAS (Yu~ki & Gackt)
    ja: >
      96/11/8 喜劇の晩餐。
      暴威 BOØWY — Yu~ki: Vo.MASAHIRO & G.TSUTOMU(KeepFAITH), B.YU-KI, Dr.NAO。
      プレッシャーなしでBOØWYコピー。CASE OF BOØWYの曲順再現。原宿でBOØWY Tシャツ、ホテイモデルギター。
      SET: INTRO, IMAGE DOWN, BABY ACTION, CLOUDY HEART, LONDON GAME, ON MY BEAT, DREAMIN'.
      MARACAS — Gackt: Mascheraメンバーと幼なじみYou。他メンバーと被らないジャンルで勝負。
      曲順: Beauty and Harmony, Tomorrow Never Knows, 抱きしめたい, ガッツだぜ, アジアの純真, おかしな二人, がんばりましょう。
      詳しい様子は次号で。
    romaji: >
      Bansan — Yu~ki BOØWY tribute (Set list Case of BOØWY style); Gackt MARACAS session with Maschera/You; details next issue.
    en: >
      Nov 8, 1996 — Supper of Comedy.
      BOØWY tribute "Boui" — Yu~ki: Masahiro (vo), Tsutomu/KeepFAITH (g), Yu~ki (b), Nao (dr).
      Wanted pressure-free fun like old days; childhood friend Tsutomu; recreated Case of BOØWY set order;
      Nao bought BOØWY T-shirts in Harajuku; white-tape "Hotei model" guitar.
      Set: INTRO, IMAGE DOWN, BABY ACTION, CLOUDY HEART, LONDON GAME, ON MY BEAT, DREAMIN'.
      MARACAS — Gackt: called Maschera and childhood friend You; chose genre others wouldn't; competitive drive.
      Set: Beauty and Harmony, Tomorrow Never Knows, Dakishimetai, Gattsu daze, Asia no Junshin, Okashina Futari, Ganbarimashou.
      Full report next issue.

  - page: 7
    section: 984 Hours Until Seinenkan — Gackt diary (part 1)
    ja: >
      日本青年館までの984時間の中で — Camui Gackt。
      青年館までの時間の流れと感じた事を書く。一緒に時間の流れを感じて下さい。
      12/3–12/12: リハーサル、VTRチェック、SHOXX取材（Manaと）、不眠症、新曲作成、
      青年館打ち合わせ、BREAK OUT VTR、ピアノメロディー徹夜、MASCHERAのTOMOと電話等。
    romaji: >
      Nihon Seinenkan made no 984 jikan — Gackt diary Dec 3–12: rehearsals, press, insomnia, songwriting, Seinenkan meetings, all-nighters.
    en: >
      In the 984 Hours Until Nippon Seinenkan — Camui Gackt (part 1).
      I'll write the flow of time until Seinenkan and what I felt—feel time pass with me.
      Dec 3 Tue: Rehearsal 13:00–19:00 focusing on Seinenkan program; meetings till 02:00; songwriting till dawn.
      Dec 4 Wed: VTR check Shibuya; wandered town; composition meeting inconclusive.
      Dec 5 Thu: Insomnia ~2–3h sleep; watched Léon again; SHOXX interview with Mana till 01:00; songwriting.
      Dec 6 Fri: More insomnia; rehearsal 14:00–20:00, sluggish.
      Dec 7–8 Sat–Sun: Fever—slept two days.
      Dec 9 Mon: Rehearsal new songs; M-Gazette interview, barely remember (alcohol).
      Dec 10 Tue: First Seinenkan staff meeting; secret evening; solo composition all-nighter.
      Dec 11 Wed: Naps en route; BREAK OUT VTR meeting; piano melody till dawn—basic form done.
      Dec 12 Thu: Rehearsal for Dec 27 ON AIR WEST set; tried other parts for stress relief; called TOMO (Maschera).

  - page: 8
    section: 984 Hours Until Seinenkan — Gackt diary (part 2)
    ja: >
      12/13–12/27: Maschera LIVE感想、新曲スランプ、ピアノ協奏曲、ファンレター、写真撮影、
      悪夢と知人の死（京都）、新曲『ベル・エール 空白の時のなかで』完成、青年館下見、
      通しリハ（隣でX）、ちゃんちゃんこ試着、ON AIR WEST（MICHIのギタートラブル）等。
    romaji: >
      Diary Dec 13–27: Maschera live; Bel Air song completed Dec 19; Seinenkan walkthrough; run-throughs; hanten costumes; Dec 27 live.
    en: >
      In the 984 Hours Until Nippon Seinenkan — Gackt (part 2).
      Dec 13 Fri: Off but finished drum concerto; praised Maschera's opening live.
      Dec 14 Sat: Song slump—two new songs stuck.
      Dec 15 Sun: Piano/keyboard concerto finalized—took too long.
      Dec 16 Mon: Wrote fan replies; photo shoot went well.
      Dec 17 Tue: Wandered city/bookstores; rehearsal—Seinenkan program nearly complete acoustically.
      Dec 18 Wed: Nightmare; chest pain; learned acquaintance died in Kyoto—rage and helplessness.
      Dec 19 Thu: New song "Bel Air ~Kuuhaku no Toki no Naka de~" completed—gave form to grief; rehearsal till midnight.
      Dec 20 Fri: Seinenkan site visit—smaller than expected; 20 days to finish; concept emerging.
      Dec 21–22 Sat–Sun: New song nearly done; run-through prep; X rehearsing next door till 23:00+.
      Dec 23 Emperor's Birthday: Three run-throughs; concerto practice with Kami/YO-HEI postponed; drinks with SAKI (BLUE).
      Dec 24 Tue: Finish remaining new song; piano solo practice on Christmas Eve with YO-HEI.
      Dec 25 Wed: Midi:Nette interview; piano solo practice.
      Dec 26 Thu: Rehearsal for 27th; bought hanten—four members tried on piles of them (" bizarre sight").
      Dec 27 Fri: ON AIR WEST; talked with MICHI; guitar trouble stopped set 15 minutes—disappointing; after-party with MICHI till 05:30.

  - page: 9
    section: 984 Hours Until Seinenkan — Gackt diary (part 3)
    ja: >
      12/28–1/10: 疲れて記憶なし、京都へYO-HEIと、年越しINDEPENDENCE DAY、
      1/1「マリスに正月はない。俺に正月を返せ！」、新曲仕上げ、ピアノソロ(regret)、
      通しリハ3回（衣装着用）、1/7の欲求不満独白、1/8最終リハ、1/10 22:00 日本青年館終了。
    romaji: >
      Diary Dec 28–Jan 10: Kyoto trip; no New Year for Malice; regret piano solo; final rehearsals; Jan 10 22:00 Seinenkan ends.
    en: >
      In the 984 Hours Until Nippon Seinenkan — Gackt (part 3).
      Dec 28 Sat: Too tired to remember.
      Dec 29 Sun: Polish Seinenkan songs; drive to Kyoto with YO-HEI overnight.
      Dec 30–31: Kyoto acquaintance's home; old friends till dawn; New Year's Eve movie Independence Day—too moved to sleep.
      Jan 1: "Malice has no New Year. Give me my New Year back!" Someone give me otoshidama.
      Jan 2 Thu: Finished new songs in one day; early sleep for tomorrow.
      Jan 3 Fri: Piano solo practice with YO-HEI—"regret" balances set.
      Jan 4 Sat: Concerto must be shaped; rehearsal ends 02:00, exhausted.
      Jan 5 Sun: Full run-through with most staff—many stops; costumes not 100%; all-nighters.
      Jan 6 Mon: Run-through in costume; staff meeting looked confident; throat OK-ish; mental run-through at home.
      Jan 7 Tue: Solo practice—wants better piano; provocative frustration about no women in studio.
      Jan 8 Wed: Final rehearsal—three run-throughs; never used stage set—main worry; concert already imagined in head.
      Jan 9 Thu: YOU arrives from Kyoto; tense about next day.
      Jan 10 Fri 22:00: Nippon Seinenkan — finished.

  - page: 10
    section: MANA Private Photo Gallery Vol. 2
    ja: >
      MANA 第2回 ～プライベート写真館の巻～
      吸血鬼ノスフェラトゥー — ガレージキット。年1–2回のフェスで購入。箱では手足バラバラ真っ白、筆で命を吹き込む。今一番のお気に入り。
      「バミューダの謎」映画を探しています by ノスフェラトゥ。
      ビデオコレクションの一部。マニアックなビデオ情報を教えて下さい。
    romaji: >
      MANA dai-nikai — Nosferatu garage kit; seeking Bermuda Mystery film; horror VHS collection request.
    en: >
      MANA Vol. 2 — Private Photo Gallery.
      Vampire Nosferatu — garage kit bought at annual festival; assembled and painted from white parts; current favorite.
      Speech bubble: seeking film "The Mystery of Bermuda"—tell me if you know. by Nosferatu.
      Part of home video collection—send niche video tips.

  - page: 11
    section: Közi photo collage
    ja: >
      おれたちのダンスビートについてこれるか!? / んっ、このスパゲティー気になるなあ…… /
      おーい 早く行こうぜー by KÖZI / 今日はKÖZIの赤い彗星号で首都高でもせめに行くか…… /
      第1回、2回プライベート写真館どうでしたか？あなたのプライベート写真、面白い部屋の写真などどしどし送ってね!! ※抽選でいい物プレゼント!!
    romaji: >
      Közi photo captions — dance beat, supermarket spaghetti, red comet bike on Shuto Expressway; fan photo contest with prizes.
    en: >
      Can you keep up with our dance beat!? / Hmm, this spaghetti looks interesting… /
      Hey, let's go— by Közi / Shall we charge the Shuto Expressway on Közi's Red Comet today… /
      How were Private Photo Galleries 1 & 2? Send your private photos and interesting rooms!! *Lottery prizes!!*

  - page: 12
    section: Ginza Cozy Corner — Közi (part 1)
    ja: >
      銀座 コージーコーナー 第2回。猫が一匹増えた——ララ（生後2ヵ月メス）。
      ペットショップで「タダでくれてやる、もってけドロボー」。ザクが最初ビビってファーファー。
      仲良くなって一安心。ウチは崩壊。ムカツクけどまーいっかー。
      猫の話はここまで。今回は自分のこと——「んーましぇり!」
      趣味の範囲がわからない。広く浅く、好奇心旺盛な何でも知りたがり。兄貴!
    romaji: >
      Kōjī Kōnā #2 — new kitten Lala; Zaku hissed then befriended; chaotic house; Közi on broad shallow curiosity.
    en: >
      Ginza Cozy Corner #2. Another cat—Lala (2-month female), free from pet shop ("take it, thief").
      Zaku hissed at first; now friends; house collapsing—annoying but whatever.
      Enough about cats—about me… "Ma chérie!"
      I don't know where hobby ends; wide and shallow type; curious about everything. Bro!

  - page: 13
    section: Ginza Cozy Corner — Közi (part 2)
    ja: >
      今でも好きなこと：CD買いあさり（350枚位）、部屋をアート空間に、まったり（各種）、
      アングラ、知らない町探検、カレー、飲む・打つ・買う、TATTOO（増え続けそう）、
      金があれば即買い、みんなでバカ騒ぎ、瞑想、超常現象、キリのない話。
      訳わかんなくなりそうなのでキリ上げ。本当にちょこっとしか話せなかったが最後まで読んでくれた君!
      「ありがとう、おいしかったよ。」（低いトーン）「アディオス!」（※うきょっ、うきょっ）
    romaji: >
      Közi hobbies: ~350 CDs, art room, underground, curry, drink/gamble/shop, tattoos, meditation, paranormal talk; Adios with "ukyo ukyo."
    en: >
      Things I still love: hoarding CDs (~350), art-space room, relaxing (many types), underground world, exploring towns,
      curry, drink/gamble/buy, tattoos (spreading), spend money instantly, rowdy group fun, meditation, paranormal talk, endless conversation.
      Getting incoherent—stopping here. You who read to the end despite my brief talk!
      "Thank you, it was delicious." (low tone) "Adios!" (*add "ukyo, ukyo" for effect*)

  - page: 14
    section: The Count Is Catalepsy — column intro (Yu~ki)
    ja: >
      伯爵はカタレプシー — タイトルの由来。
      カタレプシー：全身硬直。早すぎた埋葬と吸血鬼伝説。カタプレキシー：情動性緊張消失、「腰が抜ける」に近い。
      私を硬直させたすばらしい物・音・映像を紹介するコーナー。今回：
      吊りカゴとキャンドルスタンド — ファンからのプレゼント。前号を見てくれた方、ありがとう。
    romaji: >
      Catalepsy vs cataplexy explained; fan gifts hanging basket and stained-glass candle stand.
    en: >
      The Count Is Catalepsy — explaining the title.
      Catalepsy: bodily rigidity linked to premature burial and vampire lore.
      Cataplexy: emotional collapse, knees buckling—closer to my column, but I chose catalepsy for vampire flavor.
      Column introduces things that paralyze me with greatness.
      This time: hanging basket & candle stand—fan gifts after reading last issue. Thank you; displayed in my room.

  - page: 15
    section: The Count Is Catalepsy — manga & fishing (Yu~ki)
    ja: >
      釣りキチ三平 — 本当にすばらしい!! ワイド版再刊。三平が大物を釣るとにやけてしまう。
      利根川のアマゴ — 昨年最大29cm。1泊2日。釣り上げ後震えが止まらず見つめた。今年の目標は尺上(30cm以上)。
      カタレプシーになる物を募集。ヴァンパイア物はかなりイケる。
    romaji: >
      Tsurikichi Sanpei manga praise; Tone River amago 29cm; seeking catalepsy-inducing items especially vampire-themed.
    en: >
      Tsurikichi Sanpei — truly wonderful!! Wide edition reprint; I grin when Sanpei lands big fish—read it.
      Tone River amago — my biggest last year, 29 cm, overnight trip; trembling after landing, stared at it.
      This year's goal: shaku-grade (30 cm+).
      Seeking things that induce catalepsy—vampire items especially welcome.

  - page: 16
    section: Kami's Soliloquy
    ja: >
      Kamiの独り言 — 明けましておめでとう。
      感動編：青年館LIVE、KÖZIに肩を組まれて涙（言ってない）。親が来て親バカに、弟が尊敬の眼差し。
      号泣編：親友ハムスター宮下君が帰らぬ旅路。忙しくてエサ忘れ。死のはかなさに号泣。
      たわごと編：新ファンの「一目惚れ」「愛してます」に疑問——音楽を深く楽しんで共感して。
      思い出編：色々なバンドを経て、やり続ける意味、支えに感謝。
      怒り編：ファン同士のケンカ・いじめ。LIVEは音楽（演出）を楽しみに来て。子供相談室神村お兄さんまで。
      2代目ハムスター命名募集→マシェリ「ハムスター命名係」へ。
    romaji: >
      Kami no hitorigoto — Seinenkan moved to tears; hamster Miyashita died; fan bullying rant; name the new hamster contest.
    en: >
      Kami's Soliloquy — Happy New Year; support Malice and Kami.
      Moving: Satisfying Seinenkan live; Közi's arm around shoulder brought tears (didn't tell them); family proud.
      Wailing: Pet hamster "Miyashita-kun" died—too busy, forgot to feed; grief at life's fragility.
      Drivel: Confused by shallow "love at first sight" fan letters—please engage deeply with our music.
      Memories: Many bands, perseverance matters; thanks to members, staff, fans.
      Anger: Fan fights/bullying—come for music and staging, not jealousy. Report to "Counselor Kamimura-oniisan."
      Announcement: naming contest for second-generation hamster—send to ma chérie Hamster Naming Desk.

  - page: 17
    section: Am I a Narcissist? — Yu~ki
    ja: >
