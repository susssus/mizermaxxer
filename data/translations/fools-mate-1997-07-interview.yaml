intro:
  ja: >
    6月に初のビデオ作品『sans retour Voyage "derniere"～encoure une fois～』をリリースするマリス・ミゼル。
    4月1日に行った渋谷公会堂でのインディーズ・ラスト・ライヴのダイジェスト版と銘打たれたこの作品について、
    そして夏に控えたスタンディング・ツアー "Pays de merveilles" の真相を探るインタヴューだ。
  romaji: >
    6-gatsu ni hatsu no bideo sakuhin "sans retour Voyage 'derniere' ~encoure une fois~" o
    ririisu suru Marisu Mizeru. 4-gatsu 1-nichi ni okonatta Shibuya Kōkaidō de no indiizu
    rasuto raivu no daijesuto-ban to meidai rareta kono sakuhin ni tsuite, soshite natsu ni
    hikaeta sutandingu tsuā "Pays de merveilles" no shinsō o saguru intabyū da.
  en: >
    Malice Mizer will release their first video work, sans retour Voyage "derniere"
    ~encoure une fois~, in June. This interview explores that release—billed as a digest
    of their indies last live at Shibuya Public Hall on April 1—as well as the truth behind
    their upcoming summer standing tour, Pays de merveilles.

dialogue:
  # —— Page 43 ——
  - speaker: interviewer
    ja: >
      ——少し時間がたちましたが、"sans retour Voyage "derniere"～encoure une fois～" の最終公演となった渋谷公会堂というのは、メンバー側にとってはどんなライヴになりました？
    romaji: >
      ——Sukoshi jikan ga tachimashita ga, "sans retour Voyage 'derniere' ~encoure une fois~"
      no saishū kōen to natta Shibuya Kōkaidō to iu no wa, menbā-gawa ni totte wa donna raivu ni narimashita?
    en: >
      ——Some time has passed, but how was the Shibuya Public Hall show—the final performance
      of sans retour Voyage "derniere" ~encoure une fois~—for you as members?

  - speaker: mana
    ja: 渋公ってキャパ自体は青年館の倍くらいのはずなんだけど、案外あんまり大きさって変わらない感じがしたかな。
    romaji: Shibukō tte kyapa jitai wa Seinenkan no bai kurai no hazu nan da kedo, angai anmari ōkisa tte kawaranai kanji ga shita kana.
    en: Shibukō's capacity should be about twice Seinenkan's, but it didn't really feel that much bigger.

  - speaker: gackt
    ja: ……（舞台からの）ほんと、見た目的に小さかったですよ。
    romaji: ……(Butai kara no) honto, mitai teki ni chiisakatta desu yo.
    en: ……From the stage, it really looked small.

  - speaker: mana
    ja: 人に聞いたら、昔の建物で設計の基準とかが今と違って、椅子の間隔がすごくせまいから、そう見えるらしいんですけど。
    romaji: Hito ni kiitara, mukashi no tatemono de sekkei no kijun toka ga ima to chigatte, isu no kankaku ga sugoku semai kara, sō mieru rashii n desu kedo.
    en: I heard that because it's an older building with different design standards, the seats are packed very close together, so it looks that way.

  - speaker: gackt
    ja: ……ステージ自体も立った感覚として、けっこう狭かったしね。まあ、でも確実に青年館よりも先に進んだライヴが出来たっていう実感はありますよ。ただ、とにかく終わったことなんで、今はもう先のことがしきれないです。日々精進を重ねて頑張っていかなきゃな、という。やっぱり、ライヴやって、"ああ良かった"って満足しちゃったら、そこで終わりじゃないですか？
    romaji: ……Sutēji jitai mo tatta kankaku to shite, kekkō semakatta shi ne. Maa, demo kakujitsu ni Seinenkan yori mo saki ni susunda raivu ga dekita tte iu jikkan wa arimasu yo. Tada, tonikaku owatta koto nan de, ima wa mō saki no koto ga shikirenai desu. Hibi shōjin o kasanete ganbatte ikanakya na, to iu. Yappari, raivu yatte, "aa yokatta" tte manzoku shichattara, soko de owari ja nai desu ka?
    en: ……The stage itself felt pretty cramped when we were on it. Still, I definitely feel we moved forward from Seinenkan. But it's over now, so I can't dwell on it—I have to keep improving day by day. If you do a live and think "that was great" and feel satisfied, that's the end, isn't it?

  - speaker: kozi
    ja: あれ、じゃあ僕たちってもう終わり？（笑）。
    romaji: Are, jaa bokutachi tte mō owari? (warai).
    en: Wait, so we're already finished? (laughs)

  - speaker: kami
    ja: そうらしい（笑）。
    romaji: Sō rashii (warai).
    en: Apparently so (laughs).

  - speaker: interviewer
    ja: ——まあ、そのあたりはメンバー個々によってとらえ方も違うんでしょうけど。
    romaji: ——Maa, sono atari wa menbā koko ni yotte toraekata mo chigau n deshō kedo.
    en: ——Well, I suppose each member sees that differently.

  - speaker: kami
    ja: 僕の場合、渋公って前からやりたかったところなんですけど、いざライヴが始まっちゃったら、そういうこと以前にライヴそのものに熱中しちゃってました。あと、個人的には大阪はちょっといろんな精神的なダメージとかの影響で、全く納得がいかなかったんですよ。でも、渋公ではそれを乗り越えて出来たんで、それに関しては良かったなっていうのがあります。もちろん、プレイ的にはまたまたっていうのもあるんだけど、精神的な面で良かったなって。
    romaji: Boku no baai, Shibukō tte mae kara yaritakatta tokoro nan desu kedo, iza raivu ga hajimacchattara, sō iu koto izen ni raivu sono mono ni nesshin shichattemashita. Ato, kojin teki ni wa Ōsaka wa chotto irro na seishin teki na damēji toka no eikyō de, mattaku nattoku ga ikanakatta n desu yo. Demo, Shibukō de wa sore o norikoete dekita n de, sore ni kanshite wa yokatta na tte iu no ga arimasu. Mochiron, purei teki ni wa mata mata tte iu no mo aru n da kedo, seishin teki na men de yokatta na tte.
    en: For me, I'd wanted to play Shibukō for a long time, but once the live started I was completely absorbed in the performance itself. Personally, Osaka left me mentally unsatisfied for various reasons, but at Shibukō I got past that, and I'm glad about that. Of course there's still room to improve musically, but spiritually it felt good.

  - speaker: gackt
    ja: あの、kamiは（ずっと）良い顔してましたよ。気迫も凄かったし。
    romaji: Ano, Kami wa (zutto) ii kao shite mashita yo. Kihaku mo sugokatta shi.
    en: Kami had a great expression the whole time. Their intensity was incredible.

  - speaker: kami
    ja: 最後は感動したしね。ドラム台って、セットの2階にあったじゃないですか。そうすると、ちょうど2階席の人たちと目線が同じ高さなんですよ。だから、最後の方で客席に照明が当たってお客さんの顔がよく見えるようになった時とかは、ちょっとホロリと来たりして。
    romaji: Saigo wa kandō shita shi ne. Doramu dai tte, setto no 2-kai ni atta ja nai desu ka. Sō suru to, chōdo 2-kai seki no hito-tachi to mesen ga onaji takasa nan desu yo. Dakara, saigo no hō de kyakuseki ni shōmei ga atatte o-kyaku-san no kao ga yoku mieru yō ni natta toki toka wa, chotto horori to kitari shite.
    en: I was moved at the end. The drum riser was on the second level of the set, right? So I was at eye level with the second-floor seats. When the house lights came up near the end and I could see the audience's faces, I got a little teary.

  - speaker: interviewer
    ja: ——そうでしたか。あと、ドラム・ソロでは光るスティックが初登場でしたよね？
    romaji: ——Sō deshita ka. Ato, doramu soro de wa hikaru sutikku ga hatsu tōjō deshita yo ne?
    en: ——I see. And those glowing drumsticks debuted during your solo, didn't they?

  - speaker: kami
    ja: 良かったです。あれ？
    romaji: Yokatta desu. Are?
    en: They were good, right?

  - speaker: interviewer
    ja: ——よく光ってました。
    romaji: ——Yoku hikattemashita.
    en: ——They glowed beautifully.

  - speaker: kami
    ja: あ、そうですか（笑）。
    romaji: A, sō desu ka (warai).
    en: Oh, really? (laughs)

  - speaker: interviewer
    ja: ——Köziさんは、いかがでした？
    romaji: ——Közi-san wa, ikaga deshita?
    en: ——And you, Közi?

  - speaker: kozi
    ja: 遠い昔の話なんで、もう忘れました。
    romaji: Tōi mukashi no hanashi nan de, mō wasuremashita.
    en: That was so long ago, I've forgotten.

  - speaker: kozi
    ja: ただ、一つ覚えてるのはmanaちゃんがやったソロ・コーナーのダンスで、久しぶりに履いたピン・ヒールが大変だったこと。
    romaji: Tada, hitotsu oboeteru no wa Mana-chan ga yatta soro kōnā no dansu de, hisashiburi ni haita pin hīru ga taihen datta koto.
    en: I do remember one thing—during Mana's solo dance, those pin heels they hadn't worn in ages were brutal.

  - speaker: mana
    ja: 俺がせっかくキメ・ポーズでビシッとやってるのに、脇でコロンコロンって転がってる人がいたっていう（笑）。
    romaji: Ore ga sekkaku kime pōzu de bishitto yatteru no ni, waki de koron koron tte korogatteru hito ga ita tte iu (warai).
    en: I'm striking a pose and looking sharp, and meanwhile someone's rolling around beside me (laughs).

  - speaker: all
    ja: （笑）。
    romaji: (warai).
    en: (laughter)

  - speaker: mana
    ja: 密室のエロスを表現した、あのシーンで転ばれるとツラいからね（笑）。
    romaji: Misshitsu no erosu o hyōgen shita, ano shīn de korobareru to tsurai kara ne (warai).
    en: That scene was meant to express eros in a closed room—falling there would be rough (laughs).

  - speaker: gackt
    ja: 渋公では大丈夫でしたよね？
    romaji: Shibukō de wa daijōbu deshita yo ne?
    en: You were fine at Shibukō, though?

  - speaker: kozi
    ja: かなり大変でしたけどね。
    romaji: Kanari taihen deshita kedo ne.
    en: It was still pretty tough.

  - speaker: interviewer
    ja: ——大変といえば、Yu~kiさんもあの日、"宙づり・フライング"になるシーン（先のライヴ・レポートおよび裏表紙参照）があったじゃないですか。あれ、コワクなかったです？
    romaji: ——Taihen to ieba, Yu~ki-san mo ano hi, "chūzuri furaiingu" ni naru shīn (saki no raivu repō oyobi ura hyōshi sanshō) ga atta ja nai desu ka. Are, kowakunakatta desu?
    en: ——Speaking of tough—that day Yu~ki had the wire-flying scene (see the live report and back cover). Weren't you scared?

  - speaker: yuki
    ja: 高いとこ、あまり好きじゃないんですよ。あれは大阪と東京でやったんですけど、慣れないせいか胃が痙攣しちゃったりして大変でした。
    romaji: Takai tokoro, amari suki ja nain desu yo. Are wa Ōsaka to Tōkyō de yattan desu kedo, narenai sei ka i ga keiren shichattari shite taihen deshita.
    en: I don't really like heights. We did it in Osaka and Tokyo, but because I wasn't used to it my stomach cramped up—it was awful.

  - speaker: interviewer
    ja: ——するでしょうね、あれは（笑）。
    romaji: ——Suru deshō ne, are wa (warai).
    en: ——I would think so (laughs).

  - speaker: yuki
    ja: ……早く降ろしてくれ！っていう状態で。
    romaji: ……Hayaku oroshite kure! tte iu jōtai de.
    en: ……I was just thinking "get me down already!"

  - speaker: kami
    ja: なんかね、あれに近いですよ。遊園地とかにある船のやつ。
    romaji: Nanka ne, are ni chikai desu yo. Yūenchi toka ni aru fune no yatsu.
    en: It's kind of like those boat rides at amusement parks.

  - speaker: interviewer
    ja: ——フライング・パイレーツとか、バイキングとか、そういうのですね。
    romaji: ——Furaiingu Pairutsu toka, Baikingu toka, sō iu no desu ne.
    en: ——Like Flying Pirates or Viking, that sort of thing.

  - speaker: yuki
    ja: そうです、そうです。ああいうのって、すごいドキドキするんですよ。
    romaji: Sō desu, sō desu. Ā iu no tte, sugoku dokidoki surun desu yo.
    en: Exactly. Those rides make your heart pound.

  - speaker: gackt
    ja: あぁ、初恋の気分みたいな感じなんだ。
    romaji: Ā, hatsukoi no kibun mitai na kanji nan da.
    en: Ah, like the feeling of first love.

  - speaker: interviewer
    ja: ——いや、そのドキドキとは違うんじゃないかという気が……（笑）。
    romaji: ——Iya, sono dokidoki to wa chigau n ja nai ka to iu ki ga…… (warai).
    en: ——I suspect that's a different kind of pounding…… (laughs)

  - speaker: gackt
    ja: 違うんだ。ふーん。でも、僕はジェット・コースターとか乗るとドキドキして初恋の気分を思い出しますよ。
    romaji: Chigau n da. Fūn. Demo, boku wa jetto kōsutā toka noru to dokidoki shite hatsukoi no kibun o omoidashimasu yo.
    en: It's different. Hmm. But when I ride roller coasters my heart races and I remember first love.

  - speaker: interviewer
    ja: ——Gacktさん、一体どんな初恋したんですか（笑）。
    romaji: ——Gackt-san, ittai donna hatsukoi shitan desu ka (warai).
    en: ——Gackt, what kind of first love was that? (laughs)

  - speaker: gackt
    ja: だって、ああいうの乗ってる時ってすごい気持ちいいじゃないですか。それって、ヘンですかね？
    romaji: Datte, ā iu no notteru toki tte sugoku kimochi ii ja nai desu ka. Sore tte, hen desu ka ne?
    en: I mean, those rides feel amazing, don't they? Is that weird?

  - speaker: yuki
    ja: 僕はダメです。ああいう乗り物苦手だったあと、血の気が引いて冷や汗まで出ちゃうタイプですから（笑）。
    romaji: Boku wa dame desu. Ā iu norimono nigate datta ato, chi no ke ga hiite hiyase made dechau taipu desu kara (warai).
    en: Not for me. After those rides I'm the type who goes pale and breaks out in a cold sweat (laughs).

  - speaker: interviewer
    ja: ——そういう方が、よく渋公で飛ばそうと思いましたね。
    romaji: ——Sō iu kata ga, yoku Shibukō de tobasō to omoimashita ne.
    en: ——And yet they chose you to fly at Shibukō.

  - speaker: yuki
    ja: いやー、なんかいつの間にかそういうことになっちゃったもので（笑）。
    romaji: Iyā, nanka itsu no ma ni ka sō iu koto ni nacchatta mono de (warai).
    en: Yeah, somehow it just ended up that way (laughs).

  - speaker: interviewer
    ja: ——本当にお疲れさまでした。
    romaji: ——Hontō ni otsukaresama deshita.
    en: ——You really went through a lot.

  - speaker: yuki
    ja: でも、今と思ってみると実はあれがインディーズで最後のライヴだったんだよな、というのは最近になって気が付いたんですよ。
    romaji: Demo, ima to omotte miru to jitsu wa are ga indiizu de saigo no raivu datta n da yo na, to iu no wa saikin ni natte ki ga tsuita n desu yo.
    en: But looking back now, I only recently realized that was actually our last indies live.

  - speaker: interviewer
    ja: ——えっ、まさか忘れていた！？
    romaji: ——E, masaka wasurete ita!?
    en: ——What, you'd forgotten!?

  - speaker: yuki
    ja: みたいですね。この間ふと"あの時アンコールでやった「記憶と空」がインディーズで最後にやった曲だったんだなぁ。"って思って。
    romaji: Mitai desu ne. Kono aida futo "ano toki ankōru de yatta 'Kioku to Sora' ga indiizu de saigo ni yatta kyoku datta n da nā." tte omotte.
    en: Seems so. The other day it suddenly hit me—"Kioku to Sora," which we played for the encore, was the last song we ever played as an indies band."

  - speaker: gackt
    ja: そう言えばそうだった（笑）。
    romaji: Sō ieba sō datta (warai).
    en: Come to think of it, yes (laughs).

  - speaker: interviewer
    ja: ——Gacktさん、自分で"マリス・ミゼルの歴史を語る曲です"ってライヴで言っていたじゃないですか。
    romaji: ——Gackt-san, jibun de "Marisu Mizeru no rekishi o kataru kyoku desu" tte raivu de itte ita ja nai desu ka.
    en: ——Gackt, you said on stage that it's "a song that tells the history of Malice Mizer."

  - speaker: gackt
    ja: あれはどっか、無意識的だったんじゃないですか。
    romaji: Are wa dokka, muishiki teki datta n ja nai desu ka.
    en: That was probably unconscious, wasn't it?

  - speaker: mana
    ja: まぁ、ただあのアンコールっていうのは大きく捉えると、第三部って感じだったんだけどね。
    romaji: Maa, tada ano ankōru tte iu no wa ōkiku toraeru to, daisan-bu tte kanji datta n da kedo ne.
    en: Well, broadly speaking, that encore felt like a third act.

  - speaker: interviewer
    ja: ——あの「記憶と空」一曲のために軍服のような衣装が新調されていたのも、単なるアンコールではなかったからなんですか？
    romaji: ——Ano "Kioku to Sora" ikkyoku no tame ni gunpuku no yō na ishou ga shinchō sarete ita no mo, tan naru ankōru ja nakatta kara nan desu ka?
    en: ——Is that why new military-style costumes were made just for "Kioku to Sora"—it wasn't a ordinary encore?

  - speaker: mana
    ja: あれは、意図的なことで言うと全てを破壊するための場面だったんです。「記憶と空」っていう歌自体が、戦争のことを歌ったものっていうのもあるんだけど、インディーズ最後っていうことで、今まで作り上げてきたものを破壊しようという意図でああいう演出になってたんです。シチュエーションとしても、マリス・ミゼルが爆撃されて城もろとも炎上していく、みたいな感じですね。
    romaji: Are wa, ito teki na koto de iu to subete o hakai suru tame no bamen datta n desu. "Kioku to Sora" tte iu uta jitai ga, sensō no koto o utatta mono tte iu no mo aru n da kedo, indiizu saigo tte iu koto de, ima made tsukuriagete kita mono o hakai shiyō to iu ito de ā iu enshutsu ni natteta n desu. Shichuēshon to shite mo, Marisu Mizeru ga bakugeki sarete shiro morotomo enjō shite iku, mitai na kanji desu ne.
    en: Intentionally, that scene was about destroying everything. "Kioku to Sora" is a song about war, and as our last indies show we staged it with the intent to tear down everything we'd built. Situation-wise, it's like Malice Mizer being bombed and the castle going up in flames.

  - speaker: kozi
    ja: ほんとは、あの（ステージ）セット自体、ポーンって派手に破壊するはずだったんですよ。
    romaji: Honto wa, ano (sutēji) setto jitai, pōn tte hade ni hakai suru hazu datta n desu yo.
    en: Actually, the whole stage set was supposed to explode spectacularly.

  - speaker: gackt
    ja: 案としては、爆撃機を飛ばすとかいう話もあったしね。
    romaji: An to shite wa, bakugekiki o tobasu toka iu hanashi mo atta shi ne.
    en: We even discussed flying in a bomber, as one idea.

  - speaker: mana
    ja: そうそう。ただ、それをやるには物理的なところとか、条件的にいろいろ制約があって出来なかったんですけどね。
    romaji: Sō sō. Tada, sore o yaru ni wa butsuriteki na tokoro toka, jōken teki ni irro na seiyaku ga atte dekinakatta n desu kedo ne.
    en: Right. But physically and logistically there were too many constraints.

  - speaker: interviewer
    ja: ——それをやっていたら、確実に渋公が壊れてますよ（笑）。
    romaji: ——Sore o yatte itara, kakujitsu ni Shibukō ga kowaretemasu yo (warai).
    en: ——If you'd done that, Shibukō would definitely be in ruins (laughs).

  - speaker: gackt
    ja: まぁ、それはまたの機会ということですね。
    romaji: Maa, sore wa mata no kikai to iu koto desu ne.
    en: Well, maybe next time.

  - speaker: interviewer
    ja: ——そういえば「ナプスナグス」では、〔ナイフを胸に突き刺し〕という歌詞にそったかたちで、Kamiさんの自決シーンなどもありましたよね？
    romaji: ——Sō ieba "Napsunagusu" de wa, [naifu o mune ni tsukisashi] to iu kashi ni sotta katachi de, Kami-san no jiketsu shīn nado mo arimashita yo ne?
    en: ——In "Napsunagusu," there was Kami's suicide scene with a knife to the chest, matching the lyrics, wasn't there?

  - speaker: kami
    ja: 実はあれ、いざ刺そうっていう時に（ステージの）2階にナイフを置き忘れて来ちゃったことに気付いて、すごい動揺したんですよ。
    romaji: Jitsu wa are, iza sasō tte iu toki ni (sutēji no) 2-kai ni naifu o okiwasurete kichatta koto ni kizuite, sugoku dōyō shita n desu yo.
    en: Actually, when I went to stab myself I realized I'd left the knife upstairs and panicked.

  - speaker: kozi
    ja: ……しかも、あれ血糊がちゃんと出なかったんでしょ？
    romaji: ……Shikamo, are chigori ga chanto denakattan desho?
    en: ……And the fake blood didn't work properly, right?

  - speaker: kami
    ja: 仕方なくて、自分の口から舌切って血を出しました（笑）。
    romaji: Shikata nakute, jibun no kuchi kara shita kitte chi o dashimashita (warai).
    en: I had no choice—I bit my tongue to make blood (laughs).

  - speaker: interviewer
    ja: ——おまけに、退場の時に一人だけ門から帰らなかったですよね？
    romaji: ——Omake ni, taijō no toki ni hitori dake mon kara kaeranakatta desu yo ne?
    en: ——And during the exit, you were the only one who didn't return through the gate?

  - speaker: kami
    ja: あれはね、下に降りていったらもう門が閉まってたんですよ。
    romaji: Are wa ne, shita ni orite ittara mō mon ga shimatte ta n desu yo.
    en: By the time I came down, the gate had already closed.

  - speaker: gackt
    ja: 最後に一人、戦場に残された兵士っていう設定だったんだよね？
    romaji: Saigo ni hitori, senjō ni nokosareta heishi tte iu settei datta n da yo ne?
    en: The idea was a lone soldier left behind on the battlefield, right?

  - speaker: kami
    ja: もちろん。最後に2本スティック投げちゃったのも、あれは1本ずつそれぞれ"悪意"と"悲劇"を意味してるんです。
    romaji: Mochiron. Saigo ni 2-hon sutikku nagechatta no mo, are wa 1-hon zutsu sorezore "akui" to "higeki" o imi shiteru n desu.
    en: Of course. Throwing two sticks at the end—each one represents "malice" and "misery."

  - speaker: interviewer
    ja: ——そうですか（笑）。ちなみに、このライヴの模様はビデオ化されるそうですね？
    romaji: ——Sō desu ka (warai). Chinami ni, kono raivu no sugata wa bideo-ka sareru sō desu ne?
    en: ——I see (laughs). By the way, this live is being released on video?

  - speaker: mana
    ja: ラスト・インディーズ・アイテムですね、これが。
    romaji: Rasuto indiizu aitemu desu ne, kore ga.
    en: This is our last indies release.

  - speaker: interviewer
    ja: ——タイトルは？
    romaji: ——Taitoru wa?
    en: ——The title?

  - speaker: mana
    ja: ライヴのタイトル通りで、『sans retour Voyage derniere ~encoure une fois~』です。
    romaji: Raivu no taitoru dōri de, "sans retour Voyage derniere ~encoure une fois~" desu.
    en: Same as the live—sans retour Voyage derniere ~encoure une fois~.

  - speaker: interviewer
    ja: ——で、この作品は収録時間は30分ということなんですが、内容的にはどういう形式になるんですか？
    romaji: ——De, kono sakuhin wa shuroku jikan wa 30-pun to iu koto nan desu ga, naiyō teki ni wa dō iu keishiki ni naru n desu ka?
    en: ——It's about 30 minutes—what format will it take?

  - speaker: kozi
    ja: 4月1日に行われたインディーズ・ラスト公演のダイジェスト版。（と、宣信用フライヤーのコピーを棒読み）
    romaji: 4-gatsu 1-nichi ni okonawareta indiizu rasuto kōen no daijesuto-ban. (to, senden-yō furaiyā no kopī o bōyomi)
    en: A digest of the April 1 indies last performance. (reads promotional flyer copy aloud)

  - speaker: interviewer
    ja: ——もう少し、詳しく教えては頂けませんか？
    romaji: ——Mō sukoshi, kuwashiku oshiete wa itadakemasen ka?
    en: ——Could you tell us a bit more?

  - speaker: gackt
    ja: 単に渋公でやった曲をそのまま入れるっていうのではなく、この一本でマリス・ミゼルというバンドのことが分かるような、そういう作品になるはずですよ。
    romaji: Tan ni Shibukō de yatta kyoku o sono mama ireru tte iu no de wa naku, kono ippon de Marisu Mizeru to iu bando no koto ga wakaru yō na, sō iu sakuhin ni naru hazu desu yo.
    en: It's not just the Shibukō setlist as-is—it should be a single work that lets you understand Malice Mizer as a band.

  - speaker: interviewer
    ja: ——今までマリス・ミゼルのライヴを観たことがない人にとっては、分かりやすい入門編という感じになるわけですね？
    romaji: ——Ima made Marisu Mizeru no raivu o mita koto ga nai hito ni totte wa, wakariyasui nyūmon-hen to iu kanji ni naru wake desu ne?
    en: ——So for people who've never seen Malice Mizer live, it'll work as an accessible introduction?

  - speaker: kami
    ja: うーん。って言うか、分かりやすくもあり、分かりにくくもありって感じです。
    romaji: Ūn. Tte iu ka, wakariyasuku mo ari, wakarinikuku mo ari tte kanji desu.
    en: Hmm. Or rather—both easy and hard to understand.

  - speaker: gackt
    ja: ね、これを観たら、さらに知りたくなるんじゃないかと思うから。
    romaji: Ne, kore o mitara, sara ni shiritaku naru n ja nai ka to omou kara.
    en: I think watching this will make you want to know more.

  - speaker: mana
    ja: あと、今回のビデオには渋公の映像プラス、95年10月10日の復活ライヴから、今日に至るまでに撮った数々の幻の未発表映像も入ります。
    romaji: Ato, konkai no bideo ni wa Shibukō no eizō purasu, '95-nen 10-gatsu 10-nichi no fukkatsu raivu kara, kyō ni itaru made ni totta kazu o ku no maboroshi no mihappyō eizō mo hairimasu.
    en: The video also includes Shibukō footage plus unreleased footage shot from the October 10, 1995 comeback live through today.

  - speaker: kami
    ja: これは面白いですよ、（yu～kiの）ヒゲ具合がだんだん変わってくのが分かったりするから（笑）。
    romaji: Kore wa omoshiroi desu yo, (Yu~ki no) hige guai ga dandan kawatte iku no ga wakaritari suru kara (warai).
    en: It's fun—you can see Yu~ki's facial hair gradually change (laughs).

  - speaker: kozi
    ja: 俺の髪の長さも変わってるし。
    romaji: Ore no kami no nagasa mo kawatteru shi.
    en: My hair length changes too.

  - speaker: interviewer
    ja: ——こうしてラスト・インディーズ作品が出るということは、当然この次にはメジャーの展開というのも控えていることになるわけですが、現在はそれに向けての動きをとり始めているところですか？
    romaji: ——Kō shite rasuto indiizu sakuhin ga deru to iu koto wa, tōzen kono tsugi ni wa mejā no tenkai to iu no mo hikaete iru koto ni naru wake desu ga, genzai wa sore ni mukete no ugoki o torihajimete iru tokoro desu ka?
    en: ——With this last indies release out, a major-label move must be next—have you already started working toward that?

  - speaker: gackt
    ja: ええ、レコーディングをやったり、いろいろしてますよ。
    romaji: Ee, rekōdingu o yattari, irro shitemasu yo.
    en: Yes—we're recording and doing various things.

  - speaker: interviewer
    ja: ——では、次にマリス・ミゼルが公の場に出てくるのは、既に発表になっている夏のスタンディング・ツアー"Pays de Merveilles ～空白の瞬間の中で～"の時ということになります？
    romaji: ——De wa, tsugi ni Marisu Mizeru ga kō no ba ni dete kuru no wa, sude ni happyō ni nattte iru natsu no sutandingu tsuā "Pays de Merveilles ~Kūhaku no Shunkan no Naka de~" no toki to iu koto ni narimasu?
    en: ——So Malice Mizer's next public appearance is the already announced summer standing tour Pays de Merveilles ~In the Moment of Emptiness~?

  - speaker: gackt
    ja: ですね。全国ツアー自体、1年ぶりなんですよ。
    romaji: Desu ne. Zenkoku tsuā jitai, 1-nen-buri nan desu yo.
    en: That's right. It's our first nationwide tour in a year.

  - speaker: gackt
    ja: 僕らはこれからずっとホールばっかりやっていくとか、そういうつもりはなかったですからね。どういう場所であっても、それぞれに自分たちの伝えたいことを伝える方法はありますから、今回はこういうツアーのスタイルになったんです。
    romaji: Bokura wa kore kara zutto hōru bakkari yatte iku toka, sō iu tsumori wa nakatta desu kara ne. Dō iu basho de atte mo, sorezore ni jibun-tachi no tsutaetai koto o tsutaeru hōhō wa arimasu kara, konkai wa kō iu tsuā no sutairu ni natta n desu.
    en: We never planned to play halls forever. Whatever the venue, we have ways to say what we want to say—so this tour took this form.

  - speaker: interviewer
    ja: ——このツアーでは、また新たな世界観が提示されるのではないかと思うのですが、具体的なヴィジョンはもう出来上がっているんですか？
    romaji: ——Kono tsuā de wa, mata arata na sekai-kan ga teiji sareru no de wa nai ka to omou no desu ga, gutaiteki na vijon wa mō dekiagatte iru n desu ka?
    en: ——I expect a new worldview on this tour—is the vision already complete?

  - speaker: mana
    ja: 今回は、このツアー・タイトルが全てを物語ってますね。（と、なにやら不敵な笑いを浮かべながら話すmana）
    romaji: Konkai wa, kono tsuā taitoru ga subete o monogatatte masu ne. (to, naniyara futeki na warai o ukabete nagara hanasu Mana)
    en: This time the tour title tells the whole story. (Mana says this with a fearless smile)

  - speaker: interviewer
    ja: ——"Pays de merveilles"って、どういう意味なんですか？
    romaji: ——"Pays de merveilles" tte, dō iu imi nan desu ka?
    en: ——What does "Pays de merveilles" mean?

  - speaker: mana
    ja: うーん、それは皆さんそれぞれで調べてみてください。
    romaji: Ūn, sore wa mina-san sorezore de shirabete mite kudasai.
    en: Hmm—everyone should look it up for themselves.

  - speaker: interviewer
    ja: ——フランス語の辞典、持っていないんですけど（笑）。
    romaji: ——Furansugo no jiten, motte inai n desu kedo (warai).
    en: ——I don't have a French dictionary (laughs).

  - speaker: gackt
    ja: でも、調べると"あぁ。"って思うはずですよ。
    romaji: Demo, shiraberu to "ā." tte omou hazu desu yo.
    en: But when you look it up, you'll go "ah."

  - speaker: interviewer
    ja: ——じゃ、辞典買います（笑）。でも、このサブ・タイトルの"~空白の瞬間の中で~"は、渋公でやっていた新曲のタイトルでもありますよね？
    romaji: ——Ja, jiten kaimasu (warai). Demo, kono sabu taitoru no "~Kūhaku no Shunkan no Naka de~" wa, Shibukō de yatte ita shinkyoku no taitoru demo arimasu yo ne?
    en: ——Fine, I'll buy a dictionary (laughs). But the subtitle "~In the Moment of Emptiness~" was also the title of a new song at Shibukō?

  - speaker: mana
    ja: それがですね、その『空白の瞬間の中で』を聴くと分かるところがあるっていう、そういう展開になるんですよ。
    romaji: Sore ga desu ne, sono "Kūhaku no Shunkan no Naka de" o kiku to wakaru tokoro ga aru tte iu, sō iu tenkai ni naru n desu yo.
    en: When you hear "Kūhaku no Shunkan no Naka de," you'll understand—that's how it unfolds.

  - speaker: interviewer
    ja: ——なかなか深そうですね。フランスには、どのくらい行く予定なんですか？
    romaji: ——Nakanaka fukasō desu ne. Furansu ni wa, dono kurai iku yotei nan desu ka?
    en: ——That sounds deep. How long will you be in France?

  - speaker: kami
    ja: 半年。
    romaji: Hantoshi.
    en: Six months.

  - speaker: interviewer
    ja: ——ツアー終わってますよ、それじゃ！
    romaji: ——Tsuā owattemasu yo, sore ja!
    en: ——The tour would be over by then!

  - speaker: kozi
    ja: ツアーは僕らのクローンがやりますから（笑）。
    romaji: Tsuā wa bokura no kurōn ga yarimasu kara (warai).
    en: Our clones will do the tour (laughs).

  - speaker: interviewer
    ja: ——皆さん、フランス語は出来ますか？
    romaji: ——Mina-san, Furansugo wa dekimasu ka?
    en: ——Does everyone speak French?

  - speaker: gackt
    ja: manaは出来ますよ。彼は生まれがフランスだから。
    romaji: Mana wa dekimasu yo. Kare wa umare ga Furansu da kara.
    en: Mana does—they were born in France.

  - speaker: interviewer
    ja: ——フランスの〇〇〇だっけ（笑）？
    romaji: ——Furansu no ○○○ datte (warai)?
    en: ——In French ○○○, was it? (laughs)

  - speaker: kozi
    ja: あぁ、そういえば以前『麗しき仮面の招待状』のジャケットに写っていたお城は、manaさんの家だって言ってましたもんね。
    romaji: Ā, sō ieba izen "Uruwashiki Kamen no Shōtaijō" no jaketto ni utsutte ita o-shiro wa, Mana-san no ie datte itte mashita mon ne.
    en: Come to think of it, you said the castle on the Uruwashiki Kamen no Shōtaijō jacket was Mana's house.

  - speaker: kozi
    ja: まぁ、とりあえずmanaちゃんは里帰りになるんだよね。
    romaji: Maa, toriaezu Mana-chan wa satogaeri ni naru n da yo ne.
    en: So Mana's going home for a visit.

  - speaker: mana
    ja: まぁ、そういうことになるかな。久々に帰るんで楽しみです。
    romaji: Maa, sō iu koto ni naru kana. Hisashiburi ni kaeru n de tanoshimi desu.
    en: Something like that. I'm looking forward to going back after so long.

  - speaker: interviewer
    ja: ——フランスでは、撮影以外に何か出来そうな時間はありますか？
    romaji: ——Furansu de wa, satsuei igai ni nanika dekisō na jikan wa arimasu ka?
    en: ——Will you have time for anything besides filming in France?

  - speaker: yuki
    ja: 素敵なパリジェンヌと出会いたいですけど。
    romaji: Suteki na Parijenne to deaitai desu kedo.
    en: I'd like to meet a lovely Parisienne.

  - speaker: gackt
    ja: 時間ないでしょうね、きっと。
    romaji: Jikan nai deshō ne, kitto.
    en: Probably no time for that.

  - speaker: kozi
    ja: とりあえず、みんなでmanaちゃんの親に挨拶でもして来ます（笑）。
    romaji: Toriaezu, minna de Mana-chan no oya ni aisatsu demo shite kimasu (warai).
    en: For now we'll all go say hello to Mana's parents (laughs).

  - speaker: interviewer
    ja: ——このところホールづいていたマリスだけに、赤坂ブリッツ2DAYSを皮切りに、スタンディング会場をまわるツアーというの中で、シングルとして出るんですよ。このツアーの直前に。シングルと一緒に、ビデオ（9月発売予定）の予告編がセットしてあるものが出ます。
    romaji: ——Kono tokoro hōru-zuite ita Marisu dake ni, Akasaka Blitz 2DAYS o kawakiri ni, sutandingu kaijō o mawaru tsuā to iu no naka de, shinguru to shite deru n desu yo. Kono tsuā no chokuzen ni. Shinguru to issho ni, bideo (9-gatsu hatsubai yotei) no yokoku-hen ga setto shite aru mono ga demasu.
    en: ——Malice Mizer has been playing halls lately, but starting with two days at Akasaka Blitz they'll tour standing venues. A single comes out just before the tour, bundled with a trailer for the video (scheduled September).

  - speaker: interviewer
    ja: ——ビデオって、クリップですか？
    romaji: ——Bideo tte, kurippu desu ka?
    en: ——Is the video a music clip?

  - speaker: mana
    ja: いや、そんなクリップっていう規模のものじゃないですね。
    romaji: Iya, sonna kurippu tte iu kibo no mono ja nai desu ne.
    en: No, it's not that small in scale.

  - speaker: gackt
    ja: ストーリーですから。一曲なのに20分くらいの作品になる予定なんです。映画とクリップの中間的な感じのものに仕上がるんだと思います。
    romaji: Sutōrī desu kara. Ikkyoku na no ni 20-pun kurai no sakuhin ni naru yotei nan desu. Eiga to kurippu no chūkan teki na kanji no mono ni shiageru n da to omoimasu.
    en: It's a story. One song, but about 20 minutes—something between a film and a clip.

  - speaker: mana
    ja: フランスに行って、撮って来るんですよ。多分、この本が出る頃には行ってるんじゃないですか。
    romaji: Furansu ni itte, totte kuru n desu yo. Tabun, kono hon ga deru koro ni wa itteru n ja nai desu ka.
    en: We're going to France to shoot it. Probably by the time this issue is out.

  - speaker: gackt
    ja: すごいですよ。このビデオの中には、今度のツアーの内容を指し示すキーワードも入ってますからね。何回も見ないと分からないような、そういうのもあるかもしれない。
    romaji: Sugoi desu yo. Kono bideo no naka ni wa, kondo no tsuā no naiyō o sashi shimesu kīwādo mo haitteru n desu kara ne. Nankai mo minai to wakaranai yō na, sō iu no mo aru kamoshirenai.
    en: It's incredible. The video contains keywords pointing to the tour—you might need to watch many times to catch them.

  - speaker: interviewer
    ja: ——では、今回は必ずシングルとビデオで予習してから行かないといけないツアーなんですね。
    romaji: ——De wa, konkai wa kanarazu shinguru to bideo de yoshū shite kara ikanai to ikenai tsuā nan desu ne.
    en: ——So you'd better study the single and video before the tour.

  - speaker: gackt
    ja: さらに、ツアーに来るとまた新しい発見もあるでしょうね。
    romaji: Sara ni, tsuā ni kuru to mata atarashii hakken mo aru deshō ne.
    en: And coming to the tour will bring new discoveries.

  - speaker: kozi
    ja: ビデオ観ただけじゃ分からないこともあると思うんだけど、それはツアーに来て、また帰ってもう一回見るとまたさらに
    romaji: Bideo mita dake ja wakaranai koto mo aru to omou n da kedo, sore wa tsuā ni kite, mata kaette mō ichikai miru to mata sara ni
    en: Some things you won't get from the video alone—but if you come to the tour, go home, and watch again, you'll find even more—

  # Note: article continues at column break; scan ends mid-sentence on p. 44.
