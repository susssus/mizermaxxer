intro:
  ja: >
    メジャーデビューアルバム『merveilles』と4月1日の日本武道館公演を控え、絶好調のマリス・ミゼル。
    本誌大特集の締めくくりに、AからZまで26のキーワードで綴る各メンバーの回答インタヴュー。
    回答順は Yu~ki、mana、Gackt、KAMI、Közi。
  romaji: >
    Mējā debyū arubamu "merveilles" to 4-gatsu 1-nichi no Nippon Budōkan kōen o hikaete, zekkōchō no
    Marisu Mizeru. Honshi dai tokushū no shimekukuri ni, A kara Z made 26 no kīwādo de tsuzuru
    kaku menbā no kaitō intabyū. Kaitō jun wa Yu~ki, mana, Gackt, KAMI, Közi.
  en: >
    Malice Mizer at their peak, with major debut album merveilles and the April 1 Nippon Budokan
    performance ahead. Closing the magazine's major feature: each member answers from A to Z across
    26 keywords. Response order: Yu~ki, mana, Gackt, KAMI, Közi.

