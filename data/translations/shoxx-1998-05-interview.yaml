dialogue:
  # —— A: Aino kotoba ——
  - speaker: yuki
    ja: >
      口数少ないです。言葉をうまく使えないんで、行動あるのみ（笑）。
    romaji: >
      Kuchikazu sukunai desu. Kotoba o umaku tsukaenai n de, kōdō aru nomi (warai).
    en: >
      I don't talk much. I'm not good with words, so actions speak for me (laughs).
  - speaker: mana
    ja: >
      たぶん、これは相手のタイプによって違ってくるね。こう見えても、実はおしゃべりとかもそんな不得意な方でもないから、そのへんは臨機応変だと思う。ただね、最近ちょっとシャイな自分っていうのにも気付いたんで、なかなか自分の方から言うっていうことは、ここんとこあんまりないかも。いずれにせよ、場合によりけりですけど
    romaji: >
      Tabun, kore wa aite no taipu ni yotte chigatte kuru ne. Kō miete mo, jitsu wa oshaberi toka mo sonna futokuina kata demo nai kara, sono hen wa rinki ōhen da to omou. Tada ne, saikin chotto shai na jibun tte iu no ni mo kizuita n de, nakanaka jibun no hō kara iu tte iu koto wa, kokontoko amari nai kamo. Izure ni seyo, baai ni yorikeri desu kedo
    en: >
      It probably depends on the person. I'm not actually bad at chatting—I adapt. Lately I've noticed I'm shy, so I haven't been the one to speak up much. It depends on the situation.
  - speaker: gackt
    ja: >
      これは相手と波長が合わないと言えないことですけど、「じゃ、しょう」っていうのが僕にとっての最高の口説き文句。確かにそこで引かれる場合もあるけど、僕としてはその人の魅力をほんとに知りたいからそう言うんですよ。それに、まずそういう人に対しては言わないだろうし。そういう意味では、この言葉を使える人ってなかなかいないです。去年フランスに行った時、向こうの女の子には「Gacktはすごくイタリックだね」って言われた。でもね、結局は国とか関係なく僕はどこにいても僕のペースのままなんですよ。ただ、よくイメージで女に対して見境ないとか思われてるみたいだけど、それもちょっと違う。僕にとって信用出来る人かどうかっていうのが一番大事なこと。確かに基本的にはフェミニストだけど、誰でも良いっていうわけじゃないです。理性はかなり強い方だと思う。仮に、目の前に裸の女が100人いても大丈夫だし（笑）
    romaji: >
      Kore wa aite to hachō ga awanai to ienai koto desu kedo, "ja, shō" tte iu no ga boku ni totte no saikō no kudoki monku. Kakujitsu ni soko de hikareru baai mo aru kedo, boku to shite wa sono hito no miryoku o hontō ni shiritai kara sō iun desu yo. Sore ni, mazu sō iu hito ni tai shite wa iwanai darō shi. Sō iu imi de wa, kono kotoba o tsukaeru hito tte nakanaka inai desu. Kyonen Furansu ni itta toki, mukō no onna no ko ni wa "Gackt wa sugoku Itarikku da ne" tte iwareta. Demo ne, ketskyoku wa kuni toka kankei naku boku wa doko ni ite mo boku no pēsu no mama nan desu yo. Tada, yoku imēji de onna ni tai shite mikyō nai toka omowareteru mitai dakedo, sore mo chotto chigau. Boku ni totte shin'yō dekiru hito ka dō ka tte iu no ga ichiban daiji na koto. Kakujitsu ni kihon teki ni wa feminisuto dakedo, dare demo yoi tte iu wake ja nai desu. Risei wa kanari tsuyoi kata da to omou. Karini, me no mae ni hadaka no onna ga 100-nin ite mo daijōbu da shi (warai)
    en: >
      You can't say this unless you're on the same wavelength, but for me the best pick-up line is "shall we?" Some people are put off, but I say it because I genuinely want to know that person's charm—and I wouldn't say it to just anyone. In France last year a girl told me "Gackt is very italic." But wherever I am, I stay at my own pace. People think I'm indiscriminate with women, but that's not quite right—whether I can trust someone matters most. I'm basically a feminist, but not with just anyone. I think I'm quite rational. Even if a hundred naked women were in front of me I'd be fine (laughs).
  - speaker: kami
    ja: >
      僕に気付いてください。僕が指さしめてあげるっていう感じかな（笑）。マイブームかしらね（笑）。あ、でも僕、口説かないですよ。別。まずは普通に話すところから始まって、だんだん仲良くなって、遊びに行こうかっていう感じで自然に付き合う方だから。
    romaji: >
      Boku ni kizuite kudasai. Boku ga yubi sashime te ageru tte iu kanji kana (warai). Mai būmu kashira ne (warai). A, demo boku, kudokanai desu yo. Betsu. Mazu wa futsū ni hanasu tokoro kara hajimatte, dandan nakayoku natte, asobi ni ikō ka tte iu kanji de shizen ni tsukiau kata dakara.
    en: >
      Notice me—that's the feeling (laughs). Maybe it's my thing lately (laughs). But I don't seduce with words. I'd start by talking normally, then naturally become friends and go out together.
  - speaker: kozi
    ja: >
      言葉で口説き落とすっていうパターンは、あんまりないですね。かと言って、ウッチのメンバーの誰かみたいに目で殺すとかもないし（笑）。どっちかって言うと、いつの間にか自然とそういうシチュエーションに持っていって、最後には相手に言わすみたいな感じが多いかもしれない。要は照れ屋なんですよ。ほら、俺って“シャイなあんちくしょう”だから。
    romaji: >
      Kotoba de kudoki otosu tte iu patān wa, amari nai desu ne. Ka to itte, Ucchi no menbā no dareka mitai ni me de korosu toka mo nai shi (warai). Docchika tte iu to, itsu no ma ni ka shizen to sō iu shichuēshon ni motte itte, saigo ni wa aite ni iwasu mitai na kanji ga ōi kamoshirenai. Yō wa tereya nan desu yo. Hora, ore tte "Shai na anchikushō" dakara.
    en: >
      I don't really seduce with words. And I'm not the type to kill with my eyes like some members (laughs). I somehow end up in that situation naturally and let the other person say it. Basically I'm shy—a "shy bastard."
  # —— B: Budokan ——
  - speaker: yuki
    ja: >
      4月にライヴをやるんで、最近、よく聞く言葉ですけど、なんか、ピンと来ないんですよね、イマイチ。思い入れもないし。憧れのアーティストを見に行ったこともないからかもしれない。あの屋根の印象だけがありますね。
    romaji: >
      4-gatsu ni raivu o yarun de, saikin, yoku kiku kotoba desu kedo, nanka, pin to konai n desu yo ne, imaichi. Omoire mo nai shi. Akogare no ātisuto o mi ni itta koto mo nai kara kamoshirenai. Ano yane no inshō dake ga arimasu ne.
    en: >
      We're doing a live in April, so I hear the word a lot lately, but it doesn't really click for me. I don't have any special attachment. Maybe because I've never gone to see an artist I admired there—I only have an impression of that roof.
  - speaker: mana
    ja: >
      タマネギ
    romaji: >
      Tamanegi
    en: >
      Onion. [Budokan dome pun]
  - speaker: gackt
    ja: >
      興味ないです。僕にとっては特別な意味を持つ場所ではないので。ほんとにこれは、単なる通過点にしか過ぎませんね。
    romaji: >
      Kyōmi nai desu. Boku ni totte wa tokubetsu na imi o motsu basho de wa nai node. Hontō ni kore wa, tannaru tsūkaten ni shika sugimasen ne.
    en: >
      I'm not interested. It doesn't hold special meaning for me—it's really just a waypoint.
  - speaker: kami
    ja: >
      武道館への憧れはないです。重い話によると、お客さんが入った武道館のステージに立つと、圧迫感を感じるとか。4月4日の武道館ですか？ 情熱が舞う。っていうのがヒントです。
    romaji: >
      Budōkan e no akogare wa nai desu. Omoi hanashi ni yoru to, o-kyaku-san ga haitta Budōkan no sutēji ni tatsu to, appaku-kan o kanjiru toka. 4-gatsu 4-nichi no Budōkan desu ka? Jōnetsu ga mau. tte iu no ga hinto desu.
    en: >
      I don't dream of Budokan. They say when you stand on the Budokan stage full of audience, you feel pressure. Budokan on April 4? Passion dances—that's your hint.
  - speaker: kozi
    ja: >
      当日は、武道館に入ったらまずリハの前に会場に行って、いろんなスタッフが忙しく仕込みをしてる横で、中に座ってある国旗を斜め45度くらいに見上げながら一人で『君が代』をひっそりとハミングで歌う予定です。ん〜ん〜ん〜ん〜……。
    romaji: >
      Tōjitsu wa, Budōkan ni haittara mazu riha no mae ni kaijō ni itte, ironna sutaffu ga isogashiku shikomi o shiteru yoko de, naka ni suwatte aru kokki o naname 45-do kurai ni miagenagara hitori de "Kimigayo" o hissori to hamingu de utau yotei desu. N~ n~ n~ n~…….
    en: >
      On the day, after entering Budokan, before rehearsal I'll go to the venue while staff are busy setting up, sit inside, look up at the flag at about a 45-degree angle, and quietly hum "Kimigayo" to myself. Mmm hmm hmm hmm……
  # —— C: Cry ——
  - speaker: yuki
    ja: >
      たまに泣きますよね。やっぱり（笑）。悲しくて泣くっていうより、感動して。そういう涙は結構、流します。涙もろくはないと思うんですけど、やっぱり、胸にくるものがあると、深層が緩んじゃいます。あと、酒飲んでて、泣くこともあるんですよ。酒を飲み入って、ちょっと励ましの言葉をもらったりすると、“ああ、頑張らなきゃ”と思うと涙が出ますね。グッと。あと、フランスに行った時もパントマイムの人を道で見掛けて、高ぶって泣いた。感動するようなものって、そうないんですけど、感動して泣きませんか？
    romaji: >
      Tama ni nakimasu yo ne. Yappari (warai). Kanashikute naku tte iu yori, kandō shite. Sō iu namida wa kekkō, nagashimasu. Namida moroku wa nai to omoun desu kedo, yappari, mune ni kuru mono ga aru to, shinsō ga yurunjaimasu. Ato, sake nondete, naku koto mo arun desu yo. Sake o nomiirete, chotto hagemashi no kotoba o morattari suru to, "aa, ganbaranakya" to omou to namida ga demasu ne. Gutto. Ato, Furansu ni itta toki mo pantomaimu no hito o michi de mikakete, takabutte naita. Kandō suru yō na mono tte, sō nain desu kedo, kandō shite nakimasen ka?
    en: >
      I cry sometimes—more from being moved than from sadness. I don't think I'm especially tearful, but when something hits my heart, my guard drops. I also cry when drinking; a kind word makes me think "I've got to keep going" and the tears come. In France I cried watching a street mime performer. Don't you cry when you're moved?
  - speaker: mana
    ja: >
      基本的に感情の起伏があまりないので、普通の日常生活の中で泣くってことはあまりないです。アニメ、映画、音楽などで涙を流す時はあります。最近観たものでは感動して泣いたのもあったけど、それが何かは秘密。基本的に“生死”に関わることに対しては敏感かも。だからこそ、こういうマリス・ミゼルみたいなバンドをやってるんだろうし。
    romaji: >
      Kihon teki ni kanjō no kōhuku ga amari nai node, futsū no nichijō seikatsu no naka de naku tte koto wa amari nai desu. Anime, eiga, ongaku nado de namida o nagasu toki wa arimasu. Saikin mita mono de wa kandō shite naita no mo atta kedo, sore ga nani ka wa himitsu. Kihon teki ni "seishi" ni kakawaru koto ni tai shite wa binkan kamo. Dakara koso, kō iu Marisu Mizeru mitai na bando o yatteru n darō shi.
    en: >
      I don't have much emotional ups and downs, so I rarely cry in daily life. I do cry at anime, films, music. Something recent moved me to tears, but that's a secret. I may be sensitive to matters of life and death—which is probably why I'm in a band like Malice Mizer.
  - speaker: gackt
    ja: >
      いっぱいありますよ。僕、百万回は受胎してますから。こうして五百年も生きて来るといろんな人との出会いと別れがあるんです。まあ、これも宿命ですよ。
    romaji: >
      Ippai arimasu yo. Boku, hyaku-man-kai wa jutai shitemasu kara. Kō shite gohyaku-nen mo ikite kuru to ironna hito to no deai to wakare ga arun desu. Maa, kore mo shukumei desu yo.
    en: >
      Plenty. I've been conceived a million times. Living five hundred years means countless meetings and partings. That's fate.
  - speaker: kami
    ja: >
      実家で僕が小学生の頃から、ずっとかわいがって飼ってた柴犬、ペコちゃん（♀）が死んじゃったんです。僕が、上京してる間に。その犬が、ある日、夢の中に出てきたんですよ。シッポ振って、ワンワン鳴いて近寄って来たんですけど、寂しい顔して向こうへトコトコ歩いていって、しゃがみ込んで、そのまま動かなくなっちゃうっていう夢で。夢から醒めた時は、なぜかしら涙がボロボロと止まらなかったんです。で、嫌な予感がしたから、実家に電話してみたら“犬が、死んじゃったんだよね”って。きっと、夢枕に出てきてくれたんですよね。それを聞いたときは、悲しいっていうか、うれしいっていうか、複雑な気持ちだった。あと、感動の涙は、初めて日本武道館に立った時かな。終わった後、泣きましたよ。ボロボロと。死んでもいいと思うくらい感動しました。
    romaji: >
      Jikka de boku ga shōgakusei no koro kara, zutto kawaigatte katteta shiba-inu, Peko-chan (♀) ga shinjacchatta n desu. Boku ga, jōkyō shiteru aida ni. Sono inu ga, aru hi, yume no naka ni dete kita n desu yo. Shippo futte, wanwan naite chikazotte kita n desu kedo, sabishii kao shite mukō e tokotoko aruite itte, shagamikonde, sono mama ugokanaku nacchau tte iu yume de. Yume kara sameta toki wa, naze ka shira namida ga boroboro to tomaranakatta n desu. De, iya na yokan ga shita kara, jikka ni denwa shite mitara "inu ga, shinjacchatta n da yo ne" tte. Kitto, yume makura ni dete kite kureta n desu yo ne. Sore o kiita toki wa, kanashii tte iu ka, ureshii tte iu ka, fukuzatsu na kimochi datta. Ato, kandō no namida wa, hajimete Nippon Budōkan ni tatta toki kana. Owatta ato, nakimashita yo. Boroboro to. Shinde mo ii to omou kurai kandō shimashita.
    en: >
      My family dog Peko-chan, a shiba we'd loved since I was in elementary school, died while I was in Tokyo. She appeared in a dream—wagging her tail, barking, then walking away with a lonely face, crouching, and going still. I woke up in tears, called home, and learned she'd died. She must have come to say goodbye. At Budokan, after my first time on stage, I cried uncontrollably—I was so moved I felt I could die.
  - speaker: kozi
    ja: >
      『悲しくて泣く』ことって、まずないですね。本当に悲しい時って、涙すら出てこないですね。俺。感動的に人に涙を見せたくない方なんですよ。感動の涙もこらえちゃうほうだし。もし涙が出ることがあるとすれば、それは笑い過ぎてハラ痛いぜ、みたいな時くらいでしょう。
    romaji: >
      "Kanashikute naku" koto tte, mazu nai desu ne. Hontō ni kanashii toki tte, namida sura dete konai desu ne. Ore. Kandō teki ni hito ni namida o misetakunai kata nan desu yo. Kandō no namida mo koraechau hō da shi. Moshi namida ga deru koto ga aru to sureba, sore wa warai-sugite hara itai ze, mitai na toki kurai deshō.
    en: >
      I almost never cry from sadness—when I'm truly sad, tears don't even come. I don't want people to see me cry, even from being moved. If I do tear up, it's probably from laughing so hard my stomach hurts.
  # —— D: Deficiency ——
  - speaker: yuki
    ja: >
      時間でしょう。時間があれば、いろんな意味で、不足しているものを補えるような気がします。だからトータル的に『時間』。
    romaji: >
      Jikan deshō. Jikan ga areba, ironna imi de, fusoku shiteiru mono o ogineru yō na ki ga shimasu. Dakara tōtaru teki ni "jikan".
    en: >
      Time. If I had time, I feel I could make up for what's lacking in many ways. So overall: time.
  - speaker: mana
    ja: >
      『栄養』。どうしても一人暮らしだと食生活は偏るんで、ヨーグルトとか野菜ジュースは意識して摂るようにしてるんですけどね。ちゃんと料理を作ってくれる家政婦さん、ほしいです。それも、ちゃんとメイドの格好しててね。それでチリンチリンってベルを鳴らすと来てくれるみたいな。そういう人を募集中です。
    romaji: >
      "Eiyō". Dōshitemo hitori-gurashi da to shokuseikatsu wa katayoru n de, yōguruto toka yasai jūsu wa ishiki shite toru yō ni shiteru n desu kedo ne. Chanto ryōri o tsukutte kureru kaseifu-san, hoshii desu. Sore mo, chanto meido no kakkō shitete ne. Sore de chirin chirin tte beru o narasu to kite kureru mitai na. Sō iu hito o boshūchū desu.
    en: >
      Nutrition. Living alone my diet is unbalanced, so I consciously eat yogurt and vegetable juice. I want a housekeeper who cooks properly—in maid outfit, coming when you ring a little bell. Accepting applications.
  - speaker: gackt
    ja: >
      『なんだろう？ 心のしなやかさ』。早々に人間になりたい感じ。そのために日々こうして頑張ってるわけです。ほんとの優しさっていうのを探していきたいですね。思い起こせば四百三十七年前、ちょうど二十歳を過ぎた頃、僕はそのことに気付きました。
    romaji: >
      "Nan darō? Kokoro no shinayakasa". Hayahaya ni ningen ni naritai kanji. Sono tame ni hibi kō shite ganbatteru wake desu. Honto no yasashisa tte iu no o sagashite ikitai desu ne. Omoiokoseba yonhyaku sanjūnana-nen mae, chōdo nijū-sai o sugita koro, boku wa sono koto ni kizukimashita.
    en: >
      What is it—flexibility of heart? I want to become human sooner. That's why I work at it daily. I want to find true kindness. Four hundred thirty-seven years ago, just past twenty, I realized this.
  - speaker: kami
    ja: >
      ありますよ。いっぱい。まずは、お金と時間。貯金してるんですかって？ まあね（笑）。でもね、お金があっても使える時間がなかったら意味がないんですよ。そのへん、両立させたいですね。それと、不足してるのは愛（笑）。他にも、いろんな才能がほしいし。自分に出来ることを常に見つけきれてないと思うから、これからも探していきたいですね。
    romaji: >
      Arimasu yo. Ippai. Mazu wa, okane to jikan. Chokin shiteru n desu ka tte? Maa ne (warai). Demo ne, okane ga atte mo tsukaeru jikan ga nakattara imi ga nain desu yo. Sono hen, ryōritsu sasetai desu ne. Sore to, fusoku shiteru no wa ai (warai). Hoka ni mo, ironna sainō ga hoshii shi. Jibun ni dekiru koto o tsune ni mitsuke kiretenai to omou kara, kore kara mo sagashite ikitai desu ne.
    en: >
      Plenty. Money and time first. Saving? Well, yeah (laughs). But money without time to use it is meaningless—I want both. And love (laughs). I want more talent too. I haven't found everything I can do yet.
  - speaker: kozi
    ja: >
      一般常識と日本語能力。どうも周りの人間に言わせると俺は一般常識に欠けているらしいです。本人に自覚はないんですけど。あと、これは自覚あるんだけど僕ってボキャブラリーが極端に少ないせいか、自分の考えとか気持ちを人に言葉で伝えるのがすごいヘタなんですよ。自分の言ったことが、人には大体ちがう方向で解釈されちゃうことが多いというか。でも、いいんです。俺は言葉っていう枠を越えたところで表現をして行きたいと思ってるから。みんな、もっと感じ合おうよ！ってことですかね（笑）
    romaji: >
      Ippan jōshiki to Nihongo nōryoku. Dōmo mawari no ningen ni iwasaseru to ore wa ippan jōshiki ni kakete iru rashii desu. Honnin ni jikaku wa nain desu kedo. Ato, kore wa jikaku arun dakedo boku tte bokyaburarī ga kyokutan ni sukunai sei ka, jibun no kangae toka kimochi o hito ni kotoba de tsutaeru no ga sugoku heta nan desu yo. Jibun no itta koto ga, hito ni wa daitai chigau hōkō de kaishaku sarechau koto ga ōi to iu ka. Demo, ii n desu. Ore wa kotoba tte iu waku o koeta tokoro de hyōgen o shite ikitai to omotteru kara. Minna, motto kanjiau yo! tte koto desu ka ne (warai)
    en: >
      Common sense and Japanese ability. People say I lack common sense—I don't feel it myself. My vocabulary is so small I'm bad at putting thoughts into words; people often misunderstand. But I want to express myself beyond words. Let's feel each other more! (laughs)
  # —— E: Europe ——
  - speaker: yuki
    ja: >
      マリスミゼルには、一時期、中世ヨーロッパっていうのは付いて回りましたから、何かつじつまのあう言葉っていうか。今は、ヨーロッパに限らずもっと幅広いところで表現していこうと思ってるんですけどね。
    romaji: >
      Marisu Mizeru ni wa, ichijiki, chūsei Yōroppa tte iu no wa tsuite mawarimashita kara, nanika tsujitsuma no au kotoba tte iu ka. Ima wa, Yōroppa ni kagirazu motto habahiroi tokoro de hyōgen shite ikō to omotteru n desu kedo ne.
    en: >
      Medieval Europe once followed Malice Mizer around—it fits somehow. Now I want to express ourselves more broadly, not just Europe.
  - speaker: mana
    ja: >
      ヨーロッパですか。思い出しますね、あの頃のことを（本誌V-02のインタヴュー内容参照）。ヨーロッパに関してはフランスに限らず、イタリアとかギリシアもすごい好きだし全体的に好きなんですけど、中でも影の部分とか、暗黒の部分に特にひかれます。また、いろんな国に行ってみたいですね。
    romaji: >
      Yōroppa desu ka. Omoiokoshimasu ne, ano koro no koto o (honshi V-02 no intabyū naiyō sanshō). Yōroppa ni kanshite wa Furansu ni kagirazu, Itaria toka Girisha mo sugoku suki da shi zentai teki ni suki nan desu kedo, naka demo kage no bubun toka, ankoku no bubun ni toku ni hikaremasu. Mata, ironna kuni ni itte mitai desu ne.
    en: >
      Europe? It brings back those days (see SHOXX V-02 interview). I love Italy, Greece, not just France—the shadowy, dark parts especially. I want to visit many countries.
  - speaker: gackt
    ja: >
      人種のるつぼだし、不思議な国ではないところですごく面白い地域だと思いますね。国によっていろんなとこがあるんだけど、気質的に僕と合ってる気がする。休暇として帰りたいと思うのは、去年撮影で行ったフランスの田舎の方。旅として行きたいと思うのは、スペインとかイタリアかな。
    romaji: >
      Jinshu no rutsubo da shi, fushigi na kuni de wa nai tokoro de sugoku omoshiroi chiiki da to omoimasu ne. Kuni ni yotte ironna tokoro ga arun dakedo, kishitsu teki ni boku to atteru ki ga suru. Kyūka to shite kaeritai to omou no wa, kyonen satsuei de itta Furansu no inaka no hō. Tabi to shite ikitai to omou no wa, Supein toka Itaria kana.
    en: >
      A melting pot—not a strange country but a fascinating region. Different parts suit different temperaments; I feel it suits mine. I'd return to rural France where we filmed; I'd travel to Spain or Italy.
  - speaker: kami
    ja: >
      建物が絵になってますよね、町並みとか石畳の道とか。だから、海外ではヨーロッパが好きだし、興味があります。特に僕らは昔、フランスに住んでいたので（笑）。まあ、フランスは知り尽くしているから（笑）、他の国にも行ってみたいです。とりあえず、今度、ベネチアの仮面祭りに行きたいな。
    romaji: >
      Tatemono ga e ni nattemasu yo ne, machinami toka ishidatami no michi toka. Dakara, kaigai de wa Yōroppa ga suki da shi, kyōmi ga arimasu. Toku ni bokura wa mukashi, Furansu ni sunde ita node (warai). Maa, Furansu wa shiri tsukushite iru kara (warai), hoka no kuni ni mo itte mitai desu. Toriaezu, kondo, Benechia no kamen matsuri ni ikitai na.
    en: >
      The buildings are like paintings—townscapes, cobblestone streets. I like Europe abroad. We used to live in France (laughs)—I know France well (laughs), so I want other countries. Venice's carnival next.
  - speaker: kozi
    ja: >
      これまで自分の感覚に引っかかって来た芸術であったり、芸術とかそういうものはヨーロッパ圏のものがすごく多いです。もちろんアメリカの音楽にも好きなものはあるけど、あれはすごく戦った感じがするじゃない？ それに対してヨーロッパのものはもっと湿った感じがあるし、歴史的な背景もいろいろあいまみえ全体に深みがある気がするんですよ。あれだけ街並みが綺麗だったフランスにもまた行きたいし、イタリアとかヨーロッパの他国にも行ってみたいですね。あとはオランダのアムステルダムにも行きたいなぁ。理由？ それはパーティがあるから！ 何のパーティかは秘密（笑）。
    romaji: >
      Kore made jibun no kankaku ni hikkakatte kita geijutsu de attari, geijutsu toka sō iu mono wa Yōroppa-ken no mono ga sugoku ōi desu. Mochiron Amerika no ongaku ni mo suki na mono wa aru kedo, are wa sugoku tatakatta kanji ga suru ja nai? Sore ni tai shite Yōroppa no mono wa motto shimetta kanji ga aru shi, rekishi teki na haikei mo ironna aimamie zentai ni fukami ga aru ki ga surun desu yo. Are dake machinami ga kirei datta Furansu ni mo mata ikitai shi, Itaria toka Yōroppa no takoku ni mo itte mitai desu ne. Ato wa Oranda no Amusuterudamu ni mo ikitai nā. Riyū? Sore wa pātī ga aru kara! Nan no pātī ka wa himitsu (warai).
    en: >
      Art that's caught my sensibility is mostly European. I like American music too, but it feels like a fight. Europe feels damper, with layered history and depth. I want to return to France, visit Italy and elsewhere—and Amsterdam. Why? There's a party! What party is a secret (laughs).
  # —— F: Fan letter ——
  - speaker: yuki
    ja: >
      やっぱり、ライヴの感想とか書いてきてくれると、うれしいですよね。ふと、やっててよかったなって感じる時もあるし。全部読んではいるんですけど、返事が書けないので、この場を借りて“いつも、ありがとうございます。ファンレター読んでます”とお伝えください。
    romaji: >
      Yappari, raivu no kansō toka kaite kite kureru to, ureshii desu yo ne. Futo, yattete yokatta na tte kanjiru toki mo aru shi. Zenbu yonde wa irun desu kedo, henji ga kakenai node, kono ba o karite "itsumo, arigatō gozaimasu. Fanrētā yondemasu" to otsutae kudasai.
    en: >
      Live impressions make me happy—sometimes I feel glad we're doing this. I read them all but can't reply, so please tell everyone: thank you, I read your fan letters.
  - speaker: mana
    ja: >
      生き甲斐です。今は、ファンレターを読むことで楽しみが生きてると言っても過言ではないくらい。あ、そう言えばさっき言い忘れたけど、ファンレターを読んで泣いちゃうこともあります。あと、マリス・ミゼルと出会って生きる希望を見つけましたみたいな手紙をもらうと、やっぱりやらなきゃいけないなって思いますよ。
    romaji: >
      Ikigai desu. Ima wa, fanrētā o yomu koto de tanoshimi ga ikiteru to itte mo kagon de wa nai kurai. A, sō ieba sakki ii wasureta kedo, fanrētā o yonde naichau koto mo arimasu. Ato, Marisu Mizeru to deatte ikiru kibō o mitsukemashita mitai na tegami o morau to, yappari yaranakya ikenai na tte omoimasu yo.
    en: >
      They're my reason for living—reading fan letters is practically what keeps my joy alive. I sometimes cry reading them. Letters saying Malice Mizer gave them hope to live make me think I've got to keep going.
  - speaker: gackt
    ja: >
      必ず全部読みますよ。よく、“読んでくれるかどうかわかりませんがけど”って書いてあったりするけど、絶対に読んでますよ。それは何故かって言えば、ファンレターは出してくれた人たちの心のそのものだから。ライヴ以外の場で僕らが直接ファンの人たちと出会うことってまずないけど、みんなが何を感じて、どう考えているのかっていうのを知りたいんでしょうね。その人の写真が入っていれば、なおいいって感じ。
    romaji: >
      Kanarazu zenbu yomimasu yo. Yoku, "yonde kureru ka dō ka wakarimasen ga kedo" tte kaite attari suru kedo, zettai ni yondemasu yo. Sore wa naze ka tte ieba, fanrētā wa dashite kureta hito-tachi no kokoro no sono mono dakara. Raivu igai no ba de bokura ga chokusetsu fan no hito-tachi to deau koto tte mazu nai kedo, minna ga nani o kanjite, dō kangaete iru no ka tte iu no o shiritai n deshō ne. Sono hito no shashin ga haitte ireba, nao ii tte kanji.
    en: >
      I always read every one. People often write "I don't know if you'll read this"—I absolutely do. Fan letters are the hearts of those who send them. We rarely meet fans outside lives, so I want to know what they feel and think. Photos enclosed are even better.
  - speaker: kami
    ja: >
      俺、言わせてもらいますけど、自分のことをズラズラ書いてあるのは読んでも何も感じない。逆に、短い文章でも何かを感じ取れるものもあるんですよ。たった一つの文が、俺の心に突き刺さっちゃったり。そういう手紙は大切にしまってあります。ステキだの、カッコいいだの、そういうんじゃなく、もっと深い所での僕らのことを見ていてほしいんです。一応、もらった手紙は全部読みますよ。ファンレターをもらうと嬉しいものだし、後日、自分にファンレターを書いたことがあるから（笑）、書いてくれる気持ちもわかるしね。
    romaji: >
      Ore, iwasete moraimasu kedo, jibun no koto o zurazura kaite aru no wa yonde mo nani mo kanjinai. Gyaku ni, mijikai bunshō demo nanika o kanji toreru mono mo arun desu yo. Tatta hitotsu no bun ga, ore no kokoro ni tsukisasacchattari. Sō iu tegami wa taisetsu ni shimatte arimasu. Suteki da no, kakkoii da no, sō iun ja naku, motto fukai tokoro de no bokura no koto o mite ite hoshin desu. Ichiō, moratta tegami wa zenbu yomimasu yo. Fanrētā o morau to ureshii mono da shi, gojitsu, jibun ni fanrētā o kaite koto ga aru kara (warai), kaite kureru kimochi mo wakaru shi ne.
    en: >
      Long letters about me don't move me. Short ones sometimes hit deep—one sentence can pierce my heart. I keep those carefully. I want people to see us at a deeper level, not just "cool" or "lovely." I read every letter. I've written fan letters myself (laughs), so I understand.
  - speaker: kozi
    ja: >
      全部読んでます。ほんとですよ。だって、今の自分がこうして日々生きてられるのもファンレターのおかげかなっていうの、あるくらいですから。内容はほんといろいろで、中にはけっこうヘヴィな内容のものもあるんだけど、逆にそれでこっちもいろいろ考えさせられたり、何かを新たに発見させられたりするんですよ。最近は忙しくて休めないけど、そういう時でもみんなの手紙を読むようにしてます。いつもありがとう。
    romaji: >
      Zenbu yondemasu. Honto desu yo. Datte, ima no jibun ga kō shite hibi ikite rareru no mo fanrētā no okage kana tte iu no, aru kurai desu kara. Naiyō wa honto iroiro de, naka ni wa kekkō hevī na naiyō no mono mo arun dakedo, gyaku ni sore de kocchi mo iroiro kangaesaseraretari, nanika o arata ni hakken saseraretari surun desu yo. Saikin wa isogashikute yasumenai kedo, sō iu toki demo minna no tegami o yomu yō ni shitemasu. Itsumo arigatō.
    en: >
      I read them all, really. Fan letters are partly why I can live day to day. Content varies—some heavy—but that makes me think and discover things. Even when busy and sleepless, I read them. Thank you always.
  # —— G: Gift ——
  - speaker: yuki
    ja: >
      プレゼント選びは難しいですね。何を贈れば喜んでもらえるか、いつも悩みます。KAMIの誕生日プレゼント、まだ渡してないんです（笑）。
    romaji: >
      Purezento erabi wa muzukashii desu ne. Nani o okureba yorokonde moraeru ka, itsumo nayamimasu. KAMI no tanjōbi purezento, mada watashite nain desu (warai).
    en: >
      Choosing gifts is hard—I always worry what would make someone happy. I still haven't given KAMI their birthday present (laughs).
  - speaker: mana
    ja: >
      面白いおもちゃとかインテリアとか好きですね。ドラマチックなシチュエーションで、トレンディな感じで渡したいなぁって思います。
    romaji: >
      Omoshiroi omocha toka interia toka suki desu ne. Doramatikku na shichuēshon de, torendī na kanji de watashitai nā tte omoimasu.
    en: >
      I like interesting toys or interior items. I'd love to give a gift in a dramatic, trendy-drama kind of situation.
  - speaker: gackt
    ja: >
      気持ちは嬉しいんですけど、生ものはダメです。事務所に届くまで時間がかかるから。甘いものもあまり。お酒とかタバコとか服が嬉しい。でも服はサイズが小さすぎる人が多い（笑）。
    romaji: >
      Kimochi wa ureshiin desu kedo, namamono wa dame desu. Jimusho ni todoku made jikan ga kakaru kara. Amai mono mo amari. Osake toka tabako toka fuku ga ureshii. Demo fuku wa saizu ga chiisasugiru hito ga ōi (warai).
    en: >
      I appreciate the thought, but no perishables—they take time to reach the office. Not sweets either. Alcohol, cigarettes, or clothes please—but people often buy sizes too small (laughs).
  - speaker: kami
    ja: >
      ふと見て「これ、あいつに似合うな」って思ったらその場で買ってあげることが多いですね。今は蝶の指輪を集めてます。
    romaji: >
      Futo mite "kore, aitsu ni niau na" tte omottara sono ba de katte ageru koto ga ōi desu ne. Ima wa chō no yubiwa o atsumetemasu.
    en: >
      When I see something that suits someone, I often buy it on the spot. I'm collecting butterfly rings now.
  - speaker: kozi
    ja: >
      だいたいタバコをもらいます。家にタバコが山ほどあって、店が開けられそうなくらい。肺は真っ黒だろうな（笑）。
    romaji: >
      Daitai tabako o moraimasu. Ie ni tabako ga yama hodo atte, mise ga akerare sō na kurai. Hai wa makkuro darō na (warai).
    en: >
      I usually get cigarettes. I have so many at home I could open a shop. My lungs must be pitch black (laughs).
  # —— H: Hat ——
  - speaker: yuki
    ja: >
      帽子好きです。ステージでも普段でもよく被ります。今は柔らかくて深く被れるのが好みですね。
    romaji: >
      Bōshi suki desu. Sutēji demo fudan demo yoku kaburimasu. Ima wa yawarakakute fukaku kabureru no ga konomi desu ne.
    en: >
      I like hats—I wear them on stage and daily. Lately I prefer soft ones that fit deep.
  - speaker: mana
    ja: >
      昔から被ってます。あまり派手じゃないデザインが好きですね。
    romaji: >
      Mukashi kara kabuttemasu. Amari hade ja nai dezain ga suki desu ne.
    en: >
      I've worn hats a long time. I prefer designs that aren't too flashy.
  - speaker: gackt
    ja: >
      基本的に嫌いです。釣りとか日除け以外は。マスケラの人に釣りの格好（帽子付き）が似合わないって言われたことあります（笑）。
    romaji: >
      Kihon teki ni kirai desu. Tsuri toka hiyoke igai wa. Masukera no hito ni tsuri no kakkō (bōshi tsuki) ga niawanai tte iwareta koto arimasu (warai).
    en: >
      I basically dislike them except for fishing or sun protection. Maschera members said my fishing outfit with a hat didn't look right (laughs).
  - speaker: kami
    ja: >
      昔は20個くらい持ってました。「au revoir」の衣装の帽子は、帽子というよりオプションみたいなものでしたね。
    romaji: >
      Mukashi wa 20-ko kurai motte mashita. "au revoir" no isō no bōshi wa, bōshi to iu yori opushon mitai na mono deshita ne.
    en: >
      I used to own about twenty. The hat for the "au revoir" costume was more of an option than a hat.
  - speaker: kozi
    ja: >
      変な色や形の帽子が好きです。昔は市販の帽子を自分で改造してたこともあります。
    romaji: >
      Hen na iro ya katachi no bōshi ga suki desu. Mukashi wa shihan no bōshi o jibun de kaizō shiteta koto mo arimasu.
    en: >
      I like hats with strange colors or shapes. I used to modify store-bought hats myself.
  # —— I: Ikari ——
  - speaker: yuki
    ja: >
      怒ることはあまりないですね。たまに感じても、すぐ忘れちゃいます。
    romaji: >
      Okoru koto wa amari nai desu ne. Tama ni kanjite mo, sugu wasurechaimasu.
    en: >
      I rarely get angry. Even when I do, I forget quickly.
  - speaker: mana
    ja: >
      政治とか社会に対する怒りはあります。それを音楽に落とし込んでます。抑えきれない時は走りに行きます。
    romaji: >
      Seiji toka shakai ni tai suru okori wa arimasu. Sore o ongaku ni otoshikondemasu. Osae kirenai toki wa hashiri ni ikimasu.
    en: >
      I feel anger toward politics and society—I channel it into music. When I can't contain it, I go for a run.
  - speaker: gackt
    ja: >
      あまり怒らないですけど、怒ると危ないって言われます。友達に「敵にしたくない」って言われることもあります。
    romaji: >
      Amari okoranai desu kedo, okoru to abunai tte iwaremasu. Tomodachi ni "teki ni shitakunai" tte iwareru koto mo arimasu.
    en: >
      I don't get angry often, but they say it's dangerous when I do. Friends say they wouldn't want me as an enemy.
  - speaker: kami
    ja: >
      怒ることは少ないですけど、プライドや信念を傷つけられた時は譲りません。
    romaji: >
      Okoru koto wa sukunai desu kedo, puraido ya shinnen o kizutsukerareta toki wa yuzurimasen.
    en: >
      I'm rarely angry, but I stand firm when my pride or beliefs are challenged.
  - speaker: kozi
    ja: >
      怒りは美しい人間の感情だと思います。音楽やパフォーマンスを通して内なる情熱を解放してます。
    romaji: >
      Okori wa utsukushii ningen no kanjō da to omoimasu. Ongaku ya pafōmansu o tōshite uchi naru jōnetsu o kaihō shitemasu.
    en: >
      I think anger is a beautiful human emotion. I release inner passions through music and performance.
  # —— J: Jealousy ——
  - speaker: yuki
    ja: >
      今はあまり感じないですね。若い頃は女の子に対してもっと嫉妬してたかもしれません。
    romaji: >
      Ima wa amari kanjinai desu ne. Wakai koro wa onna no ko ni tai shite motto shitto shiteta kamoshiremasen.
    en: >
      I don't really feel it anymore. When I was younger I might have been more jealous about girls.
  - speaker: mana
    ja: >
      表には出さないですけど、嫉妬深いのかもしれない。クールな振る舞いをしてても寂しいと感じることもあります。
    romaji: >
      Hyou ni wa dasanai desu kedo, shitto-bukai no kamoshirenai. Kūru na furumai o shitete mo sabishii to kanjiru koto mo arimasu.
    en: >
      I don't show it, but I might be jealous. Even when acting cool in relationships, I feel lonely.
  - speaker: gackt
    ja: >
      感じません。他人を嫉妬するのは自分の不浄さや劣等感を認めるようなものだと思います。
    romaji: >
      Kanjimasen. Tanin o shitto suru no wa jibun no fujōsa ya retōkan o mitomeru yō na mono da to omoimasu.
    en: >
      I don't feel it. Being jealous of others is like admitting your own uncleanness or inferiority.
  - speaker: kami
    ja: >
      嫉妬深いです。好きな女の子が他の男の人と話してると、すごくやきもち焼いちゃいます。
    romaji: >
      Shitto-bukai desu. Suki na onna no ko ga hoka no otoko no hito to hanashiteru to, sugoku yakimochi yaichaimasu.
    en: >
      I'm very jealous. If a girl I like talks to other guys, I get really possessive.
  - speaker: kozi
    ja: >
      怒りと同じで、何にでも嫉妬深い人間だと思います。
    romaji: >
      Okori to onaji de, nani ni demo shitto-bukai ningen da to omoimasu.
    en: >
      Like anger—I think I'm a deeply jealous person about everything.
  # —— K: Kindness ——
  - speaker: yuki
    ja: >
      「親切」って定義が難しいですね。灰皿を差し出してくれるとか、小さなこと。田舎に釣りに行くと、人はすごく親切です。
    romaji: >
      "Shinsetsu" tte teigi ga muzukashii desu ne. Haizara o sashidashite kureru toka, chiisana koto. Inaka ni tsuri ni iku to, hito wa sugoku shinsetsu desu.
    en: >
      Kindness is hard to define—small things like offering an ashtray. People in the countryside are very kind when I go fishing.
  - speaker: mana
    ja: >
      ファンに対するサービス精神も、親切の一種だと思います。
    romaji: >
      Fan ni tai suru sābisu seishin mo, shinsetsu no isshu da to omoimasu.
    en: >
      My service spirit toward fans is a form of kindness.
  - speaker: gackt
    ja: >
      意識して親切にしようとはしないですけど、駅でお年寄りの荷物を持ってあげたりします。日本の駅はお年寄りに不親切な設計が多いですから。
    romaji: >
      Ishiki shite shinsetsu ni shiyō to wa shinai desu kedo, eki de o-toshiyori no nimotsu o motte agetari shimasu. Nihon no eki wa o-toshiyori ni fushinsetsu na sekkei ga ōi desu kara.
    en: >
      I don't try to be kind consciously, but I help elderly people with luggage at stations—Japanese stations are poorly designed for them.
  - speaker: kami
    ja: >
      親切が一番大事だと思います。おばあさんを階段でおんぶしたこともあるし、外国人に駅の東口を教えたこともあります。
    romaji: >
      Shinsetsu ga ichiban daiji da to omoimasu. Obāsan o kaidan de onbu shita koto mo aru shi, gaikokujin ni eki no higashiguchi o oshiete koto mo arimasu.
    en: >
      Kindness is most important. I've carried an elderly woman up stairs and helped a foreigner find a station's east exit.
  - speaker: kozi
    ja: >
      親切って難しいですよね。世間体やお節介に見えることもある。電車で席を譲ったりはしますけど。
    romaji: >
      Shinsetsu tte muzukashii desu yo ne. Sekentai ya osekkai ni mieru koto mo aru. Densha de seki o yuzuttari wa shimasu kedo.
    en: >
      Kindness is difficult—it can look like hypocrisy or meddling. I do give up my seat on the train.
  # —— L: Luxury ——
  - speaker: yuki
    ja: >
      贅沢とは思いません。ピザとかチキンとかたくさん注文しますけど、一日かけて全部食べます（笑）。
    romaji: >
      Zeitaku to wa omoimasen. Piza toka chikin toka takusan chūmon shimasu kedo, ichinichi kakete zenbu tabemasu (warai).
    en: >
      I don't consider myself luxurious. I order lots of pizza and chicken but eat it all over the day (laughs).
  - speaker: mana
    ja: >
      朝日を浴びながら、メイドに食事を出してもらってのんびり寝坊するのが贅沢ですね。
    romaji: >
      Asahi o abinagara, meido ni shokuji o dashite moratte nonbiri nebō suru no ga zeitaku desu ne.
    en: >
      Luxury is sleeping in, having a maid serve a meal while basking in the morning sun.
  - speaker: gackt
    ja: >
      ストレスのない環境。贅沢とは友達がたくさんいて、時間もお金も分かち合えることだと思います。
    romaji: >
      Sutoresu no nai kankyō. Zeitaku to wa tomodachi ga takusan ite, jikan mo okane mo wakachiaeru koto da to omoimasu.
    en: >
      A stress-free environment. Luxury is having many friends who share both time and money.
  - speaker: kami
    ja: >
      時間とお金と、愛する人が揃った時が贅沢ですね。
    romaji: >
      Jikan to okane to, aisuru hito ga sorotta toki ga zeitaku desu ne.
    en: >
      Luxury is when you have time, money, and a loved one together.
  - speaker: kozi
    ja: >
      朝帰りに生卵と味噌汁と漬物のフルセット。それが贅沢です（笑）。
    romaji: >
      Asagaeri ni namatamago to misoshiru to tsukemono no furusetto. Sore ga zeitaku desu (warai).
    en: >
      Coming home in the morning with raw egg, miso soup, and pickles—a full set. That's luxury (laughs).
  # —— M: Mischief ——
  - speaker: yuki
    ja: >
      小学校の頃、好きな女の子の注意を引くためにいたずらしたことありますね。
    romaji: >
      Shōgakkō no koro, suki na onna no ko no chūi o hiku tame ni itazura shita koto arimasu ne.
    en: >
      In elementary school I played pranks on girls I liked to get their attention.
  - speaker: mana
    ja: >
      子供の頃、近所の年下の女の子をいじめて泣かせてた記憶があります。あれが「Premier Amour」の原体験かもしれないですね。
    romaji: >
      Kodomo no koro, kinjo no toshishita no onna no ko o ijimete nakaseteta kioku ga arimasu. Are ga "Premier Amour" no gen taiken kamoshirenai desu ne.
    en: >
      As a child I teased a younger neighborhood girl until she cried—that might be the origin of "Premier Amour."
  - speaker: gackt
    ja: >
      昔はいたずら好きでした。今はもうしないですけど、人を驚かすのは楽しかったですね（笑）。
    romaji: >
      Mukashi wa itazura-zuki deshita. Ima wa mō shinai desu kedo, hito o odorokasu no wa tanoshikatta desu ne (warai).
    en: >
      I used to love pranks. I don't anymore, but surprising people was fun (laughs).
  - speaker: kami
    ja: >
      悪戯と言えるほど大きなことはないですけど、友達をびっくりさせるのは好きでした。今はドラムで驚かせます（笑）。
    romaji: >
      Itazura to ieru hodo ōkina koto wa nai desu kedo, tomodachi o bikkuri saseru no wa suki deshita. Ima wa doramu de odorokasemasu (warai).
    en: >
      Nothing you'd call major mischief, but I liked surprising friends. Now I surprise them with drums (laughs).
  - speaker: kozi
    ja: >
      地元ではけっこう悪さしてました。夏休みに限らずですけど（笑）。昆虫を入れたり、変なこと色々。
    romaji: >
      Jimoto de wa kekkō warusa shitemashita. Natsuyasumi ni kagirazu desu kedo (warai). Kōchū o iretari, hen na koto iroiro.
    en: >
      I was quite mischievous back home—not just in summer (laughs). Putting insects in things, all sorts of stuff.
  # —— N: New album ——
  - speaker: yuki
    ja: >
      うちのバンドのことで言えば、最近、インタビュー・アルバムについて答えてるんですが、僕、あまりうちで聴かないんですよ（笑）。レコーディング終わって、マスタリングも終わって形は作ってあるんですけど。だから、昨日聴いたばかりですよ。時間が経過するだけに、客観的に聴くことができたし、もっと違った方向から見えてきて、作った時から自分も含め、みんな成長しているわけで。やっぱりどこか自分の作品だけに目が付いてしまうっていうか、厳しく突っ込んでしまうところがありますね。
    romaji: >
      Uchi no bando no koto de ieba, saikin, intabyū arubamu ni tsuite kotaeterun desu ga, boku, amari uchi de kikanain desu yo (warai). Rekōdingu owatte, masutaringu mo owatte katachi wa tsukutte arun desu kedo. Dakara, kinō kiita bakari desu yo. Jikan ga keika suru dake ni, kyakkan teki ni kiku koto ga dekita shi, motto chigatta hōkō kara miete kite, tsukutta toki kara jibun mo fukume, minna seichō shiteiru wake de. Yappari dokoka jibun no sakuhin dake ni me ga tsuite shimau tte iu ka, kibishiku tsutsunde shimau tokoro ga arimasu ne.
    en: >
      For our band, I've been answering interview questions about the album but I don't listen much at home (laughs). Recording and mastering are done. I only listened yesterday—time lets me hear it objectively from new angles; we've all grown since making it. I tend to fixate on my own parts and criticize harshly.
  - speaker: mana
    ja: >
      何かを感じてください。そして、感じたら手紙をください。
    romaji: >
      Nanika o kanjite kudasai. Soshite, kanjitara tegami o kudasai.
    en: >
      Please feel something. And if you do, send a letter.
  - speaker: gackt
    ja: >
      人それぞれが持つ空想の部分ってあるはずで、それに対する反応は僕らが今でも続けてることなんだけど、その空想について何かしらの思いっていうのが、この『merveilles』を聴くことでみんなの中に生まれたら嬉しいです。
    romaji: >
      Hito sorezore ga motsu kūsō no bubun tte aru hazu de, sore ni tai suru hannō wa bokura ga ima demo tsuzuketeru koto nan dakedo, sono kūsō ni tsuite nanika shira no omoi tte iu no ga, kono "merveilles" o kiku koto de minna no naka ni umaretara ureshii desu.
    en: >
      Everyone has an imaginative side—we've always responded to that. I'd be happy if listening to merveilles sparks some thought about that imagination in everyone.
  - speaker: kami
    ja: >
      僕が好きなアーティストの場合、基本的に1stアルバムが一番好きなんですよ。1stを超える物はないと思うし、1stの独特の世界観がいいなと思うし。マリスの場合は1枚1枚、コンセプトが違うっていうアプローチの仕方だから、そういった意味では、毎回毎回、1stアルバムって感覚ですね。
    romaji: >
      Boku ga suki na ātisuto no baai, kihon teki ni 1st arubamu ga ichiban suki nan desu yo. 1st o koeru mono wa nai to omou shi, 1st no dokutoku no sekai-kan ga ii na to omou shi. Marisu no baai wa 1-mai 1-mai, konseputo ga chigau tte iu apurōchi no shikata dakara, sō itta imi de wa, maikai maikai, 1st arubamu tte kankaku desu ne.
    en: >
      For artists I like, the first album is usually my favorite—nothing surpasses that unique worldview. With Malice each album has a different concept, so every time feels like a first album.
  - speaker: kozi
    ja: >
      ご意見・感想、または苦情などがありましたらお寄せください。
    romaji: >
      Goiken kansō, mata wa kujō nado ga arimashitara o-yose kudasai.
    en: >
      Opinions, impressions, or complaints—please send them in.
  # —— O: Old age ——
  - speaker: yuki
    ja: >
      何もない。老後って言われる年齢まで生きていたくないですからね。いや、きっと老後を迎えるまでに死んでるだろうな（笑）。
    romaji: >
      Nani mo nai. Rōgo tte iwareru nenrei made ikite itakunai desu kara ne. Iya, kitto rōgo o mukaeru made ni shinderu darō na (warai).
    en: >
      Nothing. I don't want to live to what's called old age. I'll probably die before then anyway (laughs).
  - speaker: mana
    ja: >
      のんびり牧場でも暮らしたいです。そんな気がします。
    romaji: >
      Nonbiri bokujō demo kurashitai desu. Sonna ki ga shimasu.
    en: >
      I'd like to live on a leisurely farm someday. That's the feeling.
  - speaker: gackt
    ja: >
      老後とはちょっと違うかもしれないけど、遠い将来で良いから学校を作りたい。別に女子校じゃないよ（笑）。ちゃんと共学。教育理念は自由。これ読んでる人もいつか、僕自身も学校に対しての疑問ってすごく持ってたから、それぞれが勉強したいことを自由に勉強出来るような、そんな学校が作れたらいいなと思うんですよ。
    romaji: >
      Rōgo to wa chotto chigau kamoshirenai kedo, tōi shōrai de yoi kara gakkō o tsukuritai. Betsu ni joshikō ja nai yo (warai). Chanto kyōgaku. Kyōiku rinen wa jiyū. Kore yonderu hito mo itsuka, boku jishin mo gakkō ni tai shite no gimon tte sugoku motte takara, sorezore ga benkyō shitai koto o jiyū ni benkyō dekiru yō na, sonna gakkō ga tsukuretara ii na to omoun desu yo.
    en: >
      Maybe not old age, but someday I want to build a school—not a girls' school (laughs), co-ed, with free educational philosophy. I'd like one where each person freely studies what they want.
  - speaker: kami
    ja: >
      たぶん32歳くらいで死ぬから、老後は無い。もし長生きしちゃったら、いろんなおばあさんと恋をしてるんじゃないかな（笑）。やっぱり、幾つになっても恋をしないとね。
    romaji: >
      Tabun 32-sai kurai de shinu kara, rōgo wa nai. Moshi nagaiki shichattara, ironna obāsan to koi o shiterun ja nai kana (warai). Yappari, ikutsu ni natte mo koi o shinai to ne.
    en: >
      I'll probably die around 32, so no old age. If I lived long, I'd be in love with various grandmothers (laughs). You've got to keep falling in love.
  - speaker: kozi
    ja: >
      俺、あんまり長生きしたくないんですよ。だって、よぼよぼになって周りに申しわけなさそうに隠居生活するのも、どうも性に合わない感じするでしょ？ 細く長くじゃなくて、太く短く生きたいんです。なんて言ってるヤツに限って、すごく長生きしたりしてね（笑）。でも、先のことは何も考えてません。
    romaji: >
      Ore, anmari nagaiki shitakunain desu yo. Datte, yoboyobo ni natte mawari ni mōshiwake nasasō ni inkyo seikatsu suru no mo, dōmo sei ni awanai kanji suru desho? Hosoku nagaku ja nakute, futoku mijikaku ikitain desu. Nante itteru yatsu ni kagitte, sugoku nagaiki shitari shite ne (warai). Demo, saki no koto wa nani mo kangaetemasen.
    en: >
      I don't want to live long—growing frail and apologetically retiring doesn't suit me. Thick and short, not thin and long. People who say that often live forever (laughs). I don't think about the future.
  # —— P: Prophecy ——
  - speaker: yuki
    ja: >
      恐らく、大変なことになるでしょう。マリスミゼルが、そうでありたい…
    romaji: >
      Osoraku, taihen na koto ni naru deshō. Marisu Mizeru ga, sō de aritai…
    en: >
      Something tremendous will probably happen. Malice Mizer wants it that way…
  - speaker: mana
    ja: >
      99年、この音楽業界には何かが起こります。そして、99年にはさらに凄いことが起こります。2000年？それは、あるかどうか分からないですね。別に例の予言を信じてるわけじゃないんだけど、あれは人が起こすものだからね。とにかく、これから何かが起こることは間違いないでしょう。
    romaji: >
      99-nen, kono ongaku gyōkai ni wa nanika ga okorimasu. Soshite, 99-nen ni wa sarani sugoi koto ga okorimasu. 2000-nen? Sore wa, aru ka dō ka wakaranai desu ne. Betsu ni rei no yogen o shinjiteru wake ja nain dakedo, are wa hito ga okosu mono dakara ne. Tonikaku, kore kara nanika ga okoru koto wa machigai nai deshō.
    en: >
      In '99 something will happen in the music industry—and something even bigger in '99. 2000? Who knows. I don't believe that prophecy, but people make things happen. Something will definitely occur.
  - speaker: gackt
    ja: >
      これが予言とは違うんだろうけど、俺が今根拠のない確信として思ってることは、頭の中に描くヴィジョンは可能性があるから生まれるものである、ということ。頭に描けることは全て実現可能だ、こんなことがあって、それを諦めることはしたくないし、みんなにもしないでほしいなと思います。
    romaji: >
      Kore ga yogen to wa chigau darō kedo, ore ga ima konkyo no nai kakushin to shite omotteru koto wa, atama no naka ni egaku vijon wa kanōsei ga aru kara umareru mono de aru, to iu koto. Atama ni egakeru koto wa subete jitsugen kanō da, konna koto ga atte, sore o akirameru koto wa shitakunai shi, minna ni mo shinai de hoshii na to omoimasu.
    en: >
      This may not be a prophecy, but I'm convinced visions in your head are born because they're possible. Everything you can picture can be realized—I don't want to give up, and I hope no one else does either.
  - speaker: kami
    ja: >
      32で死にます。理由？精神的にイッちゃってる時、32歳の自分に姿が見えたから。死後、今までの悪行を償っている姿が。
    romaji: >
      32 de shimasu. Riyū? Seishin teki ni icchatteru toki, 32-sai no jibun ni sugata ga mieta kara. Shigo, ima made no akugyō o tsugunatteru sugata ga.
    en: >
      I'll die at 32. Why? When I was losing it mentally, I saw myself at 32—after death, atoning for my misdeeds.
  - speaker: kozi
    ja: >
      ここまで俺の回答を読んできた、そこのアナタ。既にアナタの頭の中はKozi菌に侵されています。二日以上、四日以内に、アナタの夢には僕が出て来るでしょう。
    romaji: >
      Koko made ore no kaitō o yonde kita, soko no anata. Sude ni anata no atama no naka wa Kozi-kin ni shinrai sarete imasu. Futsuka ijō, yokka inai ni, anata no yume ni wa boku ga dete kuru deshō.
    en: >
      You there, who's read my answers this far—Kozi bacteria have already infected your brain. Within two to four days, I'll appear in your dreams.
  # —— Q: Question ——
  - speaker: yuki
    ja: >
      人間とは何でしょうね？今のメンバーと話すようになって、そういうワケ分からない議題を出して、語り合うことがたまにあるんです。一時そういうことについて、スゴく話してたんです。過去と未来は平行して進んでるとか、DNAがなんちゃら、とか。最近は、そういう議題も少なくなりましたね。
    romaji: >
      Ningen to wa nan deshō ne? Ima no menbā to hanasu yō ni natte, sō iu wake wakaranai gidai o dashite, katari au koto ga tama ni arun desu. Ichiji sō iu koto ni tsuite, sugoku hanashitetan desu. Kako to mirai wa heikō shite susunderu toka, DNA ga nanchyara, toka. Saikin wa, sō iu gidai mo sukunaku narimashita ne.
    en: >
      What is a human being? With the current members we sometimes discuss incomprehensible topics—past and future running parallel, DNA and so on. Lately those talks have decreased.
  - speaker: mana
    ja: >
      人についての全て。特に人が何気なく動いている様を見たりしてると、それに対して無性に疑問を感じることが多い。どうして誘われても困るけど、とにかく気になってしょうがない。移動中に車の中から外を見ていて気になるのも、歩いている人の姿だったりするしね。それ程車に帰ればいろんな表情を持ってるはずで、でもそんなことは関係なく街を歩いている人たちの姿を見てると、すごく深いところでいろいろ考えてしまうんですよ。たぶん、それはマリス・ミゼルとして追求し続けて来ている大前提の部分、“人間とは”っていうこと、きっとつながってるんじゃないですかね。
    romaji: >
      Hito ni tsuite no subete. Toku ni hito ga nanigena ku ugite iru sama o mitari shiteru to, sore ni tai shite mushō ni gimon o kanjiru koto ga ōi. Dōshite sasowarete mo komaru kedo, tonikaku ki ni natte shōganai. Idō-chū ni kuruma no naka kara soto o mite ite ki ni naru no mo, aruite iru hito no sugata dattari suru shi ne. Sore hodo kuruma ni kaereba ironna hyōjō o motteru hazu de, demo sonna koto wa kankei naku machi o aruite iru hito-tachi no sugata o miteru to, sugoku fukai tokoro de iroiro kangaete shimau n desu yo. Tabun, sore wa Marisu Mizeru to shite tsuikyū shitsuzukete kite iru dai zentei no bubun, "ningen to wa" tte iu koto, kitto tsunagatterun ja nai desu ka ne.
    en: >
      Everything about people. Watching people move casually fills me with questions I can't shake. From a car I notice pedestrians—each should have many expressions, yet walking through the city they make me think deeply. It connects to Malice Mizer's fundamental pursuit: what is a human being.
  - speaker: gackt
    ja: >
      世の中にある多くのセオリーというのが、多数決で決まっているということに疑問を感じます。
    romaji: >
      Yo no naka ni aru ōku no seorī to iu no ga, tasūketsu de kimatte iru to iu koto ni gimon o kanjimasu.
    en: >
      I question that many theories in the world are decided by majority vote.
  - speaker: kami
    ja: >
      世の中、疑問ばかりじゃないですか。自分と同じ考えを持ってる人なんていないわけだから。自分と違う考えを言われれば、そこで、なぜ？っていう疑問は出てくるし。そう考えると、全てが疑問ですよ。
    romaji: >
      Yo no naka, gimon bakari ja nai desu ka. Jibun to onaji kangae o motteru hito nante inai wake dakara. Jibun to chigau kangae o iwareba, soko de, naze? tte iu gimon wa dete kuru shi. Sō kangaeru to, subete ga gimon desu yo.
    en: >
      The world is nothing but questions. No one shares your exact thoughts—different views make you ask why. So everything is a question.
  - speaker: kozi
    ja: >
      毛の成長過程。
    romaji: >
      Ke no seichō katei.
    en: >
      The growth process of hair.
  # —— R: Recording ——
  - speaker: yuki
    ja: >
      前ほど嫌いじゃなくなったというか。やっぱり、レコーディングで、いろんなことが身になってくるというか、勉強になりますよね。神経的には、かなりイッちゃいますけど、終わった時はやっぱり、なんとも言えない気分があります。今回も、いろいろ勉強になって、自分の求めている音や音楽性なんかも、また、少し見えてきたし。レコーディングの度に成長できると思う。
    romaji: >
      Mae hodo kirai ja nakunatta to iu ka. Yappari, rekōdingu de, ironna koto ga mi ni natte kuru to iu ka, benkyō ni narimasu yo ne. Shinkei teki ni wa, kanari icchaimasu kedo, owatta toki wa yappari, nanto ie nai kibun ga arimasu. Konkai mo, iroiro benkyō ni natte, jibun no motomeru oto ya ongaku-sei nanka mo, mata, sukoshi miete kita shi. Rekōdingu no tabi ni seichō dekiru to omou.
    en: >
      I don't hate it as much anymore. Recording teaches you a lot—you go pretty crazy, but finishing brings an indescribable feeling. This time I learned more about the sound and musicality I seek. I think you grow with each session.
  - speaker: mana
    ja: >
      レコーディングは…難しいもんだよねぇ。好きなような気もするし、好きじゃないような気もするし。精神的に追い詰められるから、そこが苦しいですね。決められた時間の中で、一つの作品を完成させなきゃいけないわけなんだけど、やってるとどこまでも完成度を高めようとしちゃう。でも、どこかで完成っていう線引きを決めなきゃいけないし。それは永遠に形として残っていくものだから、それを一定の時間の中で全てやらなきゃならないっていうのは、ほんとすごく難しいです。言い出すとキリはないけど、神経質にならざるをえないものですね、レコーディングっていうのは。
    romaji: >
      Rekōdingu wa… muzukashii mon da yo nē. Suki na yō na ki mo suru shi, suki ja nai yō na ki mo suru shi. Seishin teki ni oitsumerareru kara, soko ga kurushii desu ne. Kimerareta jikan no naka de, hitotsu no sakuhin o kansei sase nakya ikenai wake nan dakedo, yatteru to doko made mo kansei-do o takameyō to shichau. Demo, dokoka de kansei tte iu senbiki o kimenakya ikenai shi. Sore wa eien ni katachi to shite nokotte iku mono dakara, sore o ittei no jikan no naka de subete yaranakya naranai tte iu no wa, honto sugoku muzukashii desu. Iidasu to kiri wa nai kedo, shinkeishitsu ni narazaru o enai mono desu ne, rekōdingu tte iu no wa.
    en: >
      Recording is hard—I half like it, half don't. Being mentally cornered is painful. You must finish within a set time yet always want higher perfection. It stays forever, so completing everything in limited time is truly difficult. Recording makes you neurotic.
  - speaker: gackt
    ja: >
      マリス・ミゼルのレコーディングって、たぶんすごく特殊な雰囲気漂ってるんじゃないかな。僕に一般の人が見学しに来たりしても、その場の空気の重さにきっと耐え切れないと思う。ただ音を作るんじゃなくて、メンバー間の人間性を垣間見る場。それがレコーディングだと僕は思います。
    romaji: >
      Marisu Mizeru no rekōdingu tte, tabun sugoku tokushu na fun'iki tadayotterun ja nai kana. Boku ni ippan no hito ga kengaku shi ni kitari shite mo, sono ba no kūki no omosa ni kitto taekirenai to omou. Tada oto o tsukurun ja nakute, menbā-kan no ningen-sei o kaimami miru ba. Sore ga rekōdingu da to boku wa omoimasu.
    en: >
      Malice Mizer recording probably has a very special atmosphere—ordinary visitors couldn't bear the weight of the air. It's not just making sound but glimpsing the humanity between members. That's what recording is.
  - speaker: kami
    ja: >
      大嫌い。CDでは音をキレイに聴かせなきゃいけないっていうのが、屈辱、あるじゃないですか。そういう考えが頭の中にある状態で、自分の感情をすべて出し切れるかと言ったら、疑問だと思う。だから、本当の自分を思いきり出せるライヴの方が好き。
    romaji: >
      Daikirai. CD de wa oto o kirei ni kikasenakya ikenai tte iu no ga, kutsujoku, aru ja nai desu ka. Sō iu kangae ga atama no naka ni aru jōtai de, jibun no kanjō o subete dashikireru ka to ittara, gimon da to omou. Dakara, hontō no jibun o omoikiri daseru raivu no hō ga suki.
    en: >
      I hate it. Having to make CDs sound clean feels like humiliation. Can you pour out all your emotions with that in your head? I doubt it—so I prefer lives where I can be my real self.
  - speaker: kozi
    ja: >
      早くまたしたいですね。後、ものを作っていく過程の作業自体がすごく好きみたい。もちろん出来たものに対する思いもあるんだけど、出来た後よりも作ってる時のほうが断然楽しいんだよね。
    romaji: >
      Hayaku mata shitai desu ne. Ato, mono o tsukutte iku katei no sagyō jitai ga sugoku suki mitai. Mochiron dekita mono ni tai suru omoi mo arun dakedo, dekita ato yori mo tsukutteru toki no hō ga danzen tanoshii n da yo ne.
    en: >
      I want to do it again soon. I love the process of making things—creating is far more fun than after it's done.
  # —— S: Summer holiday ——
  - speaker: yuki
    ja: >
      実は、明日が誕生日なんですけど、学校の登校日で。だいたい8月9日なんですよ（笑）。昔は、それが嫌でした。自分の誕生日が終わった頃だから、いつも祝ってもらえない、みたいな（笑）。なんで8日じゃなかったんだろう？ まあ、誕生日に学校へ行きたくないですけどね（笑）。だから、僕が夏が嫌いなんで、夏休みっていう思い出もないんです。海やプールも嫌いですから。泳げないから。宿題もいっつもやってなかったし。でも今年は、夏休みがほしい。
    romaji: >
      Jitsu wa, ashita ga tanjōbi nan desu kedo, gakkō no tōkōbi de. Daitai 8-gatsu 9-nichi nan desu yo (warai). Mukashi wa, sore ga iya deshita. Jibun no tanjōbi ga owatta koro dakara, itsumo iwatte moraenai, mitai na (warai). Nande 8-nichi ja nakattan darō? Maa, tanjōbi ni gakkō e ikitakunai desu kedo ne (warai). Dakara, boku ga natsu ga kirai nan de, natsuyasumi tte iu omoide mo nain desu. Umi ya pūru mo kirai desu kara. Oyogenai kara. Shukudai mo ittsumo yattenakatta shi. Demo kotoshi wa, natsuyasumi ga hoshii.
    en: >
      Actually tomorrow's my birthday—school day. It's usually August 9 (laughs). I hated that—birthday over, no celebration (laughs). Why not the 8th? I hate summer, so no summer holiday memories. I hate sea and pools—can't swim. Never did homework. But this year I want a summer break.
  - speaker: mana
    ja: >
      子供の頃は川に泳ぎに行ったりして、ずいぶんと爽やかな夏休みらしい夏休みを過ごしていたような気がするけど、音楽をやり始めてからは夏休みっていう感覚自体がなくなっちゃいましたね。だから、夏休みって聞くとつい、子供の頃は良かったなぁーって、しみじみ思っちゃいますね。あの、夏休みの独特な雰囲気をまた味わってみたいなぁーって。でも多分、あれは子供だったから味わえた感覚なんですよ。もう二度と味わえない、美しい想い出ですね。
    romaji: >
      Kodomo no koro wa kawa ni oyogi ni ittari shite, zuibun to sawayaka na natsuyasumi rashii natsuyasumi o sugoshite ita yō na ki ga suru kedo, ongaku o yarihajimete kara wa natsuyasumi tte iu kankaku jitai ga nakunacchaimashita ne. Dakara, natsuyasumi tte kiku to tsui, kodomo no koro wa yokatta nā tte, shimijimi omocchaimasu ne. Ano, natsuyasumi no dokutoku na fun'iki o mata ajiwattem mitai nā tte. Demo tabun, are wa kodomo datta kara ajiwaeta kankaku nan desu yo. Mō nido to ajiwaenai, utsukushii omoide desu ne.
    en: >
      As a child I swam in rivers—refreshing summer holidays. Since starting music that feeling vanished. Hearing "summer holiday" makes me nostalgic for that unique atmosphere—but only children could taste it. A beautiful memory never to return.
  - speaker: gackt
    ja: >
      夏は溶けそうになるんでキライです。だから、良い想い出もないです。
    romaji: >
      Natsu wa tokesō ni narun de kirai desu. Dakara, yoi omoide mo nai desu.
    en: >
      I hate summer—I feel like melting. So no good memories.
  - speaker: kami
    ja: >
      中学生の時は、夏休みが楽しみでした。なぜかというと、大好きなテニスが毎日できるから。暑い中、朝から晩までテニスに打ち込んでいました。そんな夏休みを高校2年まで、ずっと続けてたんですけどね。あの頃って、何であんなにスポーツに燃えたんだろう？ 勝つことへの執念だったのかな？ 結局、僕って好きなことにはトコトン打ち込むタイプみたいですね。あと、夏といえば恋（笑）。高校の時は、ひと夏の恋を、よくしてましたね…
    romaji: >
      Chūgakusei no toki wa, natsuyasumi ga tanoshimi deshita. Naze ka to iu to, daisuki na tenisu ga mainichi dekiru kara. Atsui naka, asa kara ban made tenisu ni uchikonde imashita. Sonna natsuyasumi o kōkō 2-nen made, zutto tsuzuketetan desu kedo ne. Ano koro tte, nande annani supōtsu ni moetan darō? Katsu koto e no shūnen datta no ka na? Kekkyoku, boku tte suki na koto ni wa tokoton uchikomu taipu mitai desu ne. Ato, natsu to ieba koi (warai). Kōkō no toki wa, hitonatsu no koi o, yoku shitemashita ne…
    en: >
      In junior high I loved summer break—tennis every day, morning to night in the heat, through second year of high school. Why was I so passionate about sports—winning? I pour myself into what I love. Summer means romance (laughs)—summer flings in high school…
  - speaker: kozi
    ja: >
      その昔、地元で学生やってた頃は夏休みになるとことしてましたねぇ。家から歩いて10分くらいのところが海だったから、なにかっていうと海に行ってたし、昆虫採集もしたし、あとは悪さもけっこうしてました。まぁ、悪さは夏休みに限ったことじゃなかったけどね（笑）。
    romaji: >
      Sono mukashi, jimoto de gakusei yatteta koro wa natsuyasumi ni naru to koto shitemashita nē. Ie kara aruite 10-fun kurai no tokoro ga umi datta kara, nanika tte iu to umi ni itteta shi, kōchū saishū mo shita shi, ato wa warusa mo kekkō shitemashita. Maa, warusa wa natsuyasumi ni kagitta koto ja nakatta kedo ne (warai).
    en: >
      Back home as a student, summer break was something else. The sea was ten minutes' walk—we went there, collected insects, got into mischief—not only in summer (laughs).
  # —— T: Taboo ——
  - speaker: yuki
    ja: >
      人の気持ちを傷つけるようなことは、いけないと思うな。自分がそうされるのは嫌ですからね。
    romaji: >
      Hito no kimochi o kizutsukeru yō na koto wa, ikenai to omou na. Jibun ga sō sareru no wa iya desu kara ne.
    en: >
      Hurting people's feelings is wrong—I wouldn't want that done to me.
  - speaker: mana
    ja: >
      プライベートはそっとしておいてほしいです。
    romaji: >
      Puraibēto wa sotto shite oite hoshii desu.
    en: >
      I'd like my private life left alone.
  - speaker: gackt
    ja: >
      ネガティヴさ、諦め。そこに尽きるかな。これは絶対にタブーだね。
    romaji: >
      Negatibu-sa, akirame. Soko ni tsukiru kana. Kore wa zettai ni tabū da ne.
    en: >
      Negativity and giving up—that's about it. Absolutely taboo.
  - speaker: kami
    ja: >
      インタビュー（笑）。だって、自分のこと、全国の人に教えなきゃいけないなんて、タブーでしょ？ ごもっともだと思いませんか？ ねぇ。本当はしゃべりたくないんですよー。でも、楽しいですよ。でも、知られたくないって、どっちやねん！（笑）
    romaji: >
      Intabyū (warai). Datte, jibun no koto, zenkoku no hito ni oshienakya ikenai nante, tabū desho? Gomottomo da to omoimasen ka? Nē. Hontō wa shaberitakunain desu yō. Demo, tanoshii desu yo. Demo, shiraretakunai tte, docchi ya nen! (warai)
    en: >
      Interviews (laughs). Telling the whole country about yourself is taboo, right? I don't really want to talk—but it's fun. But I don't want to be known—which is it?! (laughs)
  - speaker: kozi
    ja: >
      皆様にそんなものはない！というここにしておきます。サザエさん一家よ、永遠に！！
    romaji: >
      Minasama ni sonna mono wa nai! to iu koko ni shite okimasu. Sazae-san ikka yo, eien ni!!
    en: >
      I'll leave it at: none for you! Sazae-san family, forever!!
  # —— U: UFO ——
  - speaker: yuki
    ja: >
      見たことはないけど、信じます。
    romaji: >
      Mita koto wa nai kedo, shinjimasu.
    en: >
      I've never seen one, but I believe.
  - speaker: mana
    ja: >
      そういう番組とか好きだし、昔から興味あります。『ムー』って奇想天外な事を取り上げてる雑誌があるじゃないですか。あれ、小学校の時、読んでましたから。できれば見てみたいね。
    romaji: >
      Sō iu bangumi toka suki da shi, mukashi kara kyōmi arimasu. "Mū" tte kisō tengai na koto o toriageteru zasshi ga aru ja nai desu ka. Are, shōgakkō no toki, yondemashita kara. Dekireba mite mitai ne.
    en: >
      I like those shows—interested since long ago. That magazine Mū with wild stories—I read it in elementary school. I'd like to see one.
  - speaker: gackt
    ja: >
      見たことはないです。僕の場合、何に関しても、自分の目で見たことないものには確信ないことにしてるんで。今のところその存在も信じてはいません。
    romaji: >
      Mita koto wa nai desu. Boku no baai, nani ni kanshite mo, jibun no me de mita koto nai mono ni wa kakushin nai koto ni shiterun de. Ima no tokoro sono sonzai mo shinjite wa imasen.
    en: >
      I've never seen one. I don't have conviction about anything I haven't seen with my own eyes. I don't believe in their existence.
  - speaker: kami
    ja: >
      いたら面白いなとは思ってたんだけど、実際に自分が遭遇した時はすごい恐怖だった。なにしろ、四百四十年くらい生きてきて初めてのことだったしね。それから何回か見たんだけど、一番怖かったのは自分の部屋の窓から見えた時。以来、テレビでそういう番組をやっていても見られないです。
    romaji: >
      Itara omoshiroi na to wa omottetan dakedo, jissai ni jibun ga sōgū shita toki wa sugoku kyōfu datta. Nanishiro, yonhyaku yonjū-nen kurai ikite kite hajimete no koto datta shi ne. Sore kara nankai ka mita n dakedo, ichiban kowakatta no wa jibun no heya no mado kara mieta toki. Irai, terebi de sō iu bangumi o yatte ite mo mirarenai desu.
    en: >
      I thought it'd be interesting, but when I encountered one it was terrifying—first time in four hundred forty years. I've seen them several times; scariest was from my room window. Since then I can't watch those TV shows.
  - speaker: kozi
    ja: >
      見たことありますよ。俺の田舎に星がよく見える場所があったんですよ。で、弟と一緒に行って星を見てたら、動くんですよ、星が。『これは星じゃないな、あの動きはUFOだろうな。』って思って。バイクの光をソラにあびせたんですよ。そしたら、ソラが近づいてきたんですよ。友達と見た時も、同じようなことがあって、みんなで逃げ回りました（笑）。
    romaji: >
      Mita koto arimasu yo. Ore no inaka ni hoshi ga yoku mieru basho ga attan desu yo. De, otōto to issho ni itte hoshi o mitetara, ugokun desu yo, hoshi ga. "Kore wa hoshi ja nai na, ano ugoki wa UFO darō na." tte omotte. Baiku no hikari o sora ni abisetan desu yo. Soshitara, sora ga chikazuite kitan desu yo. Tomodachi to mita toki mo, onaji yō na koto ga atte, minna de nigemawarimashita (warai).
    en: >
      I've seen one. In my hometown there was a place with clear stars—watching with my brother, a star moved. "That's not a star—that movement is a UFO." I shone a bike light at the sky and it came closer. Same with friends—we all ran around (laughs).
  # —— V: Violence ——
  - speaker: yuki
    ja: >
      暴力はいけません（笑）。昔から、人に暴力を振ったことないな。僕、物に当たる方だから（笑）。
    romaji: >
      Bōryoku wa ikemasen (warai). Mukashi kara, hito ni bōryoku o futta koto nai na. Boku, mono ni ataru hō dakara (warai).
    en: >
      Violence is wrong (laughs). I've never hit a person—I take it out on things (laughs).
  - speaker: mana
    ja: >
      世の中には何が起こるか分からないんだから、油断は出来ないですよ。人生いろいろあるさ。
    romaji: >
      Yo no naka ni wa nani ga okoru ka wakaranai n dakara, yudan wa dekinai desu yo. Jinsei iroiro aru sa.
    en: >
      You never know what happens in the world—can't let your guard down. Life has many sides.
  - speaker: gackt
    ja: >
      力の暴力、言葉の暴力、暴力って難しいよね。僕は、基本的に人を傷付けることはすごく嫌いなものね。でも、自分の中に暴力的な部分は確実に存在していて、自分が傷付けられたときに自分のそういう部分が全くコントロール出来なくなったりする可能性があるから、それが自分でも怖い。それだけに、そうならないように僕は気を付けてるんです。
    romaji: >
      Chikara no bōryoku, kotoba no bōryoku, bōryoku tte muzukashii yo ne. Boku wa, kihon teki ni hito o kizutsukeru koto wa sugoku kirai na mono ne. Demo, jibun no naka ni bōryoku teki na bubun wa kakujitsu ni sonzai shite ite, jibun ga kizutsukerareta toki ni jibun no sō iu bubun ga mattaku kontorōru dekinai ni nattari suru kanōsei ga aru kara, sore ga jibun demo kowai. Sore dake ni, sō naranai yō ni boku wa ki o tsuketerun desu.
    en: >
      Physical violence, verbal violence—violence is complicated. I hate hurting people. But a violent part of me definitely exists, and when hurt I might lose control—that scares me. So I'm careful not to let it happen.
  - speaker: kami
    ja: >
      大嫌いです。暴力で何も解決しないって、悟ってますもん。
    romaji: >
      Daikirai desu. Bōryoku de nani mo kaiketsu shinai tte, sattemasu mon.
    en: >
      I hate it. I've realized violence solves nothing.
  - speaker: kozi
    ja: >
      好きですね。バイオレンスものの映画とか絵画とか。サブカルチャーの中のそういうのにも興味あります。とはいえ、これも自分自身がそういう世界に身を置いていないからこそ、言ってられることなのかもしれない。だけど、こういう気持ちってきっと誰にでも多少はあるわけじゃないですか。
    romaji: >
      Suki desu ne. Baiorensu mono no eiga toka kaiga toka. Sabukaruchā no naka no sō iu no ni mo kyōmi arimasu. To wa ie, kore mo jibun jishin ga sō iu sekai ni mi o oite inai kara koso, itterareru koto na no kamoshirenai. Dakedo, kō iu kimochi tte kitto dare ni demo tashō wa aru wake ja nai desu ka.
    en: >
      I like it—violence in films and art, subculture too. Maybe I can only say that because I'm not in that world. But everyone has some of this feeling, don't they?
  # —— W: Wall ——
  - speaker: yuki
    ja: >
      いろんな意味で壁はありますよ。マリス・ミゼルとして、ベーシストとして。大きなところでは人間として。でも今は、それを感じていないっていうか、越えられないはずがないっていう自信があるんですよ。
    romaji: >
      Ironna imi de kabe wa arimasu yo. Marisu Mizeru to shite, bēshisuto to shite. Ōkina tokoro de wa ningen to shite. Demo ima wa, sore o kanjite inai tte iu ka, koerarenai hazu ga nai tte iu jishin ga arun desu yo.
    en: >
      There are walls in many senses—as Malice Mizer, as bassist, as a human being. But now I don't feel them—I have confidence they can be overcome.
  - speaker: mana
    ja: >
      やっぱり、この壁を越えるっていうことは、自分を知るということであるということに尽きるでしょう。日々いろんなことを感じて、自分というものを知った時に人間は一番強くなれるんじゃないですか。実際、僕はある時そのことを悟ってから強くなりましたからね。もちろん、これからもまた自分が見つけてない自分を知る機会もあるんだろうし、今が全てっていうんじゃないけど、その時々の自分を知っておくというのは大事なことだと思いますよ。
    romaji: >
      Yappari, kono kabe o koeru tte iu koto wa, jibun o shiru to iu koto de aru to iu koto ni tsukiru deshō. Hibi ironna koto o kanjite, jibun to iu mono o shitta toki ni ningen wa ichiban tsuyoku narerun ja nai desu ka. Jissai, boku wa aru toki sono koto o sattete kara tsuyoku narimashita kara ne. Mochiron, kore kara mo mata jibun ga mitsukete nai jibun o shiru kikai mo arun darō shi, ima ga subete tte iun ja nai kedo, sono tokidoki no jibun o shitte oku to iu no wa daiji na koto da to omoimasu yo.
    en: >
      Overcoming walls comes down to knowing yourself. Feeling many things daily and knowing who you are makes you strongest. I became stronger after realizing that. There'll be more selves to discover—not everything is now—but knowing yourself at each moment matters.
  - speaker: gackt
    ja: >
      壁はいっぱいありますよ。それは何も歌だけじゃなくて、日々の生活の中にもいっぱいね。でも、それは越えるためにあるものだと思ってるから、それに対してのプロセスは全て苦ではないです。それに、生きるって限りは壁って必然的に出てくるものなんじゃないかな。僕はそう思います。
    romaji: >
      Kabe wa ippai arimasu yo. Sore wa nani mo uta dake ja nakute, hibi no seikatsu no naka ni mo ippai ne. Demo, sore wa koeru tame ni aru mono da to omotteru kara, sore ni tai shite no purosesu wa subete ku de wa nai desu. Sore ni, ikiru tte kagiri wa kabe tte hitetsu teki ni dete kuru mono nan ja nai kana. Boku wa sō omoimasu.
    en: >
      There are plenty of walls—not just in song but in daily life. But they exist to be crossed, so the process isn't all suffering. As long as you live, walls inevitably appear. I think so.
  - speaker: kami
    ja: >
      そんなものは、毎日ありますよ。その壁を越えられない日もあるし、人には言えないけど、壁はいっぱいあります。
    romaji: >
      Sonna mono wa, mainichi arimasu yo. Sono kabe o koerarenai hi mo aru shi, hito ni wa ienai kedo, kabe wa ippai arimasu.
    en: >
      They're there every day. Some days I can't cross them—can't tell people, but there are many walls.
  - speaker: kozi
    ja: >
      きっと、壁っていうのは死ぬまでいろんなかたちで次々と自分の前に立ちはだかり続けるもんなんじゃないかなあ。それを正面から登って越えようとすることが大事なんだろうけども、時には壊してみたり、迂回して違うところから上陸してみたり、あるいは休んだり、そういうこともあって良いんじゃないかなと思うし。…なんか、珍しく真面目な語りしちゃいました（苦笑）
    romaji: >
      Kitto, kabe tte iu no wa shinu made ironna katachi de tsugitsugi to jibun no mae ni tachihadakari tsuzukeru mon nan ja nai kanaā. Sore o shōmen kara nobotte koeyō to suru koto ga daiji nan darō kedomo, toki ni wa kowashite mitari, ukai shite chigau tokoro kara jōriku shite mitari, arui wa yasundari, sō iu koto mo atte yoi n ja nai kana to omou shi. …Nanka, mezurashiku majime na katari shichaimashita (nigawarai)
    en: >
      Walls probably keep appearing in different forms until you die. Climbing over head-on matters, but sometimes breaking them, going around, landing elsewhere, or resting is fine too. …I got unusually serious (wry laugh).
  # —— X: X-DAY ——
  - speaker: yuki
    ja: >
      とりあえず、あたふたしてるんじゃないですか（笑）。チョコレートでも食べてるんじゃないですか、遠くに行きながら。
    romaji: >
      Toriaezu, atafuta shiterun ja nai desu ka (warai). Chokorēto demo tabeterun ja nai desu ka, tōku ni ikinagara.
    en: >
      I'd probably be flustered (laughs). Eating chocolate somewhere far away.
  - speaker: mana
    ja: >
      でも、あんまり慌てない方なんです。地獄があっても『ああ、このまま終わるのか…』って思うくらいだろうから（笑）。
    romaji: >
      Demo, anmari awatenai kata nan desu. Jigoku ga atte mo "aa, kono mama owaru no ka…" tte omou kurai darō kara (warai).
    en: >
      I don't panic much. Even if hell came I'd just think "ah, so it ends like this…" (laughs).
  - speaker: gackt
    ja: >
      オロオロします。いや、それは冗談だけど、結局は『なるがままに』って感じじゃないですか？ でも、これで最期だと思った瞬間に、自分の中で何かが起こるような気もするしなあ…。とりあえず、その日を楽しみにしたいと思います。
    romaji: >
      Orooro shimasu. Iya, sore wa jōdan dakedo, ketskyoku wa "naru ga mama ni" tte kanji ja nai desu ka? Demo, kore de saigo da to omotta shunkan ni, jibun no naka de nanika ga okoru yō na ki mo suru shi nā…. Toriaezu, sono hi o tanoshimi ni shitai to omoimasu.
    en: >
      I'd panic. That's a joke—but ultimately "whatever will be." Though at the final moment something might stir inside… For now I want to look forward to that day.
  - speaker: kami
    ja: >
      地球の最期の日がやって来るとしたら、それはきっと僕が原因だと思う。その日がやって来るか・来ないかは、全く僕の手の中に委ねられているんです。
    romaji: >
      Chikyū no saigo no hi ga yatte kuru to shitara, sore wa kitto boku ga gen'in da to omou. Sono hi ga yatte kuru ka kuru ka wa, mattaku boku no te no naka ni yudanerarete irun desu.
    en: >
      If Earth's last day comes, I'm probably the cause. Whether that day comes is entirely in my hands.
  - speaker: kozi
    ja: >
      たぶん、その時にしたいと思ったことをするんじゃないですか。それが一番幸せだと思うから。
    romaji: >
      Tabun, sono toki ni shitai to omotta koto o surun ja nai desu ka. Sore ga ichiban shiawase da to omou kara.
    en: >
      I'd probably do whatever I felt like then—that's the happiest way.
  # —— Y: Yasuragi ——
  - speaker: yuki
    ja: >
      浴槽の中。温めのお湯で、半身浴をするんです。長い間、浸かっていられるし、汗もかくし。本を読みながら入ってますね。たまに寝ちゃうことがあるから、困るんですけど（笑）。しかもCDを聴きながらだから、周りの音も聞こえないし、電話が鳴っても聞こえないことがたまにあって（笑）。
    romaji: >
      Yokusō no naka. Atatame no oyu de, hanshin'yo o surun desu. Nagai aida, tsukatte irareru shi, ase mo kaku shi. Hon o yominagara haitte masu ne. Tama ni nechau koto ga aru kara, komarun desu kedo (warai). Shikamo CD o kikinagara dakara, mawari no oto mo kikoenai shi, denwa ga natte mo kikoenai koto ga tama ni atte (warai).
    en: >
      In the bathtub—half-body bath with warm water. I can soak a long time and sweat. I read books; sometimes I fall asleep (laughs). With CDs playing I don't hear the phone (laughs).
  - speaker: mana
    ja: >
      最近は少し、アロマテラピーを意識して、オイルを何種類か混ぜて入れてますね。入浴剤は選ぶのが面倒なので（笑）。
    romaji: >
      Saikin wa sukoshi, aromaterapī o ishiki shite, oiru o nanashurui ka mazete iretemasu ne. Nyūyoku-zai wa erabu no ga mendō nanode (warai).
    en: >
      Lately I'm into aromatherapy—mixing several oils. Bath salts are too much trouble to choose (laughs).
  - speaker: gackt
    ja: >
      一人で自分の部屋の火をじーっと見つめてると、自然と安らいで来ちゃうことは多いです。別にそうすることが好きとかではないんだけど、ついそうしてしまう。でも、それは何かが違うなって最近になって来ました。なんか、切ないんですよね。人恋しいというか。でもみんなでワーッと集まったりするのは苦手だし、それなら一人の方が良いような気もしてしまうという、けっこう複雑な心境なんです。矛盾を抱えながら生きてますね。
    romaji: >
      Hitori de jibun no heya no hi o jītto mitsumeteru to, shizen to yasuraide kichau koto wa ōi desu. Betsu ni sō suru koto ga suki toka de wa nain dakedo, tsui sō shite shimau. Demo, sore wa nanika ga chigau na tte saikin ni natte kimashita. Nanka, setsunain desu yo ne. Hito koishii to iu ka. Demo minna de wātto atsumattari suru no wa nigate da shi, sorenara hitori no hō ga yoi yō na ki mo shite shimau to iu, kekkō fukuzatsu na shinkyō nan desu. Mujun o kakaenagara ikitemasu ne.
    en: >
      Staring at the fire in my room alone often calms me—not that I like it, I just do. Lately it feels different—lonely, longing for people. But I'm bad at big gatherings; I'd rather be alone—a complicated contradiction I live with.
  - speaker: kami
    ja: >
      自然を感じている時、自分が無になって、木や岩や砂と同化している時。
    romaji: >
      Shizen o kanjite iru toki, jibun ga mu ni natte, ki ya iwa ya suna to dōka shite iru toki.
    en: >
      When I feel nature—when I become nothing and merge with trees, rocks, sand.
  - speaker: kozi
    ja: >
      今はリラックスできる環境はないですね。全くリラックスできない。あえて言うなら、寝てる時かな。何も考えてないから。
    romaji: >
      Ima wa rirakkusu dekiru kankyō wa nai desu ne. Mattaku rirakkusu dekinai. Aete ieba, neteru toki kana. Nani mo kangaetenai kara.
    en: >
      No relaxing environment now—I can't relax at all. If I must say, when sleeping—because I'm not thinking.
  # —— Z: Zest ——
  - speaker: yuki
    ja: >
      今、興味があるのは、音楽ですよ。いいことですね、こう答えられることは（笑）。自分のやってる音楽も興味あるし、自分がどこへ向かうのだろうってことにも興味があるし、音に対する興味も尽きないし。今、熱心に家で機材もいじってます（笑）。最近は、早く家に帰ってテレビが見たいっていうのじゃなくて、早く家に帰って機材がいじりたいっていう（笑）。あぁ、音楽は奥が深い…
    romaji: >
      Ima, kyōmi ga aru no wa, ongaku desu yo. Ii koto desu ne, kō kotaerareru koto wa (warai). Jibun no yatteru ongaku mo kyōmi aru shi, jibun ga doko e mukau no darō tte koto ni mo kyōmi ga aru shi, oto ni tai suru kyōmi mo tsukinai shi. Ima, nesshin ni ie de kizai mo ijittemasu (warai). Saikin wa, hayaku ie ni kaette terebi ga mitai tte iu no ja nakute, hayaku ie ni kaette kizai ga ijiritai tte iu (warai). Ā, ongaku wa oku ga fukai…
    en: >
      Music interests me now—nice to be able to say that (laughs). My own music, where I'm headed, sound itself—I never tire of it. I'm tinkering with gear at home (laughs). Lately I rush home to fiddle with equipment, not watch TV (laughs). Music runs deep…
  - speaker: mana
    ja: >
      いっぱいあります。音楽とかアートに関することはもちろん、それ以外でも世の中のあらゆるものから何かを得ることが多いんで。でも、そのわりには今、時間が足りないんですよ。自分が興味を持ってることに対して使える時間が、もっとほしいですね。
    romaji: >
      Ippai arimasu. Ongaku toka āto ni kansuru koto wa mochiron, sore igai demo yo no naka no arayuru mono kara nanika o eru koto ga ōi n de. Demo, sono wari ni wa ima, jikan ga tarinai n desu yo. Jibun ga kyōmi o motteru koto ni tai shite tsukaeru jikan ga, motto hoshii desu ne.
    en: >
      Plenty—music, art, and everything in the world teaches me something. But I lack time for all my interests. I want more time for what I care about.
  - speaker: gackt
    ja: >
      自分で興味があるかなと思うぐらい興味の対象となるものは多いね。それも、広く深くって感じで。でもね、まだ僕はあそこに五百年くらいいるつもりだから、その中でいろんなことをこなして行くつもり。ただ、最近ちょっと老化が激しくて困ってるんですよ。でも、もうすぐ脱皮するから、そしたらまた調子良くなる予定です（笑）。（ちなみにこの日のインタヴュー時、Gacktはインフルエンザで39度以上の熱があったとか。一部意味不明な発言は、その為であると思われるますので、そこのところご了承願います）
    romaji: >
      Jibun de kyōmi ga aru ka na to omou gurai kyōmi no taishō to naru mono wa ōi ne. Sore mo, hiroku fukaku tte kanji de. Demo ne, mada boku wa asoko ni gohyaku-nen kurai iru tsumori dakara, sono naka de ironna koto o konashite iku tsumori. Tada, saikin chotto rōka ga hageshikute komatterun desu yo. Demo, mō sugu dadepi suru kara, soshitara mata chōshi yoku naru yotei desu (warai). (Chinami ni kono hi no intabyū-ji, Gackt wa infuruenza de 39-do ijō no netsu ga atta toka. Ichibu imi fumei na hatsugen wa, sono tame de aru to omowareru masu node, soko no tokoro go ryōshō negai masu)
    en: >
      So many things interest me—broadly and deeply. I plan to be around five hundred more years and do many things. Lately aging bothers me—but I'll molt soon and recover (laughs). (Note: Gackt had 39°C+ flu during this interview; some unclear remarks may be due to that.)
  - speaker: kami
    ja: >
      楽器が仕事になってしまった今、他に打ち込めることはないかなって探してるところ。そしたら自分が変われるんじゃないかって。昔は何がやりたいことがあっても、バンドがあるからいいやって思えてたけど、今は、仕事になっちゃってるからね…。でも、僕の場合、人に興味を持つ場合がほとんどなんですよ。だから、興味のある人と、たくさん話をしてみたいな、あんなこと聞いてみたいなっていう好奇心は旺盛です。
    romaji: >
      Gakki ga shigoto ni natte shimatta ima, hoka ni uchikomeru koto wa nai ka nā tte sagashiteru tokoro. Soshitara jibun ga kawarerun ja nai ka tte. Mukashi wa nani ga yaritai koto ga atte mo, bando ga aru kara ii ya tte omoeteta kedo, ima wa, shigoto ni nacchatteru kara ne…. Demo, boku no baai, hito ni kyōmi o motsu baai ga hotondo nan desu yo. Dakara, kyōmi no aru hito to, takusan hanashi o shite mitai na, anna koto kiite mitai na tte iu kōkishin wa ōjō desu.
    en: >
      Now that instruments are my job, I'm looking for other things to pour myself into—maybe that'll change me. Before, band was enough; now it's work…. Mostly I'm interested in people—curious to talk with interesting people, ask them things.
  - speaker: kozi
    ja: >
      日常の不条理の連鎖。とりあえず俺の場合は表面的なことよりも、なんでも裏側の方が気になります。性格でしょうね。
    romaji: >
      Nichijō no fujōri no rensa. Toriaezu ore no baai wa hyōmen teki na koto yori mo, nandemo uragawa no hō ga ki ni narimasu. Seikaku deshō ne.
    en: >
      The chain of absurdities in daily life. For me, the underside of everything interests me more than the surface. That's my personality.
