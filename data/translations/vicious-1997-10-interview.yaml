intro:
  ja: >
    9月3日に発売されるマリスミゼルのビデオ「ヴェル・エール 〜空白の瞬間の中で〜 ドゥ リマージュ」は、
    シングル「ヴェル・エール 〜」の世界をヴィジュアル化した、無声映画のような作品。
    マリスミゼルを表現するには映像は欠かせないという彼らにとって、このビデオの存在とは…。
    ちょっぴり笑える撮影秘話も交えながら、メンバー5人がそれぞれの想いを語ってくれました。
  romaji: >
    9-gatsu 3-nichi ni hatsubai sareru Marisu Mizeru no bideo "Veru Ēru ~Kūhaku no Shunkan no Naka de~
    de l'image" wa, shinguru "Veru Ēru ~" no sekai o vijuaru-ka shita, musei eiga no yō na sakuhin.
    Marisu Mizeru o hyōgen suru ni wa eizō wa kakasenai to iu karera ni totte, kono bideo no
    sonzai to wa… Choppiri waraeru satsuei hiwa mo majienagara, menbā 5-nin ga sorezore no omoi o
    katatte kuremashita.
  en: >
    Malice Mizer's video Bel Air ~In the Moment of Emptiness~ de l'image, released on September 3,
    visualizes the world of the single "Bel Air ~" as a work like a silent film. For a band who
    believe imagery is indispensable to expressing Malice Mizer, what does this video mean…?
    With a few amusing behind-the-scenes stories mixed in, all five members share their thoughts.

