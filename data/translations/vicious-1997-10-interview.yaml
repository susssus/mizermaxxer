dialogue:
  # —— Page 120 ——
  - speaker: interviewer
    ja: >
      ——9月3日に「ヴェル・エール 〜空白の瞬間の中で〜」をモチーフにしたビデオが発売されるわけですが、
      まず、ビデオ・クリップではなく、約30分の長編ビデオにした理由から、教えてほしいんですが。
    romaji: >
      ——9-gatsu 3-nichi ni "Veru Ēru ~Kūhaku no Shunkan no Naka de~" o motīfu ni shita bideo ga
      hatsubai sareru wake desu ga, mazu, bideo kurippu de wa naku, yaku 30-pun no chōhen bideo ni
      shita riyū kara, oshiete hoshii n desu ga.
    en: >
      ——A video based on "Bel Air ~In the Moment of Emptiness~" is being released on September 3.
      First, could you tell us why you made it a roughly 30-minute long-form video rather than a music clip?

  - speaker: gackt
    ja: >
      第1弾目の作品ということで、マリスミゼルというものをまず、ちゃんと知ってもらいたかったっていうのが
      理由のひとつです。マリスには3次元的な世界、映像は欠かせないものなんですよ。逆にじゃあ、なぜ、
      今まで映像作品を作らなかったかと言うと、中途半端なものを作って自分たちの世界を壊したくなかった
      というのが大きい。で、今回、「ヴェル・エール 〜」という曲を伝えるにはビデオ・クリップでは
      収まりきらないだろうというのがあって、30分という長さになったんですけど、それでもストーリーと
      コンテを自分たちで考えていって、監督に見せたら、"これを表現するには最低でも200カット必要だし、
      1時間はかかる"って言われて、がんばって縮めた結果が30分だったんですよ。
    romaji: >
      Dai 1-danme no sakuhin to iu koto de, Marisu Mizeru to iu mono o mazu, chanto shitte moraitakatta
      tte iu no ga riyū no hitotsu desu. Marisu ni wa san-jigen teki na sekai, eizō wa kakasenai mono
      nan desu yo. Gyaku ni jaa, naze, ima made eizō sakuhin o tsukuranakatta ka to iu to, chūto hanpa
      na mono o tsukutte jibun-tachi no sekai o kowashitakunakatta to iu no ga ōkii. De, konkai,
      "Veru Ēru ~" to iu kyoku o tsutaeru ni wa bideo kurippu de wa osamari kirana darō to iu no ga
      atte, 30-pun to iu nagasa ni natta n desu kedo, soredemo sutōrī to konte o jibun-tachi de
      kangaete itte, kantoku ni miseru to, "kore o hyōgen suru ni wa saitei demo 200 katto hitsuyō
      da shi, 1-jikan wa kakaru" tte iwarete, ganbatte chijimete kekka ga 30-pun datta n desu yo.
    en: >
      As our first release, one reason was that we wanted people to properly understand what Malice Mizer is.
      For Malice, a three-dimensional world, imagery is indispensable. On the other hand, if you ask why we
      hadn't made visual works until now, a big reason is we didn't want to damage our world with something
      half-baked. This time, we felt a music clip couldn't contain the song "Bel Air ~," so it became 30
      minutes—but even then, we worked out the story and concept ourselves, and when we showed the director,
      he said "you'll need at least 200 cuts and an hour to express this." We worked hard to compress it,
      and the result was 30 minutes.

  - speaker: interviewer
    ja: ——無声映画のような作りになった理由は？
    romaji: ——Musei eiga no yō na tsukuri ni natta riyū wa?
    en: ——Why did it end up structured like a silent film?

  - speaker: mana
    ja: >
      それは観た人にイメージ的に、自由にその人なりにとらえてほしかったんです。映画的ではあるんだけど、
      観た人に意味を押しつけるようなことはしたくなかったから。
    romaji: >
      Sore wa mita hito ni imēji teki ni, jiyū ni sono hito nari ni toraete hoshikatta n desu. Eiga teki
      de wa aru n da kedo, mita hito ni imi o oshitsukeru yō na koto wa shitakunakatta kara.
    en: >
      We wanted viewers to interpret it freely in their own way, imaginatively. It's cinematic, but we
      didn't want to impose meaning on the audience.

  - speaker: interviewer
    ja: ——映画とビデオ・クリップの中間みたいな作品ということですかね。
    romaji: ——Eiga to bideo kurippu no chūkan mitai na sakuhin to iu koto desu ka ne.
    en: ——So it's something between a film and a music clip.

  - speaker: gackt
    ja: >
      それをうまく表現する言葉が見つからないんですよね。ビデオ・クリップでも映画でも語弊がある。
      「ヴェル・エール 〜」からイメージされるたくさんのストーリーの中のひとつをストーリーを表現した
      作品ではあるけれど、結論を押しつけてはいないし。
    romaji: >
      Sore o umaku hyōgen suru kotoba ga mitsukaranai n desu yo ne. Bideo kurippu demo eiga demo
      gohei ga aru. "Veru Ēru ~" kara imēji sareru takusan no sutōrī no naka no hitotsu o sutōrī o
      hyōgen shita sakuhin de wa aru keredo, ketsuron o oshitsukete wa inai shi.
    en: >
      I can't find the right words for it. Calling it a music clip or a film would both be misleading.
      It expresses one story among the many stories suggested by "Bel Air ~," but we're not forcing a
      conclusion.

  - speaker: interviewer
    ja: >
      ——みなさん、演技が上手いので驚いたんですが、じゃあ、このへんで撮影中の苦労話、エピソードを
      教えてもらえますか？まず、köziさんはパントマイムのシーンが出てきますが、かなり練習したんですか？
    romaji: >
      ——Mina-san, engi ga umai node odoroitan desu ga, jaa, kono hen de satsuei-chū no kurō-banashi,
      episōdo o oshiete moraemasu ka? Mazu, Közi-san wa pantomaimu no shīn ga dete kimasu ga, kanari
      renshū shitan desu ka?
    en: >
      ——Everyone's acting surprised me—could you share some hardships and episodes from filming?
      First, Közi, you have a pantomime scene—did you practice a lot?

  - speaker: kozi
    ja: >
      いや、ほとんど習ってないんですよ。撮影当日に少しだけアドバイスされて、自分なりに考えて、
      鏡の前で2時間ぐらい練習したのかな。で、本番はカット数もそんなに撮らないうちに、"はい、いいよ！"
      って。俺自身はもっとやれば、いいものができると思ってたから、"本当にいいの？"って。
    romaji: >
      Iya, hotondo narattemain desu yo. Satsuei tōjitsu ni sukoshi dake adobaisu sarete, jibun nari ni
      kangaete, kagami no mae de 2-jikan gurai renshū shita no ka na. De, honban wa katto-sū mo sonna ni
      toranai uchi ni, "hai, ii yo!" tte. Ore jishin wa motto yareba, ii mono ga dekiru to omotteta kara,
      "hontō ni ii no?" tte.
    en: >
      No, I hardly learned it at all. On the day of filming I got a little advice, thought it through my
      way, and practiced in front of a mirror for about two hours, I think. Then during the actual shoot,
      before we'd even filmed many takes, they said "okay, that's good!" I thought I could do better with
      more practice, so I was like "really, is that okay?"

  - speaker: yuki
    ja: やるなぁって思いましたよ。
    romaji: Yaru nā tte omoimashita yo.
    en: I thought, wow, they can really do it.

  - speaker: gackt
    ja: >
      さすがに気性が大道芸人だけのことはあるなって（笑）。たぶん、彼はもともとピエロ的な気質を
      持ってるんだと思いますよ。だから、1発でOKになったんだと思う。1日や2日でできるシーンじゃないから。
    romaji: >
      Sasuga ni kishō ga daidō geinin dake no koto wa aru na tte (warai). Tabun, kare wa moto moto
      piero teki na kishitsu o motteru n da to omoimasu yo. Dakara, ippatsu de OK ni natta n da to
      omou. 1-nichi ya 2-nichi de dekiru shīn ja nai kara.
    en: >
      That's the temperament of a street performer for you (laughs). I think they naturally have a clown-like
      quality. That's why it was OK in one take. It's not a scene you can master in a day or two.

  - speaker: kozi
    ja: >
      撮影に入る前に資料をもらって、勉強しようと思ったんですけど、諸事情があって不可能だったんですよ。
      しかも指導してくれる先生も当日にならないと来ないって話になったんで、何もできない状態で…。
    romaji: >
      Satsuei ni hairu mae ni shiryō o moratte, benkyō shiyō to omottan desu kedo, shojijō ga atte
      fukanō datta n desu yo. Shikamo shidō shite kureru sensei mo tōjitsu ni naranai to konai tte
      hanashi ni natta n de, nani mo dekinai jōtai de…
    en: >
      Before filming I received materials and planned to study, but various circumstances made that
      impossible. And the instructor wouldn't come until the day itself, so I was in a state where I
      couldn't do anything…

  - speaker: interviewer
    ja: ——内心、どうしよう？って？
    romaji: ——Naishin, dō shiyō? tte?
    en: ——Inside, you were thinking "what do I do?"

  - speaker: kozi
    ja: 思いましたよ。テンパってた（笑）。
    romaji: Omoimashita yo. Tenpatte ta (warai).
    en: I was. I was panicking (laughs).

  - speaker: interviewer
    ja: ——kamiさんは主人公の友人役ですが、表情で演技するシーンが多いですね。
    romaji: ——Kami-san wa shujinkō no yūjin-yaku desu ga, hyōjō de engi suru shīn ga ōi desu ne.
    en: ——Kami, you play the protagonist's friend, and there are many scenes where you act through expression.

  - speaker: kami
    ja: >
      ええ。手首を切るシーンが出てくるんですけど、かなりまじめにやったんですけど、俺の顔を見てGacktが
      笑うんですよ。それで4回くらいNGが出て（笑）。
    romaji: >
      Ee. Tekubi o kiru shīn ga dete kurun desu kedo, kanari majime ni yattan desu kedo, ore no kao o
      mite Gackt ga warau n desu yo. Sore de 4-kai kurai NG ga dete (warai).
    en: >
      Yes. There's a scene where I cut my wrist—I played it quite seriously, but Gackt looked at my face
      and laughed. That caused about four NG takes (laughs).

  - speaker: gackt
    ja: （笑）いや、これはkamiと接している人間じゃないとわからないと思うんだけど、こんな表情するんだ？って。
    romaji: (warai) Iya, kore wa Kami to sesshite iru ningen ja nai to wakaranai to omou n da kedo, konna hyōjō suru n da? tte.
    en: (laughs) Well, I don't think you'd understand unless you're someone who interacts with Kami regularly—"they make that face?"

  - speaker: kami
    ja: NGが出るたびに傷口がはがれちゃうんですよ。"もう、ムカつくー"と思いました、はい（笑）。
    romaji: NG ga deru tabi ni kizuguchi ga hagaerechaun desu yo. "Mō, mukatsuku—" to omoimashita, hai (warai).
    en: Every time we got an NG, the wound prosthetic came off. I thought "ugh, this is annoying," yes (laughs).

  - speaker: interviewer
    ja: ——ふたりでフェンシングする場面もあるね。
    romaji: ——Futari de fenshingu suru bamen mo aru ne.
    en: ——There's also a scene where the two of you fence.

  # —— Page 121 ——
  - speaker: kami
    ja: >
      ああ。俺、弱いキャラなんですよ。すぐ負けちゃう。何度も倒れるシーンがあって、服がめちゃくちゃ
      ボロボロになっちゃった（笑）。
    romaji: >
      Ā. Ore, yowai kyara nan desu yo. Sugu makechau. Nando mo taoreru shīn ga atte, fuku ga
      mechakucha boroboro ni nacchatta (warai).
    en: >
      Yeah. I play a weak character—I lose right away. There were scenes where I kept falling over and
      over, and my clothes got completely torn up (laughs).

  - speaker: gackt
    ja: >
      もともとはもっと長い打ち合いのシーンだったんですけど、時間の都合で短くなって、急に負けたみたいに
      見えちゃったんですよね。
    romaji: >
      Moto moto wa motto nagai uchiai no shīn datta n desu kedo, jikan no tsugō de mijiku natte, kyuu ni
      maketa mitai ni miechatta n desu yo ne.
    en: >
      Originally the fencing scene was much longer, but it was shortened for time, so it ended up looking
      like I suddenly lost.

  - speaker: kami
    ja: >
      撮影現場にナイキっていう犬がいて、カチンコの音が鳴ると必ず寄ってくるんですよ。manaの衣装まで
      噛んじゃって（笑）。
    romaji: >
      Satsuei genba ni Naiki tte iu inu ga ite, kachinko no oto ga naru to kanarazu yotte kurun desu yo.
      Mana no ishou made kande jatte (warai).
    en: >
      There was a dog named Nike on set—whenever the clapperboard snapped, he'd always come over. He even
      bit Mana's costume (laughs).

  - speaker: interviewer
    ja: ——manaさんは売春婦の役でしたね。
    romaji: ——Mana-san wa baishunfu no yaku deshita ne.
    en: ——Mana, you played the role of a prostitute.

  - speaker: mana
    ja: >
      衣装に合う靴が用意されていなくて、スタッフの人から借りたんですけど、サイズが合わなくて痛かった
      んですよ。女性的な繊細さとか、自然な動きを出すのが難しかった。Gacktの手や肩を撫でるシーンとか。
    romaji: >
      Ishou ni au kutsu ga yōi sarete inakute, sutaffu no hito kara karitan desu kedo, saizu ga
      awanakute itakatta n desu yo. Josei teki na sensaisa toka, shizen na ugoki o dasu no ga
      muzukashikatta. Gackt no te ya kata o naderu shīn toka.
    en: >
      The shoes that matched the costume weren't prepared, so I borrowed a staff member's—but they were
      the wrong size and hurt. Expressing feminine delicacy and natural movement was difficult. Scenes
      like stroking Gackt's hand and shoulder.

  - speaker: gackt
    ja: >
      カメラの前での演技は難しいんですよ。自然だと思っても、映像だと不自然に見えることもある。
      manaさんにとって初めての撮影だったから、僕とköziがモニターを見ながら参考にしようとしたんですけど。
    romaji: >
      Kamera no mae de no engi wa muzukashii n desu yo. Shizen da to omotte mo, eizō da to fushizen ni
      mieru koto mo aru. Mana-san ni totte hajimete no satsuei datta kara, boku to Közi ga monitā o
      minagara sankō ni shiyō to shita n desu kedo.
    en: >
      Acting in front of the camera is hard. Even when you think you're being natural, it can look awkward
      on film. Since it was Mana's first time filming, Közi and I tried to watch the monitor for reference.

  - speaker: mana
    ja: 観客も多かったし、難しかったですね。
    romaji: Kyakukan mo ōkatta shi, muzukashikatta desu ne.
    en: There were a lot of onlookers too, so it was difficult.

  - speaker: interviewer
    ja: ——yu~kiさんはヒロインを見守る兄役でしたね。
    romaji: ——Yu~ki-san wa hiroin o mimamoru ani-yaku deshita ne.
    en: ——Yu~ki, you played the brother watching over the heroine.

  - speaker: yuki
    ja: >
      あまりキツく見えないように、優しい兄を意識しました。役のために5キロ太りました。たくさん食べて（笑）。
    romaji: >
      Amari kitsuku mienai yō ni, yasashii ani o ishiki shimashita. Yaku no tame ni 5-kiro futorimashita.
      Takusan tabete (warai).
    en: >
      I tried to play a kind brother who doesn't look too sharp. I gained 5 kg for the role—I ate a lot (laughs).

  - speaker: kozi
    ja: ビデオだと顔が丸く見えるよね（笑）。
    romaji: Bideo da to kao ga maruku mieru yo ne (warai).
    en: Your face looks round in the video (laughs).

  - speaker: yuki
    ja: 撮影を通してヒロインに対する気持ちが変わっていったんですよ。
    romaji: Satsuei o tōshite hiroin ni taisuru kimochi ga kawatte ittan desu yo.
    en: Through filming, my feelings toward the heroine changed.

  - speaker: gackt
    ja: 女性として見るようになっちゃったんじゃない（笑）。
    romaji: Josei to shite miru yō ni nacchattan ja nai (warai).
    en: You started seeing her as a woman, didn't you (laughs).

  - speaker: yuki
    ja: >
      恋も感情も育っていく旅みたいなものだったんですけど、最終日に彼氏が登場しちゃって。面白い展開に
      なった（笑）。
    romaji: >
      Koi mo kanjō mo sodatte iku tabi mitai na mono datta n desu kedo, saishū-bi ni kareshi ga tōjō
      shichatte. Omoshiroi tenkai ni natta (warai).
    en: >
      It was like a journey where love and emotion kept growing, but on the last day her boyfriend showed
      up. It turned into an interesting situation (laughs).

  - speaker: kozi
    ja: 彼氏、すごかったよね（笑）。
    romaji: Kareshi, sugokatta yo ne (warai).
    en: Her boyfriend was something else (laughs).

  - speaker: gackt
    ja: 彼氏が来た時は緊張したよね。
    romaji: Kareshi ga kita toki wa kinchō shita yo ne.
    en: It was tense when the boyfriend arrived.

  - speaker: interviewer
    ja: ——Gacktさんは主人公役でしたね？
    romaji: ——Gackt-san wa shujinkō-yaku deshita ne?
    en: ——Gackt, you played the protagonist?

  - speaker: gackt
    ja: >
      一番大変だったのは笑うシーンですね。デートの前に鏡の前で自然に笑うのが難しくて。
    romaji: >
      Ichiban taihen datta no wa warau shīn desu ne. Dēto no mae ni kagami no mae de shizen ni warau
      no ga muzukashikute.
    en: >
      The hardest part was the smiling scene—smiling naturally in front of a mirror before a date.

  - speaker: kozi
    ja: 不敵な笑いになっちゃった（笑）。
    romaji: Futeki na warai ni nacchatta (warai).
    en: It turned into a fearless grin (laughs).

  - speaker: gackt
    ja: >
      監督から「笑うと殺人鬼みたい」と注意されたんですよ（笑）。苦しい演技の方が共感しやすいんです。
      自然な笑顔より。
    romaji: >
      Kantoku kara "warau to satsujinki mitai" to chūi sareta n desu yo (warai). Kurushii engi no hō ga
      kyōkan shiyasui n desu. Shizen na egao yori.
    en: >
      The director warned me I looked like a killer when I smiled (laughs). Painful acting is easier to
      relate to than a natural smile.

  - speaker: interviewer
    ja: ——マリスミゼルは今後もこのスタイルでビデオを作っていくんですか？
    romaji: ——Marisu Mizeru wa kongo mo kono sutairu de bideo o tsukutte iku n desu ka?
    en: ——Will Malice Mizer keep making videos in this style going forward?

  - speaker: gackt
    ja: >
      必ずしもそうではないですね。今回はマリスミゼルを知ってもらうための形式を選んだ。シングル、ツアー、
      ビデオは全てリンクしていて、シングルを聴いた人にビデオも見てほしい。
    romaji: >
      Kanarazushimo sō de wa nai desu ne. Konkai wa Marisu Mizeru o shitte morau tame no keishiki o
      eranda. Shinguru, tsuā, bideo wa subete linku shite ite, shinguru o kiita hito ni bideo mo
      mite hoshii.
    en: >
      Not necessarily. This time we chose a format to introduce people to Malice Mizer. The single, tour,
      and video are all linked—we want people who hear the single to watch the video too.

profile:
  ja: >
    Camui Gackt（Vo.）7月4日生、A型。mana（G.）3月19日生、O型。közi（G.）5月29日生、A型。
    yu~ki（B.）8月8日生、A型。kami（Dr.）2月1日生、A型。'92年8月結成。
    '94/12「memoire DX」、'95/12「麗しき仮面の招待状」、'96/6「Voyage」、
    '97/6/30「sans retour Voyage "derniere" ~encoure une fois~」、
    '97/7/30 メジャー・デビュー・シングル「ヴェル・エール 〜空白の瞬間の中で〜」。
    9/3 ビデオ「ヴェル・エール 〜空白の瞬間の中で〜 de l'image」発売。
