intro:
  ja: >
    7月19日、マリス・ミゼルが待望のメジャーデビューを果たす。デビューシングル
    『ヴェル・エール ～空白の瞬間の中で～』のリリースを目前に、独特のメイクと
    演劇的なステージで築き上げてきた「マリス・ミゼルの世界」について、
    ボーカルのGacktとベースのYU~KIに語ってもらった。4月1日の渋谷公会堂での
    インディーズ・ラスト・ライヴ以降、いよいよ新たな局面を迎える5人の現在地を探る。
  romaji: >
    7-gatsu 19-nichi, Marisu Mizeru ga taibō no mejā debiyū o hatasu. Debyū shinguru
    "Veru Ēru ~Kūhaku no Shunkan no Naka de~" no ririisu o mokuzen ni, dokutoku no
    meiku to engeki teki na sutēji de kizukiagete kita "Marisu Mizeru no sekai" ni
    tsuite, bōkaru no Gackt to bēsu no Yu~ki ni katatte moratta. 4-gatsu 1-nichi no
    Shibuya Kōkaidō de no indiizu rasuto raivu ikō, iyoiyo arata na kyōmen o mukaeru
    5-nin no genzai-chi o saguru.
  en: >
    On July 19, Malice Mizer finally make their long-awaited major-label debut. With the
    release of their debut single Bel Air ~In the Moment of Emptiness~ imminent, vocal
    Gackt and bassist Yu~ki speak about the "Malice Mizer world" they have built through
    distinctive makeup and theatrical staging. This interview explores where the five
    members stand as they enter a new chapter after their April 1 indies last live at
    Shibuya Public Hall.

