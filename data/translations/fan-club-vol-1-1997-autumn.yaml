  - page: 2
    section: Schedule Corner
    ja: >
      スケジュール コーナー。1/10 日本青年館。
      その他スケジュールが決まり次第 DMにてお知らせ致します。
      DM発送に合わせて、マシェリ直通留守番電話に近況をいれますのでそちらもチェックしてください。
      〈急に決まったものなどは、お知らせが間に合わない場合もありますのでご了承ください。〉
      DMなどが届かない場合などは、連絡をしてください。
      こちらへ送金後、事務処理に一カ月位お時間をいただいております。
      住所変更の手続き：住所や電話番号が変わった場合は、ハガキ又はFAXでお知らせください。
      必要事項は、①会員番号 ②旧住所 ③お名前 ④新住所（郵便番号・住所フリガナ付・電話番号）。
      宛て名シールに、誤字脱字があった場合も同様におねがいします。
      〒142 東京都品川区荏原郵便局 私書箱11号 ミディネット内 マシェリ住所変更係 ☎＆FAX 03(3786)9668
    romaji: >
      Sukejūru Kōnā. 1/10 Nippon Seinenkan.
      Sono ta sukejūru ga kimari shidai DM nite oshirase itashimasu.
      DM hassō ni awasete, ma chérie chokutsū rusuban denwa ni kinkyō o iremasu no de
      sochira mo chekku shite kudasai.
      Kyū ni kimatta mono nado wa, oshirase ga maniawanai baai mo arimasu no de go-ryōshō kudasai.
      DM nado ga todokanai baai nado wa, renraku o shite kudasai.
      Kochira e sōkin-go, jimu shori ni ikkagetsu-goro o-jikan o itadaite orimasu.
      Jūsho henkō no tetsuzuki: jūsho ya denwa bangō ga kawatta baai wa, hagaki mata wa FAX de oshirase kudasai.
      Hitsuyō jikō: (1) kaiin bangō (2) kyū jūsho (3) o-namae (4) shin jūsho.
      Atena shīru ni goji datsu-ji ga atta baai mo dōyō ni onegai shimasu.
    en: >
      Schedule Corner. Jan 10 — Nippon Seinenkan.
      Other dates will be announced by DM as they are confirmed.
      Updates will also be posted on the ma chérie direct voicemail line alongside mailings—please check both.
      Please understand that last-minute announcements may not reach you in time.
      Contact us if your DM or other mail fails to arrive.
      Allow about one month for administrative processing after remittance.
      Address changes: notify us by postcard or fax with membership number, old address, name, and new address
      (postal code, furigana, phone). Report typos on mailing labels the same way.
      P.O. Box 11, Ebara Post Office, Shinagawa-ku, Tokyo 142; c/o Midi:Nette ma chérie Address Change Desk.
      Tel & fax 03-3786-9668.

  - page: 3
    section: Song Commentary — Camui Gackt (Voyage)
    ja: >
      曲解説 Camui Gackt（7.4 / A / 178cm 60kg 26.0cm）。
      I. 闇の彼方へ — manaに聞いてくれ。
      II. transylvania — LIVEを見に来た君達がどう感じるかを最初に考えて作った。映画のワンシーンのような雰囲気。
      CDとLIVEの違い：LIVEは映像を見ながら聴くので語りは日本語、CDは映像が浮かぶよう英語。
      III. 追憶の破片 — 精神的に抑圧された状態を語った詩。幻覚、独りになりたい気持ちなど。
      IV. プルミエ ラムール — 初恋の意味を調べると核が分かる。記憶の片隅の思い出を浮かべて聴いて。
      V. 偽りのミュゼット — 語り手と主人公の二つの視点。旋律は詩と同時に出来た。
      VI. N・p・s N・g・s — かなりH。意味がわかる人、手紙下さい（笑）。
      VII. クレール 月の調べ — 「目が見えない」をテーマに。まだ、君の姿が見えない。
      VIII. マドリガル — 明るい旋律だがネガティブではない。LIVEで一緒に歌おう。
      IX. 死の舞踏 — 昔からあった曲をメンバーそれぞれの想いで作り上げた。歴史が入っている。
      X. 前兆 — 関わった人達にありがとう。ピアノの音作りにこだわった。この曲を次につながる前兆として聴いて。
    romaji: >
      Kyokusetsu Camui Gackt. I–X: Yami no Kanata e through Zenchō — track-by-track commentary
      on Voyage ~sans retour~ covering live vs. CD narration choices, personal lyrics, and recording intent.
    en: >
      Song Commentary: Camui Gackt (DOB 7/4, blood type A).
      Track-by-track notes on Voyage ~sans retour~:
      I. Yami no Kanata e — Ask Mana.
      II. transylvania — Written first with the live audience's experience in mind; like a film scene.
      Live narration is Japanese (visual); CD narration is English (evokes imagery). The English section recreates a film.
      III. Tsuioku no Hahen — Lyrics about mental oppression, loneliness, hallucinations, wanting solitude.
      IV. Premier Amour — Look up "first love" in French; recall your own memories while listening.
      V. Itsuwari no Musette — Sung from narrator and protagonist viewpoints; melody born with the poem.
      VI. N·p·s N·g·s — Quite H; write if you understand (laughs).
      VII. Claire ~Tsuki no Shirabe~ — Themed on "cannot see"; "I still cannot see your figure."
      VIII. Madrigal — Bright melody but not negative; let's sing together at lives.
      IX. Shi no Butou — An old song rebuilt with each member's feelings; history is embedded.
      X. Zenchou — Thanks to all involved; painstaking piano sound design. Hear it as an omen of what comes next.

  - page: 4
    section: Song Commentary — mana (Voyage)
    ja: >
      曲解説 mana（3.19 / O / 173cm 49kg 24.5–25.0cm）。
      I. 闇の彼方へ — transylvaniaへ続く長い道、闇の恐怖、雷鳴のたびに見える幻想。
      II. transylvania — 完全にドラキュラのストーリーを音に。ギターなし、生バイオリン。
      III. 追憶の破片 — ギター前面。変拍子、ドラマティックなピアノアレンジ。
      IV. プルミエ ラムール — フランスの幼い頃の優しさ。
      V. 偽りのミュゼット — 昔っぽい。LIVEでアコーディオン。
      VI. N・p・s N・g・s — 初の打ち込み激しい系。メタルパーカッション、チェンバロ。
      VII. クレール 月の調べ — レコードの音、ボサノバ。切なさと愛しさ。
      VIII. マドリガル — 踊りたくなるポップさと秘めた愁い。LIVEでカスタネットとタンバリン。
      IX. 死の舞踏 — 古い曲。シンデレラ盲想、死のダンス。変拍子。
      X. 前兆 — 昔のラフレシアの前触れ。浮遊感、崩れそうな幻想。
    romaji: >
      Kyokusetsu mana. I–X commentary on Voyage from composer's perspective — Dracula narrative,
      guitar-forward tracks, waltz, programmed intensity, bossa nova, madrigal pop, death dance, premonition.
    en: >
      Song Commentary: mana (DOB 3/19, blood type O).
      I. Yami no Kanata e — Long road toward transylvania; fear of darkness; visions in thunder.
      II. transylvania — Dracula story as sound; no guitar; live violin.
      III. Tsuioku no Hahen — Guitar-forward; shifting time signatures; dramatic piano arrangement.
      IV. Premier Amour — French childhood tenderness.
      V. Itsuwari no Musette — Old-fashioned feel; accordion at lives.
      VI. N·p·s N·g·s — First programmed intense track; metal percussion, dual harpsichord.
      VII. Claire ~Tsuki no Shirabe~ — Record crackle, bossa nova; bittersweet love.
      VIII. Madrigal — Pop you want to dance to, hidden melancholy; castanets and tambourine live.
      IX. Shi no Butou — Old song; Cinderella blind fantasy, dance of death; odd meters.
      X. Zenchou — Prelude to former song "Rafflesia"; floating, collapsing illusion.

  - page: 5
    section: Song Commentary — Közi (Voyage)
    ja: >
      曲解説 közi（5.29 NIIGATA / A / 175cm 56kg 26.0cm）。
      I. 闇の彼方へ — ゴロゴロ、ピカッドーン、わっわおーん、ヒヒーン、ブルル、パッカラ…
      II. transylvania — ゴシックを越えスーパーサイヤ人級。胸がバチバチする元気玉サウンド。
      III. 追憶の破片 — シンセを抑えギターでロック的アプローチ。大音量で聴いたら走り出したくなった。
      IV. プルミエ ラムール — 甘く切なく、レモンの味。噛んだら頭のフタ開いた。
      V. 偽りのミュゼット — フリークス、エレファントマンのイメージ。異形ゆえの悲劇。
      VI. N・p・s N・g・s — ちょちょいのちょい。レコーディングでメタルなsoulを熱く。
      VII. クレール 月の調べ — サイレントムービー的。比喩的な詩、宵夜の月の調べ。
      VIII. マドリガル — APRÈS MIDIのその後をPOPに。レトロな雰囲気。ギリギリまで形が見えず。
      IX. 死の舞踏 — 唯一昔からの曲。L/Rに振ったギター。オー、サンドリオン！
      X. 前兆 — ピアノが心地よい。詩の代わりに旋律で何かを感じ取って。
    romaji: >
      Kyokusetsu Közi. Sound-effect intro to Yami no Kanata e; supercharged gothic on transylvania;
      guitar-rock Tsuioku; lemon Premier Amour; Freaks/Elephant Man Musette; silent-film Claire;
      pop Madrigal; old Shi no Butou; piano Zenchou.
    en: >
      Song Commentary: Közi (DOB 5/29 Niigata, blood type A).
      I. Yami no Kanata e — Onomatopoeia soundscape: thunder, horses, carriage wheels…
      II. transylvania — Gothic leveled up beyond band form; "power ball" energy.
      III. Tsuioku no Hahen — Minimal synth, guitar-rock approach; wanted to run toward the sun at full volume.
      IV. Premier Amour — Sweet-sour lemon taste; "bit it and my lid blew off."
      V. Itsuwari no Musette — Freaks / Elephant Man circus imagery; tragedy of deformity.
      VI. N·p·s N·g·s — Short and punchy; metal soul heated in recording.
      VII. Claire ~Tsuki no Shirabe~ — Silent-film frames; metaphorical lyrics—interpret the moonlit night scene.
      VIII. Madrigal — Pop imagining the heroine after APRÈS MIDI; retro; finished at the last minute.
      IX. Shi no Butou — Only longtime track; guitars panned L/R. Oh, sand lion!
      X. Zenchou — Pleasant piano; feel something through melody instead of lyrics.

  - page: 6
    section: Song Commentary — Yu~ki (Voyage)
    ja: >
      曲解説 yu-ki（8.8 FUKUOKA / A / 176cm 54kg 26.0cm）。
      I. 闇の彼方へ — 闇夜に住む子供達の声。馬車に乗り闇の彼方へ。
      II. transylvania — ヴァンパイア曲。LIVEで棺に入ったりGacktに噛み付いたり。
      III. 追憶の破片 — LIVEではUPテンポ。ノってください。
      IV. プルミエ ラムール — さわやか。結構好き。
      V. 偽りのミュゼット — 「君からの手紙をPocketにしまって…」メロディーがいい。
      VI. N・p・s N・g・s — LIVEで暴れてください。
      VII–VIII. クレール & マドリガル — Köziの曲に驚く。「ほっほーこうきたか」（笑）。新しい風。
      IX. 死の舞踏 — 昔からの曲、いろんな思い。
      X. 前兆 — ピアノメイン。マリスの隠れた名曲。
    romaji: >
      Kyokusetsu Yu~ki. Brief bass-player notes: vampire live antics, up-tempo Tsuioku,
      favorite Musette phrase, mosh at N·p·s, surprise at Közi's Claire/Madrigal, hidden gem Zenchou.
    en: >
      Song Commentary: Yu~ki (DOB 8/8 Fukuoka, blood type A).
      I. Yami no Kanata e — Voices of children in the dark night; ride the carriage beyond darkness.
      II. transylvania — Vampire theme; favorite; live coffin antics and biting Gackt.
      III. Tsuioku no Hahen — Slightly faster at lives—get into it.
      IV. Premier Amour — Refreshing; quite like it.
      V. Itsuwari no Musette — "I put your letter in my pocket…" memorable melody.
      VI. N·p·s N·g·s — Go wild together at lives.
      VII–VIII. Claire & Madrigal — Always surprised by Közi's songs; "Ho-ho, so that's how it is" (laughs); fresh wind for Malice.
      IX. Shi no Butou — Longtime song packed with feelings.
      X. Zenchou — Piano-centric; a hidden Malice masterpiece.

  - page: 7
    section: Song Commentary — Kami (Voyage)
    ja: >
      曲解説 kami（2.1 IBARAKI / A / 177cm 57kg 25.0cm）。
      II. transylvania — サントラ・クラシック要素。大太鼓、ブラシ、ティンパニ。凄い曲だとGacktと痛感。
      III. 追憶の破片 — Manaとギターしながらリズム考案。変拍子9/8、10/9、大サビ4/3。ポリリズム。
      IV. プルミエ ラムール — フレンチ的軽快さ。ピッコロスネア。シンプルに。
      V. 偽りのミュゼット — 初のワルツ。川辺で練習。
      VI. N・p・s N・g・s — 初のダンス系。打ち込みの遊び心。
      VII. クレール 月の調べ — ボサノバ。パーカッシブ打楽器。転調後のベースとリズム。
      VIII. マドリガル — 同パターン貫通。ブレークビート。レニーと森高意識。トルコ行進曲でスチールスネア。
      IX. 死の舞踏 — Mr.クラシックメープルスネア。サビ前のアンサンブル。
      X. 前兆 — 前触れの感じ。
      最後に：Memoireよりグレードアップ。ロック、ボサノバ、ワルツ、打ち込み——多方面の勉強になった。
    romaji: >
      Kyokusetsu Kami. Drummer's technical notes on transylvania through Zenchou; polyrhythms on Tsuioku;
      first waltz; bossa nova; breakbeats; closing praise for upgraded album vs. Memoire.
    en: >
      Song Commentary: Kami (DOB 2/1 Ibaraki, blood type A).
      II. transylvania — Preserved soundtrack/classical feel; big drum, brushes, timpani roll; felt with Gackt how incredible the song is.
      III. Tsuioku no Hahen — Built rhythms with Mana on guitar; odd meters 9/8, 10/9, 4/3 bridge; polyrhythm; exhausted by final drum session.
      IV. Premier Amour — French lightness; piccolo snare; kept simple per composer.
      V. Itsuwari no Musette — First waltz; practiced alone by a river.
      VI. N·p·s N·g·s — First dance track; enjoy programmed playfulness.
      VII. Claire ~Tsuki no Shirabe~ — Bossa nova; many percussion layers; bass-rhythm interplay after modulation.
      VIII. Madrigal — Same pattern throughout plus breakbeats; Lenny/Moritaka influence; steel snare on Turkish March section.
      IX. Shi no Butou — Warm Mr. Classic Maple snare; ensemble before chorus.
      X. Zenchou — Premonition feel.
      Closing: Major upgrade from Memoire; rock, bossa, waltz, programming—learned across many styles. Keep enjoying boundaryless Malice; let's resonate.

  - page: 8
    section: Like an Anthology — Camui Gackt (part 1)
    ja: >
      一回目のFan Clubの会報ということで何を書こうか迷ったんだけど、今回は僕の幼児体験を少し話そうかな。
      いつもよく言われる『ガクは変』——その原因の一つを書こう。
      物心がついた頃から理解できなかった不思議な体験と、周りの環境と自分の弱さ。
      5才の沖縄の海で波にのまれ、水中に引きずり込まれて——走馬灯のように過去が駆け巡り、
      スローモーションの水の世界。浜辺で気が付く。その晩、何かが違うと気付いた。物凄く怖かった。
      親に話してもとりあってくれずノイローゼに。
      小学2年、登校途中で向かって来る車にはねられて気を失う。気が付くと周囲が泣いているのに本人はピンピン——
    romaji: >
      Like an Anthology — Camui Gackt (part 1). First fan-club newsletter column on childhood "weirdness":
      near-drowning at age 5 in Okinawa with life-flashback and altered perception; parents dismissive;
      age 8 hit by car on group walk to school, unharmed but confused by everyone's panic.
    en: >
      Like an Anthology — Camui Gackt (part 1).
      For the first fan-club newsletter I wondered what to write—I'll share a bit of my early childhood.
      People often say "Gackt is weird"; here's one reason.
      Strange experiences I couldn't understand, the environment around me, and my own weakness.
      Around age five in Okinawa I was pulled under by waves—life flashed before my eyes, then underwater moved
      in slow motion; I woke on the shore with no memory of getting there. That night I felt something had changed. Terrifying.
      My parents wouldn't listen; I became neurotic.
      Second grade: on the way to school I walked into an oncoming car and lost consciousness—when I woke,
      parents and friends were crying and the driver panicked, but I was fine and remembered nothing.

  - page: 9
    section: Like an Anthology — Camui Gackt (part 2)
    ja: >
      現場検証で子達が「何かにひっぱられるように…」——親がようやく信じ始めたが手遅れ。
      10才で隔離病院。霊的なものを感じすぎて気が狂いかけた。12才からいろいろやったが逃げでは解決にならなかった。
      14才から向き合う方法を見つけてようやく大丈夫に。ツアー中のホテルも結構キていた。
      次回はおいしい店特集。知っている人、手紙で教えて下さい。
    romaji: >
      Like an Anthology (part 2). Witnesses said they were "pulled by something"; isolation hospital at 10;
      overwhelming spiritual sensitivity; coping from 12; equilibrium at 14; haunted hotels on tour;
      next issue restaurant feature—send recommendations.
    en: >
      Like an Anthology — Camui Gackt (part 2).
      At the scene kids said I walked as if "pulled by something"—parents finally believed, but I was already gone.
      At ten I was placed in an isolation ward; at peak sensitivity I felt the dying and the dead too much and nearly broke.
      From twelve I tried distractions; escape didn't solve anything. Around fourteen I learned to face it and stabilized.
      Tour hotels were still quite haunted, though.
      Next time maybe a good-restaurant feature—write in if you know any. That's all for now.
      [Photo: Mana with bat wings on psychedelic background.]

  - page: 10
    section: MANA Private Photo Gallery Vol. 1
    ja: >
      MANA 第一回 ～プライベート写真館の巻～
      ついに初会報、第一号。これからも雑誌では見れない写真をこっそり見せてあげよう。
      初公開！これがウチのトイレだ！！はじめてこのドアを開けた瞬間、みんな硬直します。
      家の一角にて。大切なドラキュラ人形とのショット。もっとゴシックな部屋にしたいなぁ…
    romaji: >
      MANA dai-ikkai ~Puraibēto Shashinkan no Maki~. First newsletter—secret photos magazines won't show.
      First reveal: my toilet! Everyone freezes opening that door. Corner of home with Dracula dolls; want more gothic room.
    en: >
      MANA Vol. 1 — Private Photo Gallery.
      The first newsletter at last—I'll secretly show photos you won't see in magazines.
      World premiere: my bathroom!! Everyone freezes the first time they open that door.
      A corner of my home with precious Dracula dolls—I want an even more gothic room…

  - page: 11
    section: MANA Private Photo Gallery Vol. 1 (continued)
    ja: >
      近所の子供達とのさわやかショット。また次回をおたのしみに！
      さぁ自慢の？バイクで峠でもせめに行くか…
    romaji: >
      Sawayaka shotto with neighborhood kids. Look forward to next time!
      Shall we tackle a mountain pass on my prized? bike…
    en: >
      A refreshing shot with neighborhood children. Look forward to the next installment!
      Well then—shall we charge a mountain pass on my prized? bike…
      [Also: Rococo blue feather outfit; Mana on motorcycle.]

  - page: 12
    section: Ginza Cozy Corner — Közi (part 1)
    ja: >
      銀座 コージーコーナー。KÖZI担当。
      FANCLUB「ma chérie」発足記念第一号。（コージーコーナーのシュークリームがちょ〜うまい。安い！でかい！うまい！）
      今回は相棒ザク君を紹介。
      〜プロフィール〜 名前→ザク / 雑種オス六ヵ月 / 趣味→寝る、壁ガリガリ、ひなたぼっこ /
      特技→叱られる時の逃げ足 / 性格→寂しがり屋でちょっぴり小心者なおバカさん。
      トイレもお風呂も一緒。帰ると玄関で待ってる。なんてかわいい奴なんだお前は。
      写真①②③④のコメント：①生後一ヵ月、ぬいぐるみか？ ②口半開きででっかくなるザク
      ③キャビネットに閉じ込め置物化、泣きそうな目 ④最近の写真、デブネコ決定。おめでとうザク！
    romaji: >
      Ginza Kōjī Kōnā — Közi. Commemorative first issue; introduces cat Zaku-kun with profile and growth photos.
    en: >
      Ginza Cozy Corner — Közi.
      Malice Mizer's derailment & soul-laundry handler. First ma chérie issue (Cozy Corner cream puffs: cheap, huge, delicious!).
      Introducing my private-room partner Zaku-kun.
      Profile: Zaku / mixed-breed male, 6 months / hobbies: sleep, scratch walls, sunbathe /
      special skill: speed when scolded / personality: lonely, timid little dummy.
      He's with me even in the bathroom; waits at the door when I come home. What a cute guy.
      Photo comments: ① one month old, stuffed animal? ② mouth half-open, growing fast
      ③ trapped in cabinet as ornament, about to cry ④ latest photo—fat cat confirmed. Congrats Zaku!

  - page: 13
    section: Ginza Cozy Corner — Közi (part 2)
    ja: >
      ペットを飼ってる人はみんな思ってるだろうけどやっぱり自分のペットってかわいいよね。ザク紹介でした。かわいかっただろう。へっへっへっ。
      コージーコーナーではKÖZI君にやってもらいたいおもしろい企画や質問、文句など、皆様のお便りをお待ちしております。
    romaji: >
      Jibun no petto tte kawaii. Zaku shōkai deshita. Kōjī Kōnā otayori o omachi shite orimasu.
    en: >
      Everyone with pets thinks so—your own pet really is the cutest. That was Zaku. Cute, right? Heh heh heh.
      In Cozy Corner we're waiting for letters with fun projects, questions, and complaints you'd like Közi-kun to tackle.
      [Photos: Zaku growth series; Közi holding Zaku; Közi on monkey bars.]

  - page: 14
    section: The Count Is Catalepsy — Yu~ki (part 1)
    ja: >
      伯爵はカタレプシー。
      nicoleのパネル — 約10年前の非売品。物悲しい雰囲気で世界に引き込まれる。
      アンティック時計 — 3年前の怪しい雑貨屋。クラシックな青磁色。一度修理。
      ベッド — 一目惚れのアールデコ。サインしたが、私は棺で眠るので使ってません（笑）。
    romaji: >
      Hakushaku wa Katarepushī. Nicole panel, antique clock, Art Deco bed (sleeps in coffin instead).
    en: >
      The Count Is Catalepsy — Yu~ki's antique column.
      Nicole panel — non-sale item ~10 years ago; melancholy atmosphere draws you in.
      Antique clock — found at a suspicious shop three years ago; celadon-like classic color; repaired once.
      Bed — love at first sight Art Deco; signed the receipt, but I sleep in a coffin so I don't use it (laughs).

  - page: 15
    section: The Count Is Catalepsy — Yu~ki (part 2)
    ja: >
      マガジンラック — 見た瞬間これは買うしかない。
      カガミ — 同種の鏡を発見。燭台やモールまであったが予算の都合で…悲しい。
      ペットのムー — 言うことを聞かないイタズラ好き。部屋に放すと大変。フロに入ってる時だけ静か。
      最近わがままで手にエサをのせないと食わない。今にみてろよ！※コノヤロー
    romaji: >
      Magazin rack, matching mirror (budget limits), pet ferret Mu — mischievous, only quiet in bath, spoiled eater.
    en: >
      Magazine rack — instant must-buy for the design and color.
      Mirror — spotted a matching piece while holding the rack; candlesticks and moldings too, but budget… sad.
      Pet Mu — won't listen, loves pranks; chaos if loose; only quiet during bath.
      Lately spoiled—won't eat unless food is placed in my hand. Just you wait, you rascal!

  - page: 16
    section: Kami's Collection (perfumes)
    ja: >
      Kami's Collection — 大好きな香水達を紹介します。
      ゴルチェ／初めてファンにもらって良い香り。ロードイッセイ／水イメージだがスイカの匂い。
      イッセイ（メンズ）／上より気に入り。女性OK。タンドゥールプワゾン／お気に入りだが昨日のコギャルがつけてやめた。
      トレゾア／衝撃的、甘いがくどくない。イルパチオ／花の匂い。
      他：アマリージュ、インセンス、レッドジーンズ、ベビーロージーズ等。
      いい香りの香水があったら送ってね。キッカケに香水にはまってみては。
    romaji: >
      Kami's Collection — perfume introductions: Gaultier, L'Eau d'Issey (smells like watermelon to them),
      Issey Men, Tendre Poison, Trésor, Il Bacio; requests fan recommendations.
    en: >
      Kami's Collection — introducing favorite fragrances.
      Gaultier — first gift from a fan, nice scent. L'Eau d'Issey — "water" image but smells like watermelon to me.
      Issey Men — prefer this one; OK for women. Tendre Poison — favorite, quit after a kogyaru wore it yesterday.
      Trésor — shocking, sweet not cloying, tickles a man's heart. Il Bacio — sweet floral.
      Also: Amarige, Insensé, Red Jeans, Baby Rose, etc.
      Send good scents; maybe get hooked on perfume yourselves.

  - page: 17
    section: Kami Profile
    ja: >
      《プロフィール》氏名／神村 右狂 kami。趣味／コレクション（香水集め、ギャンブル）。
      記念すべきファンクラブ「ma chérie」が出来ました。マシェリは"愛しい君"という意味。
      タバコ／赤ラーク１箱。好きな色／いろ色。好きな食べ物／カレー、ハンバーグ、エビフライ等。
      嫌い／ジャガイモ、豆腐等。好きなブランド／ルナ、ゴルゴル、ベルサー、パール等。
      好きな女性／髪が俺より綺麗で長くて細くて。一番したいこと／大金でギャンブル。
      休日／川辺でドラム。もらって嬉しいもの／CD券、セブンイレブンカード、服、靴。
      性格／明るく暗く色々。セールスポイント／髪。目標／立派なドラマーになって認められたい。
    romaji: >
      Kami profīru — Kamimura Ukyou; perfume/gambling hobbies; ma chérie means "my beloved";
      Red Lark; curry; gamble with big money; drums by the river; hair is selling point; become recognized drummer.
    en: >
      Profile — Kamimura Ukyou (kami). Hobbies: collecting perfume, gambling.
      The memorable fan club "ma chérie" ("my beloved") has launched—we hope to draw closer to you.
      Smokes Red Lark; favorite color: all colors; likes curry, hamburg steak, fried shrimp; dislikes potatoes, tofu.
      Brands: Luna, Golgol, Versace, Pearl; ideal woman: hair prettier/longer/thinner than theirs.
      Most wants to: gamble big money; days off: drums by the river.
      Happy to receive: CD vouchers, 7-Eleven cards, clothes, shoes.
      Personality: bright and dark; selling point: hair; goal: become a fine recognized drummer.

  - page: 18
    section: Voyage Recording Behind the Scenes
    ja: >
      マ シェリ レコーディングのひとこま / Voyage レコーディング。
      ロビーで一服中のKÖZI（髭バージョン）。ハーイみんな元気？ (YU-KI)
      ドラム録り2–3日目、体力限界、SAKURA氏の前で緊張して叩けなかった KAMI説。
      たぶん前兆を録ってる。忙しさに髪も洗えず帽子で隠してますね（笑）YU-KI。
      ん〜 静かにしろよ おい
      本当にレコーディング中は地獄です YU-KI
    romaji: >
      Voyage rekōdingu no hitokoma — Közi/Yu~ki/Kami candid studio captions; Kami exhausted, nervous before Sakura;
      Yu~ki recording Zenchou unwashed hair under hat; "recording is hell."
    en: >
      ma chérie — Scenes from Recording / Voyage Recording.
      Közi on a lobby break (mustache glasses version). "Hey everyone, you good?" — Yu~ki.
      Kami on day 2–3 of drum tracking, at their limit; too nervous to play properly before Sakura — Kami's account.
      Probably recording "Zenchou"; too busy to wash hair, hiding under a hat (laugh) — Yu~ki.
      "Ugh—shut up, hey."
      "Recording really is hell." — Yu~ki.

  - page: 19
    section: Voyage Autograph Sessions
    ja: >
      Voyage サイン会。
      東京 自主盤倶楽部でのサイン会（'96.9.6）。
      初めてのサイン会。みんなの顔が一人ずつはっきり見れてすごく新鮮だった。この日600人以上来てくれてビックリ！！
      仙台スーパーレコード — この日はKAMIさん欠席。
    romaji: >
      Voyage sain-kai — Jishuban Club Tokyo first signing (~600 people); Sendai Super Records, Kami absent.
    en: >
      Voyage Autograph Sessions.
      Tokyo — Jishuban Club signing (Sep 6, 1996).
      Our first signing—I could see each fan's face clearly; very fresh. Over 600 came—surprising!!
      Sendai Super Records — Kami absent this day.
      [Photos: crowded Jishuban Club; Mana/Közi and Gackt/Yu~ki at Sendai.]

  - page: 20
    section: All Night Nippon Radio Appearance
    ja: >
      〜マリスミゼル ラジオ出演のまき〜
      ラジオ『オールナイトニッポン』でVoyageが3週連続1位。その記念生出演。
      そのラジオ局にはオバケが出るそうでトイレが怖くて１人で行けなかった。
      衣装を着て行ったのでユーミンにおもしろがられた。
      DJ荘口さんと一緒に記念撮影。
      控室で出番を待つメンバー達。みんな初めてでドキドキ。
    romaji: >
      Rajio shutsuen — All Night Nippon, Voyage #1 three weeks; haunted station toilet fears; costumes amused Yuming;
      photo with DJ Souguchi; nervous in green room.
    en: >
      Malice Mizer — Radio Appearance Chapter.
      Voyage hit #1 on All Night Nippon for three straight weeks—commemorative live broadcast.
      Ghosts at that station—too scared to go to the toilet alone.
      Went in costume; Yuming (Yumi Matsutoya) was amused.
      Commemorative photo with DJ Souguchi.
      Members waiting in the green room—first time, hearts pounding.

