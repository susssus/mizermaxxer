bio:
  before: >
    Drummed in the band DATURA before joining Malice Mizer, releasing one demo tape
    with that project.
  during: >
    Malice Mizer's founding drummer, joining Mana, Közi, Yu~ki, and Tetsu in August
    or September 1992 to complete the first five-piece lineup. Recorded drums on the
    early demo tapes Sans Logique (October 1992) and the pre-Kami sessions later
    compiled as Sadness and related demos; Lafflesia is the only early demo without
    their drumming. Left after their final show on March 15, 1993, in a straight swap
    with Kneuklid Romance drummer Kami — Gaz joined KR while Kami joined Malice Mizer.
    They also briefly supported Baiser on drums from December 1992 to October 1993,
    overlapping with their Malice Mizer tenure.
  after: >
    Spent most of the 1990s as drummer of Kneuklid Romance, leaving in 1998. Returned
    for KR reunion performances in 2009, 2011, and 2012. Died on December 22, 2017,
    from illness. Mana announced their passing the following day.
