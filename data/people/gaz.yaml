bio:
  before: >
    Began in the scene as a roadie for YOUTHQUAKE, then drummed in DATURA — an obscure
    early-1990s Japanese visual kei band (not the Eurodance or metal acts of the same
    name) — which released a self-titled demo tape before disbanding.
  during: >
    Malice Mizer's founding drummer, joining Mana, Közi, Yu~ki, and Tetsu in August
    or September 1992. Recorded drums on Sans Logique (October 1992) and the pre-Kami
    sessions behind Sadness and related early demos; Lafflesia is the only early demo
    without their playing. Also appeared on the 1993 indies compilation Brain Trash via
    "Speed of Desperate". Left after their final show on March 15, 1993, swapping straight
    with Kneuklid Romance drummer Kami. Briefly supported Baiser on drums from December
    1992 to October 1993, overlapping with Malice Mizer.
  after: >
    Joined Kneuklid Romance in May 1993, first as support and from 1994 as an official
    member in the G. Kenichi / B. Tatsuya / D. Gaz lineup. Remained through the band's
    indies and major-label period until leaving in 1998. Later played in the Night
    Breeze Zinnia, Doverman (ドーベルマン), and BUZZ BONE, with additional support stints in
    Virgin Killer 5, The Veletta, and Pandemic. Returned for Kneuklid Romance reunion
    performances in 2009, 2011, and 2012. Died on December 22, 2017, from cancer.
    Mana announced the news publicly the next day; the funeral was private. On July 8,
    2018, surviving Kneuklid Romance members and friends held the memorial concert
    GAZ presents "Chain" at Meguro Rockmaykan.
