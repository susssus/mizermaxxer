bio:
  before: >
    Briefly performed with Ner-vous in 1992 before becoming Malice Mizer's
    founding vocalist when the band formed in August that year.
  during: >
    Fronted the band's first era (1992–1994), shaping its early gothic and
    classical sound. Sang on Memoire and numerous demos and compilations.
    Left after their final show on December 27, 1994, unwilling to pursue the
    visual kei direction the other members wanted.
  after: >
    Moved toward straight rock with Mega8Ball (1995–1997), the supergroup
    Zigzo (1999–2002), and their primary band nil (2002–present). Also active
    in The JuneJulyAugust, The Black Comet Club Band, and Disco Volante via
    their label Afro Skull Records.
