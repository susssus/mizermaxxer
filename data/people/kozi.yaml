bio:
  before: 'Started in Beyond the Rein Sight (1989) and Girl before joining Matenrou
    with Mana in 1991. Left with Mana to pursue their shared twin-guitar concept.

    '
  during: 'Co-founded Malice Mizer in August 1992. Composed several of the band''s
    biggest singles, including "Gekka no Yasoukyoku" and "Illuminati", and developed
    the signature dual-guitar arrangements with Mana.

    '
  after: 'Formed Eve of Destiny, pursued a solo career, and led bands including Dalle,
    XA-VAT, and ZIZ. Reunited with Mana and Yu~ki for Deep Sanctuary and Malice Mizer
    anniversary performances.

    '
