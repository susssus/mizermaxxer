bio:
  before: 'Played bass in the visual kei band Ze:ro (as Yû-KI) until the group disbanded
    in June 1992, shortly before Malice Mizer formed.

    '
  during: 'Recruited by Mana and Közi as founding bassist in August 1992. One of only
    three members present for the band''s entire nine-year run. Known for their aristocratic/vampire
    stage persona and composition of "Syunikiss" on Merveilles.

    '
  after: 'Has largely stepped back from music since 2001. Wrote lyrics for Közi''s
    2004 single "Memento". Appeared at Deep Sanctuary reunion shows from 2010 onward
    and later sold handcrafted jewelry through Midi:Nette.

    '
