bio:
  before: 'Performed as drummer and vocalist in Cains:Feel and other Okinawa-area
    bands before being recruited as Malice Mizer''s second vocalist.

    '
  during: 'Joined in October 1995 and fronted the band through its commercial peak.
    The Gackt era brought French pop influences, major-label success (Merveilles went
    gold), and elaborate theatrical live shows. Departed in January 1999 at the height
    of the band''s popularity.

    '
  after: 'Launched an enormously successful solo career spanning music, film, and
    television. Remains one of Japan''s best-known entertainers and declined invitations
    to Malice Mizer reunion concerts.

    '
