bio:
  before: 'Began in underground bands Ves.tearge (1986) and Girl''e as guitarist Serina
    (1988–1990). Joined Matenrou as bassist alongside Közi before leaving in April
    1992.

    '
  during: 'Co-founded Malice Mizer in August 1992. Served as lead guitarist, chief
    songwriter, choreographer, and artistic director. Founded the Midi:Nette label
    and shaped the band''s classical and gothic visual identity through every lineup
    change until the 2001 hiatus.

    '
  after: 'Launched the solo project Moi dix Mois (2002), runs the Moi-même-Moitié
    fashion label and Midi:Nette. Has reunited with Közi and Yu~ki for Deep Sanctuary
    concerts, including Malice Mizer''s 25th-anniversary shows in 2018.

    '
