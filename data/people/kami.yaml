bio:
  before: 'Drummed in the punk band 3PMayonnaise during high school (1989–1991), then
    moved to Tokyo and joined Kneuklid Romance in September 1992.

    '
  during: 'Swapped bands with Gaz and joined Malice Mizer on March 17, 1993. Drummed
    through the Gackt era and the band''s major-label peak. After their death they were
    credited as "eternal blood relative" on all subsequent releases.

    '
  after: 'Died of a subarachnoid hemorrhage on June 21, 1999, aged 27. Left behind
    unfinished compositions released on the Shinwa EP and memorial releases.

    '
