negative_conclusion: >
  As of July 2026, the Eternal Silence RAR appears lost from public web. No mega.nz,
  mediafire, or Internet Archive re-upload located. However, 40 MM clipping pages are live on
  The Malice Archive (file.garden) — sufficient for the au revoir feature and most MM content.

