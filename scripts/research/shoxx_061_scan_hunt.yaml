# SHOXX Vol. 61 (March 1998) — automated re-upload hunt log.
# Issue: joint La'cryma Christi + MALICE MIZER cover; 38pp MM feature (MIsaO Lab).
# Last searched: 2026-07-06

page_mapping:
  note: >
    Malice Archive gallery files (01.jpg–40.jpg) are NOT 1:1 with printed page numbers.
    Several scans include SHOXX footers (022, 023, 028, …). TOC is gallery file 02.
  gallery_to_magazine:
    - gallery: 01
      magazine_pages: [cover]
      content: Cover — Gackt (MM) & TAKA (La'cryma Christi); Vol. 61 March 1998
    - gallery: 02
      magazine_pages: [TOC]
      content: Table of contents — 聖邪の共宴 feature pp. 16–53; SESSION starts p. 018
    - gallery: 03
      magazine_pages: [16]
      content: Opening group photo — 聖邪の共宴 (YOSUKE KOMATSU)
    - gallery: 04
      content: La'cryma Christi group — Special Talking Session
    - gallery: "05-08"
      magazine_pages: [18]
      content: SESSION.1 【Vocalist】 Gackt × TAKA — title + portraits
    - gallery: "09-10"
      magazine_pages: [22, 23]
      content: SESSION.1 interview — footers SHOXX 022, 023
    - gallery: "11-16"
      magazine_pages: [24, 28, 29]
      content: SESSION.2 【Guitar】 mana × KOJI — footers SHOXX 028, 029
    - gallery: "17-22"
      magazine_pages: [30, 34, 35]
      content: SESSION.3 【Guitar】 KÖZI × HIRO — footers SHOXX 034, 035
    - gallery: "23-28"
      magazine_pages: [36, 40, 41]
      content: SESSION.4 【Bass】 YU~KI × SHUSE — footers SHOXX 040, 041
    - gallery: "29-34"
      magazine_pages: [42, 46, 47]
      content: SESSION.5 【Drums】 KAMI × LEVIN — footers SHOXX 046, 047
    - gallery: "35-38"
      magazine_pages: [48, 49, 50, 51]
      content: Cross-band Q&A — La'cryma↔MM questionnaires + MM personal Q&A
    - gallery: "39-40"
      magazine_pages: [53]
      content: Fin — sepia behind-the-scenes / closing spread
  not_in_40_page_set:
    - magazine pages ~16–17 (between opener and SESSION.1 photo start)
    - color poster supplement (listed on TOC)
    - non-MM pages (IZAM p.54+, L'Arc~en~Ciel p.83+, etc.)

