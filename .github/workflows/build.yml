name: Build Archive

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate and build database
        run: make build

      - name: Export CSV/XLSX
        run: make export

      - name: Build PDF catalogue
        run: make pdf

      - name: Install site dependencies and build
        run: |
          cd site && npm install && npm run build
